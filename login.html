<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — KRV Management</title>
  <!-- Tailwind CSS v4 Browser Compiler -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- React & ReactDOM 18 -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <!-- Supabase JS Client via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style type="text/css">
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
    }
    :root {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #eff6ff 50%, #dbeafe 100%);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(15, 23, 42, 0.06);
      --glass-shadow: 0 10px 30px -10px rgba(37, 99, 235, 0.08);
      --text-main: #0f172a;
    }
    .dark {
      --bg-gradient: linear-gradient(135deg, #090d16 0%, #0f172a 50%, #1e1b4b 100%);
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 10px 35px -10px rgba(0, 0, 0, 0.5);
      --text-main: #f8fafc;
    }
    .app-bg {
      background: var(--bg-gradient);
    }
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      box-shadow: var(--glass-shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
  <script>
    // Cryptographic Secure Hashing function for auto-redirection
    const sha256Direct = async (text) => {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // Fast Auto-Redirect Blocking Script
    (async () => {
      const storedSession = localStorage.getItem("krv-current-user-session");
      if (storedSession) {
        try {
          const { user, signature } = JSON.parse(storedSession);
          if (user && signature) {
            const expectedSig = await sha256Direct(`${user.id}:${user.email}:${user.role}:KRV-SESSION-SECRET-2026!`);
            if (signature === expectedSig) {
              if (user.role === "admin") {
                window.location.href = "admin.html";
              } else {
                window.location.href = "candidate.html";
              }
            }
          }
        } catch (e) {
          console.error("Auto-redirect check failed:", e);
        }
      }
    })();
  </script>
</head>
<body class="app-bg min-h-screen text-[var(--text-main)] transition-colors duration-300">
  
  <div id="root"></div>

  <!-- React code with Babel -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL_DEFAULT = "https://fhrukaegrawsleldnrlw.supabase.co"; 
    const SUPABASE_KEY_DEFAULT = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZocnVrYWVncmF3c2xlbGRucmx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjI0NTksImV4cCI6MjA5NTQzODQ1OX0.5mzjc9ockUTnGhDvY49y6r4M5WNTIBCkyzRdJL0p18E"; 

    // Cryptographic Secure One-Way SHA-256 Hash Function
    const sha256 = async (text) => {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    const getSaltedHash = async (email, password) => {
      const payload = `${email.toLowerCase()}:${password}:KRV-PEPPER-2026-T#9!`;
      return await sha256(payload);
    };

    const signSession = async (user) => {
      if (!user) return "";
      const payload = `${user.id}:${user.email}:${user.role}`;
      return await sha256(payload + ":KRV-SESSION-SECRET-2026!");
    };

    const getSupabaseClient = () => {
      const url = localStorage.getItem("krv-supabase-url") || SUPABASE_URL_DEFAULT;
      const key = localStorage.getItem("krv-supabase-key") || SUPABASE_KEY_DEFAULT;
      if (url && key && window.supabase) {
        try {
          return window.supabase.createClient(url, key);
        } catch (e) {
          console.error("Supabase Client Error: ", e);
        }
      }
      return null;
    };

    // Custom SVG Icon Component
    const Icon = ({ name, className = "w-5 h-5", ...props }) => {
      const icons = {
        sun: <g><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></g>,
        moon: <g><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></g>,
        eye: <g><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></g>,
        "eye-off": <g><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></g>,
        "check-circle": <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3" /></g>,
        "alert-circle": <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></g>,
        "x-circle": <g><circle cx="12" cy="12" r="10" /><line x1="15" y1="9" x2="9" y2="15" /><line x1="9" y1="9" x2="15" y2="15" /></g>,
        "chevron-left": <g><polyline points="15 18 9 12 15 6" /></g>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
          {icons[name] || null}
        </svg>
      );
    };

    // Toast Notification Component
    const Toast = ({ message, type = "success", onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3500);
        return () => clearTimeout(timer);
      }, [onClose]);
      const colors = {
        success: "bg-emerald-600 border-emerald-500",
        error: "bg-rose-600 border-rose-500",
        info: "bg-blue-600 border-blue-500"
      };
      return (
        <div className={`fixed top-4 right-4 z-50 flex items-center gap-3 px-4 py-3 rounded-lg border shadow-lg text-white animate-bounce ${colors[type]}`}>
          <Icon name={type === "success" ? "check-circle" : type === "error" ? "x-circle" : "alert-circle"} className="w-5 h-5" />
          <span className="text-sm font-medium">{message}</span>
          <button onClick={onClose} className="hover:opacity-75"><Icon name="x-circle" className="w-4 h-4" /></button>
        </div>
      );
    };

    function LoginPage() {
      const [theme, setTheme] = useState(() => localStorage.getItem("krv-theme") || "dark");
      const [pageState, setPageState] = useState("login"); // login, forgot
      const [formData, setFormData] = useState({ email: "", password: "" });
      const [forgotStep, setForgotStep] = useState(1);
      const [showPassword, setShowPassword] = useState(false);
      const [otpInput, setOtpInput] = useState("");
      const [simulatedOtp, setSimulatedOtp] = useState("");
      const [toast, setToast] = useState(null);

      useEffect(() => {
        // Theme setting
        const root = window.document.documentElement;
        if (theme === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }
        localStorage.setItem("krv-theme", theme);
      }, [theme]);

      const triggerToast = (message, type = "success") => {
        setToast({ message, type });
      };

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleLoginSubmit = async (e) => {
        e.preventDefault();
        const client = getSupabaseClient();
        if (!client) {
          triggerToast("Supabase client connection error.", "error");
          return;
        }

        try {
          const { data: dbUsers, error } = await client.from("krv_users").select("*");
          if (error || !dbUsers) {
            triggerToast("Failed to connect to database.", "error");
            return;
          }

          const matchedUser = dbUsers.find(u => u.email.toLowerCase() === formData.email.toLowerCase());
          if (!matchedUser) {
            triggerToast("Account does not exist.", "error");
            return;
          }

          const saltedInput = await getSaltedHash(formData.email, formData.password);
          if (matchedUser.password !== saltedInput) {
            triggerToast("Incorrect password.", "error");
            return;
          }

          const signature = await signSession(matchedUser);
          localStorage.setItem("krv-current-user-session", JSON.stringify({ user: matchedUser, signature }));
          
          triggerToast(`Welcome back, ${matchedUser.name}!`);

          setTimeout(() => {
            if (matchedUser.role === "admin") {
              window.location.href = "admin.html";
            } else {
              window.location.href = "candidate.html";
            }
          }, 1000);
        } catch (err) {
          console.error("Login critical error:", err);
          triggerToast("An error occurred during sign in.", "error");
        }
      };

      const handleForgotSubmit = async (e) => {
        e.preventDefault();
        const client = getSupabaseClient();
        if (!client) {
          triggerToast("Supabase client connection error.", "error");
          return;
        }

        try {
          if (forgotStep === 1) {
            const { data: dbUsers } = await client.from("krv_users").select("*");
            const matched = dbUsers?.some(u => u.email.toLowerCase() === formData.email.toLowerCase());
            if (!matched) {
              triggerToast("Email not found.", "error");
              return;
            }
            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            setSimulatedOtp(otp);
            setForgotStep(2);
            triggerToast(`Simulated OTP: ${otp}`, "info");
          } else if (forgotStep === 2) {
            if (otpInput === simulatedOtp) {
              setForgotStep(3);
              triggerToast("OTP verified! Set new password.");
            } else {
              triggerToast("Incorrect OTP.", "error");
            }
          } else {
            const hashedPassword = await getSaltedHash(formData.email, formData.password);
            const { error } = await client.from("krv_users").update({ password: hashedPassword }).eq("email", formData.email);
            if (error) {
              triggerToast("Failed to update password in database.", "error");
            } else {
              triggerToast("Password reset successfully! Log in now.");
              setPageState("login");
              setForgotStep(1);
              setOtpInput("");
            }
          }
        } catch (err) {
          triggerToast("Password reset failed.", "error");
        }
      };

      return (
        <div className="flex flex-col min-h-screen">
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          
          <header className="px-6 py-4 flex items-center justify-between border-b border-slate-200/50 dark:border-slate-800/40 bg-white/70 dark:bg-slate-900/60 backdrop-blur-xl">
            <a href="index.html" className="flex items-center gap-2 text-xs font-bold uppercase text-slate-500 hover:text-blue-500 cursor-pointer">
              <Icon name="chevron-left" className="w-4 h-4" /> Back to Home
            </a>
            <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 shadow cursor-pointer">
              <Icon name={theme === "dark" ? "sun" : "moon"} className="w-4 h-4" />
            </button>
          </header>

          <div className="flex-grow flex items-center justify-center p-6">
            <div className="w-full max-w-md glass-card rounded-2xl p-8 space-y-6">
              
              <div className="text-center">
                <h2 className="text-2xl font-bold tracking-tight text-white">
                  {pageState === "login" ? "Login to KRV Management" : "Reset Password"}
                </h2>
                <p className="text-xs text-slate-400 mt-2">
                  {pageState === "login" ? "Enter your email and password to access dashboard" : "Follow OTP instructions to reset credential"}
                </p>
              </div>

              {pageState === "forgot" ? (
                <form onSubmit={handleForgotSubmit} className="space-y-4">
                  {forgotStep === 1 && (
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Email Address</label>
                      <input required type="email" name="email" value={formData.email} onChange={handleChange} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Enter registered email" />
                    </div>
                  )}

                  {forgotStep === 2 && (
                    <div className="space-y-2">
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Enter OTP (Sent: {simulatedOtp})</label>
                      <input required type="text" value={otpInput} onChange={(e) => setOtpInput(e.target.value)} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 text-center tracking-widest text-lg font-bold text-white focus:outline-none focus:border-blue-500" placeholder="000000" maxLength={6} />
                    </div>
                  )}

                  {forgotStep === 3 && (
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">New Password</label>
                      <div className="relative">
                        <input required type={showPassword ? "text" : "password"} name="password" value={formData.password} onChange={handleChange} className="w-full pl-4 pr-10 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Min 6 characters" minLength={6} />
                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
                          <Icon name={showPassword ? "eye" : "eye-off"} className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  )}

                  <button type="submit" className="w-full py-3.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow transition cursor-pointer">
                    {forgotStep === 1 && "Send OTP"}
                    {forgotStep === 2 && "Verify OTP"}
                    {forgotStep === 3 && "Update Password"}
                  </button>
                  
                  <div className="text-center mt-4">
                    <button type="button" onClick={() => { setPageState("login"); setForgotStep(1); }} className="text-xs text-blue-500 hover:underline cursor-pointer">Back to Login</button>
                  </div>
                </form>
              ) : (
                <form onSubmit={handleLoginSubmit} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Email Address</label>
                    <input required type="email" name="email" value={formData.email} onChange={handleChange} className="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="rahul@gmail.com" />
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Password</label>
                    <div className="relative">
                      <input required type={showPassword ? "text" : "password"} name="password" value={formData.password} onChange={handleChange} className="w-full pl-3.5 pr-10 py-2.5 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="••••••••" minLength={6} />
                      <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
                        <Icon name={showPassword ? "eye" : "eye-off"} className="w-4 h-4" />
                      </button>
                    </div>
                  </div>

                  <div className="flex items-center justify-between text-xs">
                    <label className="flex items-center gap-2 text-slate-400">
                      <input type="checkbox" className="rounded bg-slate-800 border-slate-700" /> Remember Me
                    </label>
                    <button type="button" onClick={() => setPageState("forgot")} className="text-blue-500 hover:underline cursor-pointer">Forgot Password?</button>
                  </div>

                  <button type="submit" className="w-full py-3.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow transition cursor-pointer">
                    Sign In
                  </button>
                  
                  <div className="text-center text-xs text-slate-400 mt-4">
                    <p>Don't have an account? <a href="register.html" className="text-blue-500 hover:underline font-bold cursor-pointer">Sign Up</a></p>
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<LoginPage />);
  </script>
</body>
</html>
