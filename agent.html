  <script>
    // Cryptographic Secure Hashing function for session validation
    const sha256Direct = async (text) => {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // Fast Session Verification & Redirection Guard
    (async () => {
      const storedSession = localStorage.getItem("krv-current-user-session");
      if (!storedSession) {
        window.location.href = "login.html";
        return;
      }
      try {
        const { user, signature } = JSON.parse(storedSession);
        if (!user || !signature || user.role !== "agent") {
          localStorage.removeItem("krv-current-user-session");
          window.location.href = "login.html";
          return;
        }
        const expectedSig = await sha256Direct(`${user.id}:${user.email}:${user.role}:KRV-SESSION-SECRET-2026!`);
        if (signature !== expectedSig) {
          localStorage.removeItem("krv-current-user-session");
          window.location.href = "login.html";
        }
      } catch (e) {
        localStorage.removeItem("krv-current-user-session");
        window.location.href = "login.html";
      }
    })();
  </script>

    // Cryptographic Secure One-Way SHA-256 Hash Function
    const sha256 = async (text) => {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    const getSaltedHash = async (email, password) => {
      const payload = `${email.toLowerCase()}:${password}:KRV-PEPPER-2026-T#9!`;
      return await sha256(payload);
    };

    const signSession = async (user) => {
      if (!user) return "";
      const payload = `${user.id}:${user.email}:${user.role}`;
      return await sha256(payload + ":KRV-SESSION-SECRET-2026!");

    // Toast Component
    const Toast = ({ message, type = "success", onClose }) => {

    // 1. Agent Overview Tab
    function AgentOverview({ currentUser, myTeam, myTeamSubmissions, setCurrentPage }) {
      const stats = useMemo(() => {
        const kycApproved = myTeam.filter(c => c.kyc_status === "Approved").length;
        const awaitingAuditing = myTeam.filter(c => c.kyc_status === "Pending").length;
        const totalEarnings = myTeam.reduce((sum, c) => sum + (c.earnings_paid || 0) + (c.wallet_balance || 0), 0);
        return {
          teamSize: myTeam.length,
          kycApproved,
          awaitingAuditing,
          totalEarnings
        };
      }, [myTeam]);

      return (
        <div className="space-y-6 animate-fadeIn">

    // 2. My Team Directory Tab
    function AgentTeam({ myTeam, triggerToast }) {
      const [filterKyc, setFilterKyc] = useState("All");
      const [searchQuery, setSearchQuery] = useState("");

      const filteredTeam = useMemo(() => {
        return myTeam.filter(member => {
          const matchesKyc = filterKyc === "All" || member.kyc_status === filterKyc;
          const term = searchQuery.toLowerCase().trim();
          const matchesSearch = term === "" || 
            member.name.toLowerCase().includes(term) || 
            member.email.toLowerCase().includes(term) || 
            member.mobile.includes(term) ||
            (member.city && member.city.toLowerCase().includes(term));
          return matchesKyc && matchesSearch;
        });
      }, [myTeam, filterKyc, searchQuery]);

      const handleCopyReferral = () => {
        navigator.clipboard.writeText(window.location.origin + "/register.html");
        triggerToast("Registration portal link copied! Guide users to select your name in Referred By field.");
      };

      return (

              <span>Copy Portal Link</span>
            </button>
          </div>

          {/* Filtering and Searching Controls */}

            <div className="flex gap-2 overflow-x-auto w-full md:w-auto pb-1 md:pb-0">
              {["All", "Approved", "Pending", "Rejected", "Blocked"].map(status => (
                <button key={status} onClick={() => setFilterKyc(status)} className={`px-4 py-1.5 rounded-full text-xs font-bold shrink-0 cursor-pointer transition ${
                  filterKyc === status ? "bg-blue-600 text-white shadow" : "bg-slate-100 dark:bg-slate-800 text-slate-500 hover:bg-slate-200"
                }`}>
                  {status} KYC

            </div>

            <div className="relative w-full md:max-w-xs shrink-0">

                    <th>Mobile</th>
                    <th>City</th>
                    <th>Wallet Balance</th>
                    <th>Total Paid</th>
                    <th>KYC Verification</th>

                      <td className="text-slate-400">{member.mobile}</td>
                      <td className="text-slate-400">{member.city || "N/A"}</td>

                      <td className="font-bold text-emerald-500">₹{member.earnings_paid || 0}</td>

                      </td>
                    </tr>

                    <tr>
                      <td colSpan="7" className="py-8 text-center text-slate-500">No candidates match the specified filter or search term.</td>

            </div>

    // 3. Team Submissions Auditing Tab
    function AgentSubmissions({ myTeamSubmissions, users, tasks }) {
      const getCandidateName = (userId) => {
        const c = users.find(u => u.id === userId);
        return c ? c.name : "N/A";
      };

      const getTaskTitle = (taskId) => {
        const t = tasks.find(tsk => tsk.id === taskId);
        return t ? t.title : `Task-${taskId}`;
      };

      return (
        <div className="space-y-6 animate-fadeIn">
          <div>
            <h3 className="text-lg font-bold text-white">Team Task Submissions: {myTeamSubmissions.length} proofs</h3>

          </div>

          <div className="glass-card rounded-2xl p-6">
            <div className="overflow-x-auto">
              <table className="w-full text-xs text-left border-collapse">

                  <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                    <th className="py-3">Sub ID</th>
                    <th>Candidate</th>
                    <th>Task Name</th>
                    <th>Amount</th>
                    <th>Submission Date</th>
                    <th>Verification Link</th>
                    <th>Review Status</th>

                </thead>
                <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">

                    <tr key={s.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                      <td className="py-3.5 font-bold text-slate-500">SUB-{s.id.toUpperCase()}</td>
                      <td className="font-bold text-white">{getCandidateName(s.user_id)}</td>
                      <td className="text-slate-350 max-w-[150px] truncate" title={getTaskTitle(s.task_id)}>{getTaskTitle(s.task_id)}</td>
                      <td className="font-extrabold text-emerald-500">₹{s.amount}</td>
                      <td className="text-slate-400">{s.date}</td>
                      <td className="text-blue-500 max-w-[150px] truncate">
                        <a href={s.submitted_link} target="_blank" rel="noopener noreferrer" className="hover:underline">{s.submitted_link}</a>
                      </td>
                      <td>
                        <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                          s.review_status === "Approved" ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20" :
                          s.review_status === "Rejected" ? "bg-rose-500/10 text-rose-500 border border-rose-500/20" :
                          "bg-amber-500/10 text-amber-500 border border-amber-500/20"
                        }`}>{s.review_status}</span>
                      </td>
                    </tr>
                  ))}
                  {myTeamSubmissions.length === 0 && (
                    <tr>
                      <td colSpan="7" className="py-8 text-center text-slate-500">No task submissions uploaded by your team members yet.</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // 4. Agent Profile Editing Tab
    function AgentProfile({ currentUser, setUsers, triggerToast }) {
      const [form, setForm] = useState({
        name: currentUser.name,
        email: currentUser.email,
        mobile: currentUser.mobile,
        city: currentUser.city || "",
        password: ""
      });

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        
        let hashedPassword = currentUser.password;
        if (form.password.trim() !== "") {
          hashedPassword = await getSaltedHash(currentUser.email, form.password);
        }

        setUsers(prev => prev.map(u => {
          if (u.id === currentUser.id) {
            return {
              ...u,
              mobile: form.mobile,
              city: form.city,
              password: hashedPassword
            };
          }
          return u;
        }));

        triggerToast("Profile details updated successfully!");
        setForm(prev => ({ ...prev, password: "" }));
      };

      return (
        <div className="max-w-xl mx-auto glass-card rounded-2xl p-6 animate-fadeIn">
          <div>
            <h3 className="text-lg font-bold text-white">Agent Personal Profile</h3>
            <p className="text-xs text-slate-400 mt-0.5 font-medium">Update your profile parameters or securely reset your login password.</p>
          </div>

          <form onSubmit={handleUpdateProfile} className="space-y-4 mt-6">
            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Agent Name</label>
              <input disabled type="text" value={form.name} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-800 bg-white/5 text-slate-400 cursor-not-allowed" />
              <span className="text-[10px] text-slate-500 block mt-1">Agency Name can only be changed by system administration.</span>
            </div>
            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Email Address</label>
              <input disabled type="email" value={form.email} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-800 bg-white/5 text-slate-400 cursor-not-allowed" />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Mobile Number</label>
              <input required type="tel" pattern="[0-9]{10}" value={form.mobile} onChange={(e) => setForm({ ...form, mobile: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white focus:outline-none focus:border-blue-500" />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">City</label>
              <input required type="text" value={form.city} onChange={(e) => setForm({ ...form, city: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white focus:outline-none focus:border-blue-500" />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Change Password (Leave blank to keep current)</label>
              <input type="password" value={form.password} onChange={(e) => setForm({ ...form, password: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white focus:outline-none focus:border-blue-500" placeholder="Enter new password" />
            </div>

            <button type="submit" className="w-full py-3.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow transition cursor-pointer">
              Save Profile Changes
            </button>
          </form>
        </div>
      );
    }

    // ==========================================
    // MAIN AGENT DASHBOARD PAGE LAYOUT
    // ==========================================
    function AgentPanel({
      currentPage, setCurrentPage, currentUser, users, setUsers, tasks, submissions, handleLogout, theme, setTheme, triggerToast
    }) {
      const [sidebarOpen, setSidebarOpen] = useState(() => window.innerWidth >= 768);

      const myTeam = useMemo(() => {
        return users.filter(u => u.role === "candidate" && u.referral_code === currentUser.name);
      }, [users, currentUser]);

      const myTeamSubmissions = useMemo(() => {
        const teamIds = myTeam.map(c => c.id);
        return submissions.filter(s => teamIds.includes(s.user_id));
      }, [submissions, myTeam]);

      const menuItems = [
        { id: "agent-overview", icon: "home", label: "Overview" },
        { id: "agent-team", icon: "profile", label: "My Team" },
        { id: "agent-submissions", icon: "tasks", label: "Team Submissions" },
        { id: "agent-profile", icon: "support", label: "My Profile" }
      ];

      return (
        <div className="min-h-screen flex">
          {/* Mobile Sidebar Backdrop Overlay */}
          {sidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/60 backdrop-blur-sm z-20 md:hidden cursor-pointer" 
              onClick={() => setSidebarOpen(false)}
            />
          )}

          {/* Sidebar Drawer */}
          <aside className={`bg-slate-900 border-r border-slate-800 text-slate-300 w-64 shrink-0 flex flex-col justify-between transition-all duration-300 ${
            sidebarOpen ? "translate-x-0" : "-translate-x-full md:w-0"
          } fixed md:relative h-full md:h-auto z-30`}>
            
            <div>
              {/* Sidebar Branding */}
              <div className="p-6 flex items-center justify-between border-b border-slate-800 bg-slate-950/20 whitespace-nowrap">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold shrink-0">A</div>
                  <div className="min-w-0">
                    <span className="text-sm font-bold tracking-tight text-white block truncate">KRV Agent</span>
                    <span className="block text-[8px] font-bold text-slate-400 uppercase tracking-widest truncate">Authorized Partner</span>
                  </div>
                </div>
                <button onClick={() => setSidebarOpen(false)} className="md:hidden text-slate-400 hover:text-white"><Icon name="x-circle" className="w-4 h-4" /></button>
              </div>

              {/* Sidebar Menu */}
              <nav className="p-4 space-y-1">
                {menuItems.map(item => (
                  <button 
                    key={item.id}
                    onClick={() => {
                      setCurrentPage(item.id);
                      if (window.innerWidth < 768) setSidebarOpen(false);
                    }}
                    className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-semibold transition cursor-pointer whitespace-nowrap ${
                      currentPage === item.id 
                        ? "bg-blue-600 text-white shadow-lg" 
                        : "hover:bg-slate-800 hover:text-white"
                    }`}
                  >
                    <Icon name={item.icon} className="w-4 h-4 mr-3 shrink-0" />
                    <span className="whitespace-nowrap">{item.label}</span>
                  </button>
                ))}
              </nav>
            </div>

            {/* Logout button */}
            <div className="p-4 border-t border-slate-800 bg-slate-950/15">
              <button onClick={handleLogout} className="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold hover:bg-red-500/10 hover:text-red-400 transition cursor-pointer whitespace-nowrap">
                <Icon name="logout" className="w-4 h-4 shrink-0" />
                <span className="whitespace-nowrap">Logout</span>
              </button>
            </div>
          </aside>

          {/* Main Content Window */}
          <div className="flex-grow flex flex-col min-h-screen overflow-x-hidden">
            {/* Header */}
            <header className="px-6 py-4 flex items-center justify-between bg-white/70 dark:bg-slate-900/60 backdrop-blur-xl border-b border-slate-200/50 dark:border-slate-800/40 relative z-20">
              <div className="flex items-center gap-4">
                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-350 cursor-pointer">
                  <Icon name="menu" className="w-4 h-4" />
                </button>
                <h1 className="text-xl font-bold tracking-tight capitalize">{currentPage.replace("agent-", "")} Panel</h1>
              </div>

              <div className="flex items-center gap-3">
                <span className="bg-indigo-500/10 border border-indigo-500/20 text-indigo-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">
                  Partner Agent
                </span>

                <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-350 cursor-pointer">
                  <Icon name={theme === "dark" ? "sun" : "moon"} className="w-4 h-4" />
                </button>

                <button 
                  onClick={handleLogout} 
                  title="Logout Account"
                  className="px-3.5 py-2.5 rounded-lg bg-rose-600/10 hover:bg-rose-600 text-rose-500 hover:text-white border border-rose-500/20 text-xs font-bold transition flex items-center gap-1.5 cursor-pointer"
                >
                  <Icon name="logout" className="w-4 h-4" />
                  <span className="hidden sm:inline">Logout</span>
                </button>
              </div>
            </header>

            {/* Sub-tab Content Router */}
            <div className="p-6 flex-grow overflow-y-auto">
              
              {currentPage === "agent-overview" && (
                <AgentOverview 
                  currentUser={currentUser} 
                  myTeam={myTeam}
                  myTeamSubmissions={myTeamSubmissions}
                  setCurrentPage={setCurrentPage} 
                />
              )}

              {currentPage === "agent-team" && (
                <AgentTeam 
                  myTeam={myTeam} 
                  triggerToast={triggerToast} 
                />
              )}

              {currentPage === "agent-submissions" && (
                <AgentSubmissions 
                  myTeamSubmissions={myTeamSubmissions} 
                  users={users}
                  tasks={tasks}
                />
              )}

              {currentPage === "agent-profile" && (
                <AgentProfile 
                  currentUser={currentUser} 
                  setUsers={setUsers} 
                  triggerToast={triggerToast} 
                />
              )}

            </div>
          </div>
        </div>
      );
    }

    // Main Container App
    function AgentPanelContainer() {
      const [theme, setTheme] = useState(() => localStorage.getItem("krv-theme") || "dark");
      const [currentPage, setCurrentPage] = useState("agent-overview");
      const [currentUser, setCurrentUser] = useState(null);
      const [isDbLoading, setIsDbLoading] = useState(true);

      const [users, setUsers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [toast, setToast] = useState(null);

      const prevUsersRef = useRef([]);

      useEffect(() => {
        const root = window.document.documentElement;
        if (theme === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }
        localStorage.setItem("krv-theme", theme);
      }, [theme]);

      const triggerToast = (message, type = "success") => {
        setToast({ message, type });
      };

      // Bootstrap logic
      useEffect(() => {
        let channel = null;

        const verifyIntegrityAndSession = async () => {
          const client = getSupabaseClient();
          if (client) {
            try {
              const storedSession = localStorage.getItem("krv-current-user-session");
              if (!storedSession) {
                window.location.href = "login.html";
                return;
              }
              const { user } = JSON.parse(storedSession);

              // 1. Fetch Users
              const { data: dbUsers, error: usersErr } = await client.from("krv_users").select("*");
              if (!usersErr && dbUsers) {
                setUsers(dbUsers);
                prevUsersRef.current = dbUsers;
                const matchedUser = dbUsers.find(u => u.id === user.id);
                if (matchedUser) {
                  setCurrentUser(matchedUser);
                }
              }

              // 2. Fetch Tasks
              const { data: dbTasks, error: tasksErr } = await client.from("krv_tasks").select("*");
              if (!tasksErr && dbTasks) {
                setTasks(dbTasks.filter(t => t.status !== "Deleted"));
              }

              // 3. Fetch Submissions
              const { data: dbSubs, error: subsErr } = await client.from("krv_submissions").select("*");
              if (!subsErr && dbSubs) {
                setSubmissions(dbSubs);
              }

              // Real-time PostgreSQL changes listener
              channel = client.channel('krv-agent-realtime')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_users' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setUsers(prev => {
                      const next = prev.map(u => u.id === payload.new.id ? payload.new : u);
                      prevUsersRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'INSERT') {
                    setUsers(prev => {
                      const next = prev.some(u => u.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevUsersRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_submissions' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setSubmissions(prev => prev.some(s => s.id === payload.new.id) ? prev : [...prev, payload.new]);
                  } else if (payload.eventType === 'UPDATE') {
                    setSubmissions(prev => prev.map(s => s.id === payload.new.id ? payload.new : s));
                  }
                })
                .subscribe();

            } catch (err) {
              console.error("verifyIntegrityAndSession error:", err);
            }
          }
          setIsDbLoading(false);
        };

        verifyIntegrityAndSession();

        return () => {
          if (channel) {
            const client = getSupabaseClient();
            if (client) client.removeChannel(channel);
          }
        };
      }, []);

      // Synchronize currentUser with users list
      useEffect(() => {
        if (currentUser) {
          const latestUser = users.find(u => u.id === currentUser.id);
          if (latestUser && JSON.stringify(latestUser) !== JSON.stringify(currentUser)) {
            setCurrentUser(latestUser);
            signSession(latestUser).then(sig => {
              localStorage.setItem("krv-current-user-session", JSON.stringify({ user: latestUser, signature: sig }));
            });
          }
        }
      }, [users, currentUser]);

      // Background cloud sync for profile modifications
      useEffect(() => {
        const saveSecureDb = async () => {
          const client = getSupabaseClient();
          if (client && !isDbLoading) {
            try {
              const prevUsers = prevUsersRef.current;
              if (JSON.stringify(prevUsers) !== JSON.stringify(users)) {
                const changedUsers = users.filter(u => {
                  const prevU = prevUsers.find(pu => pu.id === u.id);
                  return !prevU || JSON.stringify(prevU) !== JSON.stringify(u);
                });
                if (changedUsers.length > 0) {
                  const { error } = await client.from("krv_users").upsert(changedUsers);
                  if (error) {
                    console.error("Users sync failed:", error);
                    triggerToast("Sync Error (Users): " + error.message, "error");
                  }
                }
                prevUsersRef.current = users;
              }
            } catch (err) {
              console.error("Supabase sync error:", err);
            }
          }
        };
        saveSecureDb();
      }, [users, isDbLoading]);

      const handleLogout = () => {
        localStorage.removeItem("krv-current-user-session");
        window.location.href = "login.html";
      };

      if (isDbLoading || !currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center space-y-4">
              <div className="w-12 h-12 rounded-full border-4 border-blue-500 border-t-transparent animate-spin mx-auto"></div>
              <span className="block text-xs font-bold uppercase tracking-widest text-slate-400 animate-pulse">Loading Partner Workspace...</span>
            </div>
          </div>
        );
      }

      if (currentUser && (currentUser.kyc_status === "Blocked" || currentUser.status === "Blocked")) {
        return (
          <div className="min-h-screen flex items-center justify-center app-bg p-4">
            <div className="max-w-md w-full p-8 rounded-2xl glass-card text-center space-y-6 border border-rose-500/30 shadow-2xl">
              <div className="w-20 h-20 rounded-full bg-rose-500/10 text-rose-500 flex items-center justify-center mx-auto border border-rose-500/20">
                <Icon name="x-circle" className="w-10 h-10" />
              </div>
              <div className="space-y-2">
                <h3 className="text-2xl font-bold text-white tracking-tight">Agent Account Suspended</h3>
                <p className="text-xs text-slate-400 leading-relaxed">
                  Your partner agent workspace has been suspended by the system administrator. All operations, team access, and submissions are currently locked.
                </p>
              </div>
              <div className="p-4 rounded-xl bg-slate-950/50 text-[11px] text-slate-400 text-left border border-slate-800 space-y-1.5">
                <p>• Referred team candidates are preserved securely.</p>
                <p>• Cumulative balance and payroll history remain intact.</p>
                <p>• Contact support to appeal this suspension.</p>
              </div>
              <button 
                onClick={handleLogout} 
                className="w-full py-3.5 text-xs font-bold text-white bg-rose-600 hover:bg-rose-700 rounded-xl shadow-lg transition uppercase tracking-wider cursor-pointer"
              >
                Logout Account
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          <AgentPanel
            currentPage={currentPage}
            setCurrentPage={setCurrentPage}
            currentUser={currentUser}
            users={users}
            setUsers={setUsers}
            tasks={tasks}
            submissions={submissions}
            handleLogout={handleLogout}
            theme={theme}
            setTheme={setTheme}
            triggerToast={triggerToast}
          />
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<AgentPanelContainer />);
  </script>
</body>
</html>
