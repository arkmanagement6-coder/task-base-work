                    return (
                      <tr key={agent.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                        <td className="py-3.5 font-bold text-slate-500 uppercase">AGNT-{agent.id.replace("a", "").slice(-5)}</td>
                        <td className="font-bold text-white">{agent.name}</td>
                        <td className="text-slate-400">{agent.email}</td>
                        <td className="text-slate-400">{agent.mobile}</td>
                        <td className="text-slate-400">{agent.city || "N/A"}</td>
                        <td>
                          <span className="px-2 py-0.5 rounded bg-blue-500/10 text-blue-500 border border-blue-500/20 font-extrabold">
                            {referredCandidates.length} Members
                          </span>
                        </td>
                        <td>
                          <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                            isBlocked 
                              ? "bg-rose-500/15 text-rose-400 border border-rose-500/25" 
                              : "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20"
                          }`}>
                            {isBlocked ? "Blocked" : "Active"}
                          </span>
                        </td>
                        <td className="text-right">
                          <div className="flex justify-end gap-2">
                            <button onClick={() => setManagingTeamAgent(managingTeamAgent?.id === agent.id ? null : agent)} className="px-2 py-1 bg-indigo-600/10 hover:bg-indigo-600 text-indigo-400 hover:text-white border border-indigo-500/20 text-[9px] font-bold uppercase rounded cursor-pointer transition">
                              Manage Team
                            </button>
                            <button onClick={() => handleToggleAgentBlock(agent.id)} className={`px-2 py-1 text-[9px] font-bold uppercase rounded cursor-pointer transition ${isBlocked ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20" : "bg-amber-500/10 text-amber-500 border border-amber-500/20"}`}>
                              {isBlocked ? "Unblock" : "Block"}
                            </button>
                            <button onClick={() => handleEditClick(agent)} className="px-2 py-1 bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white border border-blue-500/20 text-[9px] font-bold uppercase rounded cursor-pointer transition">
                              Edit
                            </button>
                            <button onClick={() => handleDeleteAgent(agent.id, agent.name)} className="px-2 py-1 bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/20 text-[9px] font-bold uppercase rounded cursor-pointer transition">
                              Delete
                            </button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                  {agents.length === 0 && (
                    <tr>
                      <td colSpan="8" className="text-center py-6 text-slate-500">No agents registered. Click "Onboard New Agent" to begin.</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Manage Team Sub-panel */}
          {managingTeamAgent && (
            <div className="glass-card rounded-2xl p-6 border border-indigo-500/30">
              <div className="flex justify-between items-center mb-4">
                <div>
                  <h4 className="font-bold text-base text-white">Manage Referred Team for: <span className="text-indigo-400">{managingTeamAgent.name}</span></h4>
                  <p className="text-xs text-slate-400 mt-0.5">Assign or re-assign any candidate user to this agent's referred team.</p>
                </div>
                <button onClick={() => setManagingTeamAgent(null)} className="text-slate-400 hover:text-white">
                  <Icon name="x-circle" className="w-5 h-5" />
                </button>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* Current Team list */}
                <div className="border border-slate-800 rounded-xl p-4 bg-slate-950/20">
                  <span className="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-3">Current Team Members ({candidates.filter(c => c.referral_code === managingTeamAgent.name).length})</span>
                  <div className="max-h-60 overflow-y-auto divide-y divide-slate-800/60 pr-2">
                    {candidates.filter(c => c.referral_code === managingTeamAgent.name).map(member => (
                      <div key={member.id} className="py-2.5 flex items-center justify-between">
                        <div>
                          <span className="font-bold text-sm text-white block">{member.name}</span>
                          <span className="text-[10px] text-slate-500 block">{member.email} | {member.mobile}</span>
                        </div>
                        <button onClick={() => handleAssignCandidate(member.id, "")} className="text-[9px] font-bold text-rose-400 hover:text-rose-300 uppercase hover:underline">
                          Remove Team
                        </button>
                      </div>
                    ))}
                    {candidates.filter(c => c.referral_code === managingTeamAgent.name).length === 0 && (
                      <span className="block text-xs text-slate-500 text-center py-4">No candidates currently in this agent's team.</span>
                    )}
                  </div>
                </div>

                {/* Candidate Assignment Search/Select */}
                <div className="border border-slate-800 rounded-xl p-4 bg-slate-950/20">
                  <span className="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Search & Assign Candidates</span>
                  <input type="text" placeholder="Search by name, email, or mobile..." value={candidateSearch} onChange={(e) => setCandidateSearch(e.target.value)} className="w-full px-3 py-2 text-xs rounded-lg border border-slate-800 bg-white/5 text-white mb-3" />
                  
                  <div className="max-h-48 overflow-y-auto divide-y divide-slate-800/60 pr-2">
                    {candidates
                      .filter(c => {
                        const term = candidateSearch.toLowerCase().trim();
                        if (term === "") return true;
                        return c.name.toLowerCase().includes(term) || c.email.toLowerCase().includes(term) || c.mobile.includes(term);
                      })
                      .map(candidate => {
                        const isAlreadyInTeam = candidate.referral_code === managingTeamAgent.name;
                        return (
                          <div key={candidate.id} className="py-2 flex items-center justify-between">
                            <div>
                              <span className="font-bold text-xs text-white block">{candidate.name}</span>
                              <span className="text-[9px] text-slate-500 block">Referred By: {candidate.referral_code || "None"}</span>
                            </div>
                            {isAlreadyInTeam ? (
                              <span className="text-[9px] font-bold text-indigo-400 uppercase">Assigned</span>
                            ) : (
                              <button onClick={() => handleAssignCandidate(candidate.id, managingTeamAgent.name)} className="px-2 py-1 bg-blue-600 hover:bg-blue-700 text-white text-[9px] font-bold rounded">
                                Assign
                              </button>
                            )}
                          </div>
                        );
                      })}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 10. Support Tickets (AdminSupport Component)
    function AdminSupport({ tickets, setTickets, users, setNotifications, notifications, triggerToast }) {
      const [selectedTicketId, setSelectedTicketId] = React.useState(null);
      const [replyText, setReplyText] = React.useState("");
      const [statusFilter, setStatusFilter] = React.useState("All"); // "All", "Open", "Closed"
      const [categoryFilter, setCategoryFilter] = React.useState("All");
      const [searchQuery, setSearchQuery] = React.useState("");

      const getCandidateInfo = React.useCallback((userId) => {
        const u = users.find(x => x.id === userId);
        return u || { name: "Unknown Candidate", mobile: "N/A", email: "N/A", kyc_status: "N/A", wallet_balance: 0 };
      }, [users]);

      const filteredTickets = React.useMemo(() => {
        return tickets.filter(t => {
          const u = getCandidateInfo(t.user_id);
          
          if (statusFilter !== "All" && t.status !== statusFilter) return false;
          if (categoryFilter !== "All" && t.category !== categoryFilter) return false;
          
          if (searchQuery.trim() !== "") {
            const term = searchQuery.toLowerCase().trim();
            const ticketIdText = `tk-${t.id}`.toLowerCase();
            const matchId = ticketIdText.includes(term) || t.id.toLowerCase().includes(term);
            const matchSubject = t.subject && t.subject.toLowerCase().includes(term);
            const matchCategory = t.category && t.category.toLowerCase().includes(term);
            const matchDesc = t.description && t.description.toLowerCase().includes(term);
            const matchName = u.name && u.name.toLowerCase().includes(term);
            const matchMobile = u.mobile && u.mobile.includes(term);
            const matchEmail = u.email && u.email.toLowerCase().includes(term);
            return matchId || matchSubject || matchCategory || matchDesc || matchName || matchMobile || matchEmail;
          }
          return true;
        }).sort((a, b) => {
          if (a.status === "Open" && b.status !== "Open") return -1;
          if (a.status !== "Open" && b.status === "Open") return 1;
          return b.id.localeCompare(a.id);
        });
      }, [tickets, statusFilter, categoryFilter, searchQuery, getCandidateInfo]);

      const selectedTicket = React.useMemo(() => {
        return tickets.find(t => t.id === selectedTicketId) || null;
      }, [tickets, selectedTicketId]);

      const counts = React.useMemo(() => {
        const open = tickets.filter(t => t.status === "Open").length;
        const closed = tickets.filter(t => t.status === "Closed").length;
        return { total: tickets.length, open, closed };
      }, [tickets]);

      const handleSendReply = (e) => {
        if (e) e.preventDefault();
        if (!selectedTicket || !replyText.trim()) return;

        const newReply = {
          sender: "Admin Support",
          message: replyText.trim(),
          timestamp: new Date().toISOString()
        };

        const updatedReplies = [...(selectedTicket.replies || []), newReply];

        setTickets(prev => prev.map(t => t.id === selectedTicket.id ? { ...t, replies: updatedReplies } : t));
        
        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: selectedTicket.user_id,
          title: `Support Reply: TK-${selectedTicket.id.toUpperCase()}`,
          message: `Admin replied: "${replyText.trim().substring(0, 60)}${replyText.trim().length > 60 ? '...' : ''}"`,
          date: new Date().toISOString().split('T')[0]
        };
        setNotifications(prev => [...prev, newNotif]);

        triggerToast("Reply posted successfully!");
        setReplyText("");
      };

      const handleToggleStatus = () => {
        if (!selectedTicket) return;
        const newStatus = selectedTicket.status === "Open" ? "Closed" : "Open";
        
        setTickets(prev => prev.map(t => t.id === selectedTicket.id ? { ...t, status: newStatus } : t));
        
        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: selectedTicket.user_id,
          title: `Ticket Status Update: TK-${selectedTicket.id.toUpperCase()}`,
          message: `Your ticket has been marked as ${newStatus}.`,
          date: new Date().toISOString().split('T')[0]
        };
        setNotifications(prev => [...prev, newNotif]);
        
        triggerToast(`Ticket marked as ${newStatus}!`);
      };

      const handleQuickReply = (text) => {
        setReplyText(text);
      };

      const selectedCandidate = selectedTicket ? getCandidateInfo(selectedTicket.user_id) : null;

      return (
        <div className="space-y-6 text-left">
          {/* Header Stats */}
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div className="glass-card rounded-2xl p-4 flex items-center justify-between">
              <div>
                <span className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Total Tickets</span>
                <h3 className="text-2xl font-bold text-white mt-1">{counts.total}</h3>
              </div>
              <div className="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500">
                <Icon name="support" className="w-5 h-5" />
              </div>
            </div>
            
            <div className="glass-card rounded-2xl p-4 flex items-center justify-between">
              <div>
                <span className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Active / Open</span>
                <div className="flex items-center gap-2 mt-1">
                  <h3 className="text-2xl font-bold text-emerald-400">{counts.open}</h3>
                  {counts.open > 0 && <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>}
                </div>
              </div>
              <div className="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                <Icon name="clock" className="w-5 h-5" />
              </div>
            </div>

            <div className="glass-card rounded-2xl p-4 flex items-center justify-between">
              <div>
                <span className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Resolved / Closed</span>
                <h3 className="text-2xl font-bold text-slate-400 mt-1">{counts.closed}</h3>
              </div>
              <div className="w-10 h-10 rounded-xl bg-slate-500/10 flex items-center justify-center text-slate-400">
                <Icon name="check-circle" className="w-5 h-5" />
              </div>
            </div>
          </div>

          {/* Main Workspace */}
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 min-h-[600px] h-[calc(100vh-280px)]">
            
            {/* Left Pane (Ticket List) */}
            <div className="lg:col-span-5 glass-card rounded-2xl flex flex-col overflow-hidden h-full">
              <div className="p-4 border-b border-slate-800 space-y-3 bg-slate-950/20">
                <div className="flex gap-1 bg-slate-900/60 p-1 rounded-xl">
                  {["All", "Open", "Closed"].map(tab => (
                    <button
                      key={tab}
                      onClick={() => setStatusFilter(tab)}
                      className={`flex-1 py-1.5 text-xs font-bold rounded-lg cursor-pointer transition-all ${
                        statusFilter === tab
                          ? "bg-blue-600 text-white shadow-md"
                          : "text-slate-400 hover:text-white"
                      }`}
                    >
                      {tab}
                    </button>
                  ))}
                </div>

                <div className="flex gap-2">
                  <div className="relative flex-1">
                    <input
                      type="text"
                      placeholder="Search tickets, names, numbers..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-9 pr-3 py-2 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white"
                    />
                    <Icon name="profile" className="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400" />
                  </div>
                  
                  <select
                    value={categoryFilter}
                    onChange={(e) => setCategoryFilter(e.target.value)}
                    className="px-2 py-2 text-xs rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-900 focus:outline-none focus:border-blue-500 text-white shrink-0"
                  >
                    <option value="All">All Categories</option>
                    <option value="Payments">Payments</option>
                    <option value="KYC Support">KYC Support</option>
                    <option value="Task Query">Task Query</option>
                    <option value="Account Query">Account Query</option>
                  </select>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-950/5">
                {filteredTickets.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-slate-500 p-8 text-center">
                    <Icon name="alert-circle" className="w-8 h-8 mb-2 text-slate-600" />
                    <span className="text-xs font-semibold">No tickets found matching filters.</span>
                  </div>
                ) : (
                  filteredTickets.map(tk => {
                    const c = getCandidateInfo(tk.user_id);
                    const isSelected = tk.id === selectedTicketId;
                    const categoryColors = {
                      "Payments": "bg-amber-500/10 text-amber-500 border-amber-500/20",
                      "KYC Support": "bg-yellow-500/10 text-yellow-500 border-yellow-500/20",
                      "Task Query": "bg-cyan-500/10 text-cyan-500 border-cyan-500/20",
                      "Account Query": "bg-indigo-500/10 text-indigo-500 border-indigo-500/20"
                    };
                    const badgeClass = categoryColors[tk.category] || "bg-slate-500/10 text-slate-400 border-slate-500/20";
                    
                    return (
                      <div
                        key={tk.id}
                        onClick={() => setSelectedTicketId(tk.id)}
                        className={`p-4 rounded-xl border transition-all cursor-pointer text-left ${
                          isSelected
                            ? "bg-blue-600/10 border-blue-500 shadow-lg shadow-blue-500/5"
                            : "bg-slate-900/40 border-slate-800 hover:border-slate-700"
                        }`}
                      >
                        <div className="flex justify-between items-start gap-2">
                          <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">
                            TK-{tk.id.toUpperCase()}
                          </span>
                          <span className={`px-1.5 py-0.5 rounded text-[8px] font-bold uppercase border ${
                            tk.status === "Open"
                              ? "bg-emerald-500/10 text-emerald-400 border-emerald-500/20 animate-pulse"
                              : "bg-slate-500/10 text-slate-400 border-slate-500/20"
                          }`}>
                            {tk.status}
                          </span>
                        </div>

                        <h4 className="font-bold text-sm text-white mt-1 line-clamp-1">
                          {tk.subject}
                        </h4>
                        
                        <p className="text-xs text-slate-400 line-clamp-2 mt-1">
                          {tk.description}
                        </p>

                        <div className="flex items-center justify-between mt-3 pt-2.5 border-t border-slate-800/40">
                          <div className="flex items-center gap-1.5 min-w-0">
                            <div className="w-4 h-4 rounded bg-blue-600 flex items-center justify-center text-[9px] font-bold text-white shrink-0">
                              {c.name.charAt(0).toUpperCase()}
                            </div>
                            <span className="text-[10px] font-semibold text-slate-300 truncate">
                              {c.name}
                            </span>
                          </div>
                          
                          <span className={`px-1.5 py-0.5 rounded-md text-[8px] font-bold border shrink-0 ${badgeClass}`}>
                            {tk.category}
                          </span>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>

            {/* Right Pane (Chat Pane) */}
            <div className="lg:col-span-7 glass-card rounded-2xl flex flex-col overflow-hidden h-full">
              {!selectedTicket ? (
                <div className="flex-grow flex flex-col items-center justify-center p-8 text-center text-slate-500">
                  <div className="w-16 h-16 rounded-2xl bg-slate-900/60 border border-slate-800 flex items-center justify-center mb-4">
                    <Icon name="support" className="w-8 h-8 text-slate-600" />
                  </div>
                  <h4 className="text-sm font-bold text-slate-300">No Ticket Selected</h4>
                  <p className="text-xs text-slate-500 max-w-xs mt-1">
                    Select a support ticket from the list on the left to read user details, post answers, and manage resolution statuses.
                  </p>
                </div>
              ) : (
                <div className="flex-1 flex flex-col overflow-hidden h-full">
                  <div className="p-4 border-b border-slate-800 bg-slate-950/20 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <div className="min-w-0">
                      <div className="flex items-center gap-2">
                        <span className="text-[9px] font-bold text-blue-400 uppercase tracking-wider">
                          TK-{selectedTicket.id.toUpperCase()}
                        </span>
                        <span className={`px-2 py-0.5 rounded text-[8px] font-bold uppercase border ${
                          selectedTicket.status === "Open"
                            ? "bg-emerald-500/10 text-emerald-400 border-emerald-500/20"
                            : "bg-slate-500/10 text-slate-400 border-slate-500/20"
                        }`}>
                          {selectedTicket.status}
                        </span>
                      </div>
                      <h4 className="font-bold text-base text-white mt-1 truncate">
                        {selectedTicket.subject}
                      </h4>
                    </div>

                    <button
                      onClick={handleToggleStatus}
                      className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition cursor-pointer flex items-center gap-1.5 ${
                        selectedTicket.status === "Open"
                          ? "bg-red-500/10 text-red-400 border-red-500/20 hover:bg-red-500/25"
                          : "bg-emerald-500/10 text-emerald-400 border-emerald-500/20 hover:bg-emerald-500/25"
                      }`}
                    >
                      <Icon name={selectedTicket.status === "Open" ? "x-circle" : "check-circle"} className="w-3.5 h-3.5" />
                      {selectedTicket.status === "Open" ? "Close Ticket" : "Reopen Ticket"}
                    </button>
                  </div>

                  <div className="px-4 py-2.5 bg-slate-950/40 border-b border-slate-800/80 flex flex-wrap items-center gap-x-6 gap-y-1.5 text-[11px] text-left">
                    <div className="text-slate-400">
                      Candidate: <span className="font-semibold text-slate-200">{selectedCandidate.name}</span>
                    </div>
                    <div className="text-slate-400">
                      Mobile: <span className="font-semibold text-slate-200">{selectedCandidate.mobile}</span>
                    </div>
                    <div className="text-slate-400">
                      Email: <span className="font-semibold text-slate-200">{selectedCandidate.email}</span>
                    </div>
                    <div className="text-slate-400">
                      Wallet: <span className="font-semibold text-emerald-400">₹{selectedCandidate.wallet_balance || 0}</span>
                    </div>
                    <div className="text-slate-400 flex items-center gap-1">
                      KYC:{" "}
                      <span className={`font-semibold uppercase text-[9px] px-1 rounded border ${
                        selectedCandidate.kyc_status === "Approved"
                          ? "bg-emerald-500/15 text-emerald-400 border-emerald-500/20"
                          : selectedCandidate.kyc_status === "Rejected"
                          ? "bg-red-500/15 text-red-400 border-red-500/20"
                          : "bg-amber-500/15 text-amber-400 border-amber-500/20"
                      }`}>
                        {selectedCandidate.kyc_status || "Pending"}
                      </span>
                    </div>
                  </div>

                  <div className="flex-grow overflow-y-auto p-4 space-y-4 bg-slate-950/15">
                    <div className="flex gap-3 justify-start max-w-[85%] text-left">
                      <div className="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center text-white text-xs font-bold shrink-0 mt-0.5 shadow-md">
                        {selectedCandidate.name.charAt(0).toUpperCase()}
                      </div>
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl rounded-tl-none p-3.5">
                        <span className="block text-[9px] font-bold uppercase tracking-wider text-slate-500">
                          {selectedCandidate.name} (Candidate)
                        </span>
                        <p className="text-xs text-slate-200 mt-1 leading-relaxed whitespace-pre-line">
                          {selectedTicket.description}
                        </p>
                        <span className="block text-[8px] text-slate-500 text-right mt-1.5">
                          Initial Query • Category: {selectedTicket.category}
                        </span>
                      </div>
                    </div>

                    {selectedTicket.replies && selectedTicket.replies.map((rep, idx) => {
                      const isAdmin = rep.sender === "Admin Support" || rep.sender === "System" || rep.sender.toLowerCase().includes("admin");
                      const initials = rep.sender.charAt(0).toUpperCase();
                      
                      return (
                        <div key={idx} className={`flex gap-3 max-w-[85%] ${isAdmin ? "ml-auto justify-end text-right" : "justify-start text-left"}`}>
                          {!isAdmin && (
                            <div className="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center text-white text-xs font-bold shrink-0 mt-0.5 shadow-md">
                              {initials}
                            </div>
                          )}
                          
                          <div className={`p-3.5 rounded-2xl ${
                            isAdmin
                              ? "bg-blue-600/10 border border-blue-500/20 rounded-tr-none"
                              : "bg-slate-900 border border-slate-800 rounded-tl-none"
                          }`}>
                            <span className="block text-[9px] font-bold uppercase tracking-wider text-slate-500">
                              {rep.sender}
                            </span>
                            <p className="text-xs text-slate-200 mt-1 leading-relaxed whitespace-pre-line">
                              {rep.message}
                            </p>
                            {rep.timestamp && (
                              <span className="block text-[8px] text-slate-500 mt-1.5">
                                {new Date(rep.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                              </span>
                            )}
                          </div>

                          {isAdmin && (

      const handleRestoreDefaults = async () => {
        if (!window.confirm("Are you sure you want to restore defaults?")) return;
        localStorage.removeItem("krv-users");
        localStorage.removeItem("krv-users-checksum");
        localStorage.removeItem("krv-tasks");
        localStorage.removeItem("krv-submissions");
        localStorage.removeItem("krv-kyc");
        localStorage.removeItem("krv-withdrawals");
        localStorage.removeItem("krv-tickets");
        localStorage.removeItem("krv-notifications");

        setUsers(DEFAULT_USERS);
        setTasks(DEFAULT_TASKS);
        setSubmissions(DEFAULT_SUBMISSIONS);
        setKycRecords(DEFAULT_KYC);
        setWithdrawals(DEFAULT_WITHDRAWALS);
        setTickets(DEFAULT_TICKETS);
        setNotifications(DEFAULT_NOTIFICATIONS);

        const check = await signUsersList(DEFAULT_USERS);
        localStorage.setItem("krv-users-checksum", check);
        triggerToast("Mock database defaults restored successfully!");
      };

      const handleSaveSettings = (e) => {
        e.preventDefault();
        localStorage.setItem("krv-supabase-url", formUrl.trim());

        setSupabaseUrl(formUrl.trim());
        setSupabaseKey(formKey.trim());
        triggerToast("Website settings and cloud credentials saved!");
      };

      const handleSyncCloud = async () => {
        if (!supabaseUrl || !supabaseKey) {
          triggerToast("Please configure your Supabase details first.", "error");
          return;
        }
        setIsSyncing(true);
        try {
          const client = window.supabase.createClient(supabaseUrl, supabaseKey);
          let failed = [];
          const syncTable = async (tableName, data) => {
            if (!data || data.length === 0) return;
            const { error } = await client.from(tableName).upsert(data);
            if (error) failed.push(tableName);
          };
          await syncTable("krv_users", users);
          await syncTable("krv_tasks", tasks);
          await syncTable("krv_submissions", submissions);
          await syncTable("krv_kyc", kycRecords);
          await syncTable("krv_withdrawals", withdrawals);
          await syncTable("krv_tickets", tickets);
          await syncTable("krv_notifications", notifications);

          if (failed.length === 0) triggerToast("Cloud fully synced!", "success");
          else triggerToast(`Partial sync failed: ${failed.join(", ")}`, "error");
        } finally {
          setIsSyncing(false);
        }

      const sqlCode = `-- COPY AND RUN THIS SCRIPT IN YOUR SUPABASE SQL EDITOR:
CREATE TABLE IF NOT EXISTS krv_users (id VARCHAR(50) PRIMARY KEY, name VARCHAR(100) NOT NULL, email VARCHAR(100) UNIQUE NOT NULL, password VARCHAR(255) NOT NULL, mobile VARCHAR(50), city VARCHAR(50), pincode VARCHAR(50), referral_code VARCHAR(50), wallet_balance DOUBLE PRECISION DEFAULT 0.0, earnings_pending DOUBLE PRECISION DEFAULT 0.0, earnings_paid DOUBLE PRECISION DEFAULT 0.0, kyc_status VARCHAR(50) DEFAULT 'Not Submitted', role VARCHAR(50) DEFAULT 'candidate', last_active VARCHAR(50), status VARCHAR(50) DEFAULT 'Active', created_at VARCHAR(50));

-- ALTER TABLE krv_users ADD COLUMN IF NOT EXISTS status VARCHAR(50) DEFAULT 'Active';
-- ALTER TABLE krv_users ADD COLUMN IF NOT EXISTS created_at VARCHAR(50);

-- DISABLE RLS TO ALLOW DIRECT CLIENT READ/WRITE (RECOMMENDED FOR STANDALONE CHANNELS):
ALTER TABLE krv_users DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_tasks DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_submissions DISABLE ROW LEVEL SECURITY;

ALTER TABLE krv_withdrawals DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_tickets DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_notifications DISABLE ROW LEVEL SECURITY;`;

                <button type="button" onClick={handleSyncCloud} disabled={isSyncing} className="w-full py-3 text-xs font-bold text-white rounded-xl bg-emerald-600 hover:bg-emerald-700">Sync Data to Cloud</button>

    // Main Container App
    function AdminPanelContainer() {
      const [theme, setTheme] = useState(() => localStorage.getItem("krv-theme") || "dark");
      const [currentPage, setCurrentPage] = useState("admin-dashboard");
      const [currentUser, setCurrentUser] = useState(null);
      const [isDbLoading, setIsDbLoading] = useState(true);

      const [users, setUsers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [kycRecords, setKycRecords] = useState([]);
      const [withdrawals, setWithdrawals] = useState([]);
      const [tickets, setTickets] = useState([]);
      const [notifications, setNotifications] = useState([]);
      const [toast, setToast] = useState(null);

      const [supabaseUrl, setSupabaseUrl] = useState(() => localStorage.getItem("krv-supabase-url") || SUPABASE_URL_DEFAULT);
      const [supabaseKey, setSupabaseKey] = useState(() => localStorage.getItem("krv-supabase-key") || SUPABASE_KEY_DEFAULT);

      const prevUsersRef = useRef([]);
      const prevTasksRef = useRef([]);
      const prevSubmissionsRef = useRef([]);
      const prevKycRecordsRef = useRef([]);
      const prevWithdrawalsRef = useRef([]);
      const prevTicketsRef = useRef([]);
      const prevNotificationsRef = useRef([]);

      useEffect(() => {
        const root = window.document.documentElement;
        if (theme === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }
        localStorage.setItem("krv-theme", theme);
      }, [theme]);

      const triggerToast = (message, type = "success") => {
        setToast({ message, type });
      };

      const updateWallet = (userId, prevStatus, newStatus, amount) => {
        const prev = (prevStatus || "").trim().toLowerCase();
        const next = (newStatus || "").trim().toLowerCase();
        const val = parseFloat(amount) || 0;
        
        if (prev === next) return;

        setUsers(prevUsers => prevUsers.map(u => {
          if (u.id !== userId) return u;

          let walletDiff = 0;
          let pendingDiff = 0;

          // Remove from previous state
          if (prev === "approved") {
            walletDiff -= val;
          } else if (prev === "pending" || prev === "under review") {
            pendingDiff -= val;
          }

          // Add to new state
          if (next === "approved") {
            walletDiff += val;
          } else if (next === "pending" || next === "under review") {
            pendingDiff += val;
          }

          return {
            ...u,
            wallet_balance: Math.max(0, (u.wallet_balance || 0) + walletDiff),
            earnings_pending: Math.max(0, (u.earnings_pending || 0) + pendingDiff)
          };
        }));
      };

      // Bootstrap and verification logic
      useEffect(() => {
        let channel = null;

        const verifyIntegrityAndSession = async () => {
          const client = getSupabaseClient();
          if (client) {
            try {
              const storedSession = localStorage.getItem("krv-current-user-session");
              if (!storedSession) {
                window.location.href = "login.html";
                return;
              }
              const { user } = JSON.parse(storedSession);

              // 1. Fetch Users
              const { data: dbUsers, error: usersErr } = await client.from("krv_users").select("*");
              if (!usersErr && dbUsers) {
                setUsers(dbUsers);
                prevUsersRef.current = dbUsers;
                const matchedUser = dbUsers.find(u => u.id === user.id);
                if (matchedUser) {
                  setCurrentUser(matchedUser);
                }
              }

              // 2. Fetch Tasks
              const { data: dbTasks, error: tasksErr } = await client.from("krv_tasks").select("*");
              if (!tasksErr && dbTasks) {
                const todayStr = new Date().toISOString().split('T')[0];
                const activeTasks = dbTasks.filter(t => t.status !== "Deleted").map(t => {
                  if (t.deadline && t.deadline < todayStr && t.status === "Active") {
                    return { ...t, status: "Stop" };
                  }
                  return t;
                });
                setTasks(activeTasks);
                prevTasksRef.current = activeTasks;
              }

              // 3. Fetch Submissions
              const { data: dbSubs, error: subsErr } = await client.from("krv_submissions").select("id,user_id,task_id,submitted_link,video,remarks,review_status,amount,date,rejection_reason");
              if (!subsErr && dbSubs) {
                setSubmissions(dbSubs);
                prevSubmissionsRef.current = dbSubs;
              }

              // 4. Fetch KYC
              const { data: dbKyc, error: kycErr } = await client.from("krv_kyc").select("*");
              if (!kycErr && dbKyc) {
                setKycRecords(dbKyc);
                prevKycRecordsRef.current = dbKyc;
              }

              // 5. Fetch Withdrawals
              const { data: dbWithdrawals, error: wErr } = await client.from("krv_withdrawals").select("*");
              if (!wErr && dbWithdrawals) {
                setWithdrawals(dbWithdrawals);
                prevWithdrawalsRef.current = dbWithdrawals;
              }

              // 6. Fetch Tickets
              const { data: dbTickets, error: tErr } = await client.from("krv_tickets").select("*");
              if (!tErr && dbTickets) {
                setTickets(dbTickets);
                prevTicketsRef.current = dbTickets;
              }

              // 7. Fetch Notifications
              const { data: dbNotifs, error: nErr } = await client.from("krv_notifications").select("*");
              if (!nErr && dbNotifs) {
                setNotifications(dbNotifs);
                prevNotificationsRef.current = dbNotifs;
              }

              // Set up Real-time Socket Channels
              channel = client.channel('krv-realtime-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_users' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setUsers(prev => {
                      const next = prev.map(u => u.id === payload.new.id ? payload.new : u);
                      prevUsersRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_tasks' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setTasks(prev => {
                      const next = prev.some(t => t.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevTasksRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setTasks(prev => {
                      const next = payload.new.status === 'Deleted'
                        ? prev.filter(t => t.id !== payload.new.id)
                        : prev.map(t => t.id === payload.new.id ? payload.new : t);
                      prevTasksRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'DELETE') {
                    setTasks(prev => {
                      const next = prev.filter(t => t.id !== payload.old.id);
                      prevTasksRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_submissions' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setSubmissions(prev => {
                      const next = prev.some(s => s.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevSubmissionsRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setSubmissions(prev => {
                      const next = prev.map(s => s.id === payload.new.id ? payload.new : s);
                      prevSubmissionsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_kyc' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setKycRecords(prev => {
                      const next = prev.map(k => k.id === payload.new.id ? payload.new : k);
                      prevKycRecordsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_withdrawals' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setWithdrawals(prev => {
                      const next = prev.some(w => w.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevWithdrawalsRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setWithdrawals(prev => {
                      const next = prev.map(w => w.id === payload.new.id ? payload.new : w);
                      prevWithdrawalsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_tickets' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setTickets(prev => {
                      const next = prev.map(t => t.id === payload.new.id ? payload.new : t);
                      prevTicketsRef.current = next;
                      return next;
                    });
                  }
                })
                .subscribe();

            } catch (err) {
              console.error("verifyIntegrityAndSession error:", err);
            }
          }
          setIsDbLoading(false);
        };

        verifyIntegrityAndSession();

        return () => {
          if (channel) {
            const client = getSupabaseClient();
            if (client) client.removeChannel(channel);
          }
        };
      }, []);

      // Synchronize currentUser with users list
      useEffect(() => {
        if (currentUser) {
          const latestUser = users.find(u => u.id === currentUser.id);
          if (latestUser && JSON.stringify(latestUser) !== JSON.stringify(currentUser)) {
            setCurrentUser(latestUser);
            signSession(latestUser).then(sig => {
              localStorage.setItem("krv-current-user-session", JSON.stringify({ user: latestUser, signature: sig }));
            });
          }
        }
      }, [users, currentUser]);

      // Auto-correct and recalculate earnings_pending based on submissions ground truth
      useEffect(() => {
        if (isDbLoading) return;
        
        let needsUpdate = false;
        const nextUsers = users.map(u => {
          const actualPending = submissions
            .filter(s => s.user_id === u.id && (s.review_status === "Pending" || s.review_status === "Under Review"))
            .reduce((sum, s) => sum + (parseFloat(s.amount) || 0), 0);
            
          if (u.earnings_pending !== actualPending) {
            needsUpdate = true;
            return { ...u, earnings_pending: actualPending };
          }
          return u;
        });
        
        if (needsUpdate) {
          setUsers(nextUsers);
        }
      }, [submissions, users, isDbLoading]);

      // Background cloud sync
      useEffect(() => {
        const saveSecureDb = async () => {
          const client = getSupabaseClient();
          if (client && !isDbLoading) {
            try {
              // Sync Users
              const prevUsers = prevUsersRef.current;
              if (JSON.stringify(prevUsers) !== JSON.stringify(users)) {
                const changedUsers = users.filter(u => {
                  const prevU = prevUsers.find(pu => pu.id === u.id);
                  return !prevU || JSON.stringify(prevU) !== JSON.stringify(u);
                });
                if (changedUsers.length > 0) {
                  const { error } = await client.from("krv_users").upsert(changedUsers);
                  if (error) {
                    console.error("Users sync failed:", error);
                    triggerToast("Sync Error (Users): " + error.message, "error");
                  }
                }
                
                // Handle deletions of users via physical hard-delete
                const deletedUsers = prevUsers.filter(pu => !users.some(u => u.id === pu.id));
                if (deletedUsers.length > 0) {
                  for (const du of deletedUsers) {
                    const { error } = await client.from("krv_users").delete().eq("id", du.id);
                    if (error) {
                      console.error("Users delete failed:", error);
                      triggerToast("Sync Error (Delete User): " + error.message, "error");
                    }
                  }
                }
                prevUsersRef.current = users;
              }

              // Sync Tasks
              const prevTasks = prevTasksRef.current;
              if (JSON.stringify(prevTasks) !== JSON.stringify(tasks)) {
                const changedTasks = tasks.filter(t => {
                  const prevT = prevTasks.find(pt => pt.id === t.id);
                  return !prevT || JSON.stringify(prevT) !== JSON.stringify(t);
                });
                if (changedTasks.length > 0) {
                  const { error } = await client.from("krv_tasks").upsert(changedTasks);
                  if (error) {
                    console.error("Tasks upsert failed:", error);
                    triggerToast("Sync Error (Tasks): " + error.message, "error");
                  }
                }

                // Handle deletions via hard-delete
                const deletedTasks = prevTasks.filter(pt => !tasks.some(t => t.id === pt.id));
                if (deletedTasks.length > 0) {
                  for (const dt of deletedTasks) {
                    const { error } = await client.from("krv_tasks").delete().eq("id", dt.id);
                    if (error) {
                      console.error("Tasks delete failed:", error);
                      triggerToast("Sync Error (Delete Task): " + error.message, "error");
                    }
                  }
                }
                prevTasksRef.current = tasks;
              }

              // Sync Submissions
              const prevSubs = prevSubmissionsRef.current;
              if (JSON.stringify(prevSubs) !== JSON.stringify(submissions)) {
                const changedSubs = submissions.filter(s => {
                  const prevS = prevSubs.find(ps => ps.id === s.id);
                  return !prevS || JSON.stringify(prevS) !== JSON.stringify(s);
                });
                if (changedSubs.length > 0) {
                  const { error } = await client.from("krv_submissions").upsert(changedSubs);
                  if (error) {
                    console.error("Submissions sync failed:", error);
                    triggerToast("Sync Error (Submissions): " + error.message, "error");
                  }
                }
                prevSubmissionsRef.current = submissions;
              }

              // Sync KYC Records
              const prevKyc = prevKycRecordsRef.current;
              if (JSON.stringify(prevKyc) !== JSON.stringify(kycRecords)) {
                const changedKyc = kycRecords.filter(k => {
                  const prevK = prevKyc.find(pk => pk.id === k.id);
                  return !prevK || JSON.stringify(prevK) !== JSON.stringify(k);
                });
                if (changedKyc.length > 0) {
                  const { error } = await client.from("krv_kyc").upsert(changedKyc);
                  if (error) {
                    console.error("KYC sync failed:", error);
                    triggerToast("Sync Error (KYC): " + error.message, "error");
                  }
                }
                prevKycRecordsRef.current = kycRecords;
              }

              // Sync Withdrawals
              const prevW = prevWithdrawalsRef.current;
              if (JSON.stringify(prevW) !== JSON.stringify(withdrawals)) {
                const changedW = withdrawals.filter(w => {
                  const prevWithdrawal = prevW.find(pw => pw.id === w.id);
                  return !prevWithdrawal || JSON.stringify(prevWithdrawal) !== JSON.stringify(w);
                });
                if (changedW.length > 0) {
                  const { error } = await client.from("krv_withdrawals").upsert(changedW);
                  if (error) {
                    console.error("Withdrawals sync failed:", error);
                    triggerToast("Sync Error (Withdrawals): " + error.message, "error");
                  }
                }
                prevWithdrawalsRef.current = withdrawals;
              }

              // Sync Tickets
              const prevTk = prevTicketsRef.current;
              if (JSON.stringify(prevTk) !== JSON.stringify(tickets)) {
                const changedTk = tickets.filter(t => {
                  const prevT = prevTk.find(pt => pt.id === t.id);
                  return !prevT || JSON.stringify(prevT) !== JSON.stringify(t);
                });
                if (changedTk.length > 0) {
                  const { error } = await client.from("krv_tickets").upsert(changedTk);
                  if (error) {
                    console.error("Tickets sync failed:", error);
                    triggerToast("Sync Error (Tickets): " + error.message, "error");
                  }
                }
                prevTicketsRef.current = tickets;
              }

              // Sync Notifications
              const prevNotifs = prevNotificationsRef.current;
              if (JSON.stringify(prevNotifs) !== JSON.stringify(notifications)) {
                const changedN = notifications.filter(n => {
                  const prevN = prevNotifs.find(pn => pn.id === n.id);
                  return !prevN || JSON.stringify(prevN) !== JSON.stringify(n);
                });
                if (changedN.length > 0) {
                  const { error } = await client.from("krv_notifications").upsert(changedN);
                  if (error) {
                    console.error("Notifications sync failed:", error);
                    triggerToast("Sync Error (Notifications): " + error.message, "error");
                  }
                }
                prevNotificationsRef.current = notifications;
              }

            } catch (err) {
              console.error("Supabase sync error:", err);
              triggerToast("Sync Exception: " + err.message, "error");
            }
          }
        };
        saveSecureDb();
      }, [users, tasks, submissions, kycRecords, withdrawals, tickets, notifications, isDbLoading]);

      const handleLogout = () => {
        localStorage.removeItem("krv-current-user-session");
        window.location.href = "login.html";
      };

      if (isDbLoading || !currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center space-y-4">
              <div className="w-12 h-12 rounded-full border-4 border-blue-500 border-t-transparent animate-spin mx-auto"></div>
              <span className="block text-xs font-bold uppercase tracking-widest text-slate-400 animate-pulse">Loading Admin Console...</span>
            </div>
          </div>
        );
      }

      return (
        <AdminPanel
          currentPage={currentPage}
          setCurrentPage={setCurrentPage}
          currentUser={currentUser}
          users={users}
          setUsers={setUsers}
          tasks={tasks}
          setTasks={setTasks}
          submissions={submissions}
          setSubmissions={setSubmissions}
          kycRecords={kycRecords}
          setKycRecords={setKycRecords}
          withdrawals={withdrawals}
          setWithdrawals={setWithdrawals}
          tickets={tickets}
          setTickets={setTickets}
          notifications={notifications}
          setNotifications={setNotifications}
          handleLogout={handleLogout}
          theme={theme}
          setTheme={setTheme}
          triggerToast={triggerToast}
          updateWallet={updateWallet}
          supabaseUrl={supabaseUrl}
          setSupabaseUrl={setSupabaseUrl}
          supabaseKey={supabaseKey}
          setSupabaseKey={setSupabaseKey}
        />
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<AdminPanelContainer />);
  </script>
</body>
</html>
