  <script>
    // Cryptographic Secure Hashing function for session validation
    const sha256Direct = async (text) => {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // Fast Session Verification & Redirection Guard
    (async () => {
      const storedSession = localStorage.getItem("krv-current-user-session");
      if (!storedSession) {
        window.location.href = "login.html";
        return;
      }
      try {
        const { user, signature } = JSON.parse(storedSession);
        if (!user || !signature || user.role !== "admin") {
          localStorage.removeItem("krv-current-user-session");
          window.location.href = "login.html";
          return;
        }
        const expectedSig = await sha256Direct(`${user.id}:${user.email}:${user.role}:KRV-SESSION-SECRET-2026!`);
        if (signature !== expectedSig) {
          localStorage.removeItem("krv-current-user-session");
          window.location.href = "login.html";
        }
      } catch (e) {
        localStorage.removeItem("krv-current-user-session");
        window.location.href = "login.html";
      }
    })();

    // 2. Candidate Management

      const toggleForm = () => {
        if (showCreate) {
          setForm({ title: "", category: "Google Review", links: "", amount: "", remarks: "", deadline: "" });
          setEditingTaskId(null);
          setPasteReviews("");
          setImportedReviewsList([]);
        }
        setShowCreate(!showCreate);
      };

      const toggleTaskReviews = (taskId) => {
        setExpandedTaskReviews(prev => ({ ...prev, [taskId]: !prev[taskId] }));
      };

      const parseReviewsText = (text) => {
        const rows = text.split(/\r?\n/);
        const parsed = [];
        rows.forEach((row) => {
          if (!row.trim()) return;
          let sno = parsed.length + 1;
          let textStr = row.trim();
          let cols = row.split("\t");
          if (cols.length < 2) {
            cols = row.split(",");
          }
          if (cols.length >= 2) {
            const snoStr = cols[0].replace(/['"\s]/g, "").trim();
            const maybeSno = parseInt(snoStr);
            if (!isNaN(maybeSno)) {
              sno = maybeSno;
              textStr = cols.slice(1).join(",").replace(/^['"]|['"]$/g, "").trim();
            }
          }
          if (textStr && textStr.toLowerCase() !== "review" && textStr.toLowerCase() !== "review text" && textStr.toLowerCase() !== "reviews") {
            parsed.push({
              id: "r" + (parsed.length + 1),
              sno: sno,
              text: textStr,
              assigned_to: null,
              status: "Unused"
            });
          }
        });
        return parsed;
      };

      const downloadDemoCsv = () => {
        const csvContent = "S.No,Review Text\n1,This is a wonderful application! Extremely fast and user-friendly.\n2,Outstanding support team and brilliant workflow interface.\n3,Highly recommended for remote candidate task tracking.\n4,Excellent performance, clean layout, and smooth animations.";
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "krv_reviews_demo_format.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("Demo CSV format downloaded successfully!");
      };

      const handleCsvUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const text = event.target.result;
            const parsed = parseReviewsText(text);
            if (parsed.length > 0) {
              setImportedReviewsList(parsed);
              triggerToast(`${parsed.length} reviews successfully imported from file!`);
            } else {
              triggerToast("Could not parse file. Check format: S.No, Review Text", "error");
            }
          };
          reader.readAsText(file);
        }
      };

      const handlePasteImport = (e) => {
        const val = e.target.value;
        setPasteReviews(val);
        const parsed = parseReviewsText(val);
        setImportedReviewsList(parsed);

      const handleFormSubmit = (e) => {
        e.preventDefault();
        
        if (editingTaskId) {
          setTasks(prev => prev.map(t => {
            if (t.id === editingTaskId) {
              const updatedTask = {
                ...t,
                title: form.title,
                category: form.category,
                links: form.links,
                amount: parseFloat(form.amount) || 0,
                remarks: form.remarks,
                deadline: form.deadline

              if (form.category === "Application Review Provide by Brand") {
                updatedTask.imported_reviews = importedReviewsList;

                delete updatedTask.imported_reviews;

        setPasteReviews("");
        setImportedReviewsList([]);
        setShowCreate(false);

              triggerToast("Delete Failed: " + error.message, "error");
            } else {
              setTasks(prev => prev.filter(t => t.id !== id));
              triggerToast("Task deleted successfully.", "info");
            }
          } catch (err) {
            console.error("Failed to delete task:", err);
            triggerToast("Delete Failed: " + err.message, "error");

        }

    }
    // 7. System Reports Generator
    function AdminReports({ users, submissions, withdrawals, kycRecords, tasks }) {
      const [filterStatus, setFilterStatus] = useState("All");
      const [filterCategory, setFilterCategory] = useState("All");
      const [filterCandidate, setFilterCandidate] = useState("All");
      const [startDate, setStartDate] = useState("");
      const [endDate, setEndDate] = useState("");

      const candidates = useMemo(() => users.filter(u => u.role === "candidate"), [users]);

      const filteredList = useMemo(() => {
        return submissions.filter(s => {
          const matchStatus = filterStatus === "All" || s.review_status === filterStatus;
          const task = tasks.find(t => t.id === s.task_id);
          const matchCategory = filterCategory === "All" || (task && task.category === filterCategory);
          const matchCandidate = filterCandidate === "All" || s.user_id === filterCandidate;
          let matchDate = true;
          if (startDate) matchDate = matchDate && (s.date >= startDate);
          if (endDate) matchDate = matchDate && (s.date <= endDate);
          return matchStatus && matchCategory && matchCandidate && matchDate;
        });
      }, [submissions, tasks, filterStatus, filterCategory, filterCandidate, startDate, endDate]);

      const handleExport = (format) => {
        let content = "";
        let filename = `krv_admin_workforce_report_${new Date().toISOString().split('T')[0]}`;
        if (format === "csv") {
          content = "Sub ID,Candidate Name,Task Title,Price,Status,Date\n" + 
            filteredList.map(s => {
              const candidate = users.find(u => u.id === s.user_id);
              const task = tasks.find(t => t.id === s.task_id);
              return `SUB-${s.id.toUpperCase()},"${candidate ? candidate.name : 'N/A'}","${task ? task.title : 'N/A'}",${s.amount},${s.review_status},${s.date}`;
            }).join("\n");
          filename += ".csv";
        } else if (format === "excel") {
          content = "Sub ID\tCandidate Name\tTask Title\tPrice\tStatus\tDate\n" + 
            filteredList.map(s => {
              const candidate = users.find(u => u.id === s.user_id);
              const task = tasks.find(t => t.id === s.task_id);
              return `SUB-${s.id.toUpperCase()}\t${candidate ? candidate.name : 'N/A'}\t${task ? task.title : 'N/A'}\t${s.amount}\t${s.review_status}\t${s.date}`;
            }).join("\n");
          filename += ".xls";
        } else {
          content = "KRV ADMIN MASTER AUDIT REPORT\n=============================\n" +
            `Generated: ${new Date().toLocaleString()}\n` +
            `Total entries: ${filteredList.length}\n\n` +
            filteredList.map(s => {
              const candidate = users.find(u => u.id === s.user_id);
              const task = tasks.find(t => t.id === s.task_id);
              return `[SUB-${s.id.toUpperCase()}] ${candidate ? candidate.name : 'N/A'} | ${task ? task.title : 'N/A'} | Price: Rs.${s.amount} | Status: ${s.review_status} | Date: ${s.date}`;
            }).join("\n");
          filename += ".pdf";
        }

        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
      };

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-5 gap-4 p-5 rounded-2xl glass-card text-xs">
            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">Audit Status</label>
              <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-slate-205 dark:border-slate-800 bg-white/5 text-white">
                <option value="All">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Pending">Pending</option>
                <option value="Rejected">Rejected</option>
              </select>
            </div>
            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">Task Category</label>
              <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-slate-205 dark:border-slate-800 bg-white/5 text-white">
                <option value="All">All Categories</option>
                <option value="Application Review">Application Review</option>
                <option value="Google Review">Google Review</option>
                <option value="Audio Recording">Audio Recording</option>
                <option value="Video Recording">Video Recording</option>
                <option value="Product Review">Product Review</option>
              </select>
            </div>
            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">Candidate</label>
              <select value={filterCandidate} onChange={(e) => setFilterCandidate(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-slate-205 dark:border-slate-800 bg-white/5 text-white">
                <option value="All">All Candidates</option>
                {candidates.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">Start Date</label>
              <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full px-3 py-1.5 rounded-lg border border-slate-205 dark:border-slate-800 bg-white/5 text-white" />
            </div>
            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">End Date</label>
              <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full px-3 py-1.5 rounded-lg border border-slate-205 dark:border-slate-800 bg-white/5 text-white" />
            </div>
          </div>

          <div className="flex flex-wrap items-center justify-between gap-4 p-4 rounded-xl bg-slate-900/40 border border-slate-800 text-xs text-white">
            <span className="font-semibold text-slate-400">Export options ({filteredList.length} rows):</span>
            <div className="flex gap-2">
              <button onClick={() => handleExport("csv")} className="px-4 py-2 text-[11px] font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-800 flex items-center gap-2 cursor-pointer text-white"><Icon name="download" className="w-4 h-4" /> CSV Export</button>
              <button onClick={() => handleExport("excel")} className="px-4 py-2 text-[11px] font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-800 flex items-center gap-2 cursor-pointer text-white"><Icon name="download" className="w-4 h-4" /> Excel XLS</button>
              <button onClick={() => handleExport("pdf")} className="px-4 py-2 text-[11px] font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center gap-2 cursor-pointer"><Icon name="download" className="w-4 h-4" /> PDF Report</button>
            </div>
          </div>

          <div className="glass-card rounded-2xl p-6">
            <h3 className="text-base font-bold mb-4 text-white">Audit Submissions Listing</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs text-left border-collapse text-white">
                <thead>
                  <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px]">
                    <th className="py-3">Sub ID</th>
                    <th>Worker Name</th>
                    <th>Task ID</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Submitted Link</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">
                  {filteredList.map(s => {
                    const user = users.find(u => u.id === s.user_id);
                    return (
                      <tr key={s.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                        <td className="py-3.5 font-bold">SUB-{s.id.toUpperCase()}</td>
                        <td className="text-slate-400 font-semibold">{user ? user.name : "N/A"}</td>
                        <td className="text-slate-405">TASK-{s.task_id.toUpperCase()}</td>
                        <td className="font-extrabold text-emerald-500">₹{s.amount}</td>
                        <td><span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${s.review_status === "Approved" ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20" : "bg-amber-500/10 text-amber-500"}`}>{s.review_status}</span></td>
                        <td className="text-blue-500 max-w-[150px] truncate">{s.submitted_link}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // 9. Agent Control (AdminAgents Component)
    function AdminAgents({ users, setUsers, triggerToast }) {
      const agents = React.useMemo(() => users.filter(u => u.role === "agent"), [users]);
      const candidates = React.useMemo(() => users.filter(u => u.role === "candidate"), [users]);

      const [showOnboard, setShowOnboard] = React.useState(false);
      const [editingAgent, setEditingAgent] = React.useState(null);
      const [managingTeamAgent, setManagingTeamAgent] = React.useState(null);

      // Form state for onboard / edit
      const [form, setForm] = React.useState({ name: "", mobile: "", email: "", city: "", password: "" });

      // Search and candidate assignment state
      const [candidateSearch, setCandidateSearch] = React.useState("");

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        
        const emailLower = form.email.toLowerCase().trim();

        if (editingAgent) {
          // Edit Agent logic
          let hashedPassword = editingAgent.password;
          if (form.password.trim() !== "") {
            hashedPassword = await getSaltedHash(emailLower, form.password);
          }

          setUsers(prev => prev.map(u => {
            if (u.id === editingAgent.id) {
              return {
                ...u,
                name: form.name,
                mobile: form.mobile,
                email: emailLower,
                city: form.city,
                password: hashedPassword
              };
            }
            return u;
          }));

          triggerToast("Agent details updated successfully!");
          setEditingAgent(null);
          setShowOnboard(false);
          setForm({ name: "", mobile: "", email: "", city: "", password: "" });
        } else {
          // Onboard Agent logic
          if (users.some(u => u.email.toLowerCase().trim() === emailLower)) {
            triggerToast("Email already exists in system!", "error");
            return;
          }

          const hashedPassword = await getSaltedHash(emailLower, form.password);
          const newAgent = {
            id: "a" + Date.now(),
            name: form.name,
            mobile: form.mobile,
            email: emailLower,
            city: form.city,
            password: hashedPassword,
            role: "agent",
            wallet_balance: 0,
            earnings_pending: 0,
            earnings_paid: 0,
            kyc_status: "Approved"
          };

          setUsers(prev => [...prev, newAgent]);
          triggerToast("Agent onboarded successfully!");
          setShowOnboard(false);
          setForm({ name: "", mobile: "", email: "", city: "", password: "" });
        }
      };

      const handleEditClick = (agent) => {
        setEditingAgent(agent);
        setForm({
          name: agent.name,
          mobile: agent.mobile,
          email: agent.email,
          city: agent.city || "",
          password: "" // Don't pre-fill password; only update if filled
        });
        setShowOnboard(true);
      };

      const handleDeleteAgent = (id, name) => {
        if (confirm(`Are you sure you want to delete agent "${name}"? This action cannot be undone.`)) {
          setUsers(prev => prev.filter(u => u.id !== id));
          triggerToast("Agent deleted successfully.", "info");
        }
      };

      // Assign / Re-assign Candidate to Agent's team
      const handleAssignCandidate = (candidateId, agentNameValue) => {
        setUsers(prev => prev.map(u => {
          if (u.id === candidateId) {
            return { ...u, referral_code: agentNameValue };
          }
          return u;
        }));
        triggerToast("Candidate team assignment updated!");
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <h3 className="text-lg font-bold text-white">Registered Agents: {agents.length} Onboarded</h3>
            <button onClick={() => {
              if (showOnboard) {
                setEditingAgent(null);
                setForm({ name: "", mobile: "", email: "", city: "", password: "" });
              }
              setShowOnboard(!showOnboard);
            }} className="px-4 py-2 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md cursor-pointer">
              {showOnboard ? "Cancel" : "Onboard New Agent"}
            </button>
          </div>

          {showOnboard && (
            <div className="glass-card rounded-2xl p-6">
              <h4 className="font-bold text-base mb-4 text-white">
                {editingAgent ? `Edit Agent: ${editingAgent.name}` : "Onboard New Agency Agent"}
              </h4>
              <form onSubmit={handleFormSubmit} className="space-y-4">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Agent Name</label>
                    <input required type="text" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="e.g. Ritesh Kumar" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Mobile Number</label>
                    <input required type="tel" pattern="[0-9]{10}" value={form.mobile} onChange={(e) => setForm({ ...form, mobile: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="10 Digit Number" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Email Address</label>
                    <input required type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="agent@krv.com" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">City</label>
                    <input required type="text" value={form.city} onChange={(e) => setForm({ ...form, city: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="e.g. Mumbai" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">
                      {editingAgent ? "Update Password (Leave blank to keep same)" : "Create Password"}
                    </label>
                    <input required={!editingAgent} type="password" value={form.password} onChange={(e) => setForm({ ...form, password: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder={editingAgent ? "Enter new password" : "Min 6 characters"} />
                  </div>
                </div>
                <button type="submit" className="w-full py-3.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow transition cursor-pointer">
                  {editingAgent ? "Save & Update Agent" : "Register & Onboard Agent"}
                </button>
              </form>
            </div>
          )}

          {/* Agents List Directory */}
          <div className="glass-card rounded-2xl p-6">
            <h3 className="text-base font-bold mb-4 text-white">Agent Directory</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs text-left border-collapse">
                <thead>
                  <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                    <th className="py-3">Agent ID</th>
                    <th>Agent Name</th>
                    <th>Email ID</th>
                    <th>Mobile</th>
                    <th>City</th>
                    <th>Team Size</th>
                    <th className="text-right">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">
                  {agents.map(agent => {
                    const referredCandidates = candidates.filter(u => u.referral_code === agent.name);
                    return (
                      <tr key={agent.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                        <td className="py-3.5 font-bold text-slate-500 uppercase">AGNT-{agent.id.replace("a", "").slice(-5)}</td>
                        <td className="font-bold text-white">{agent.name}</td>
                        <td className="text-slate-400">{agent.email}</td>
                        <td className="text-slate-400">{agent.mobile}</td>
                        <td className="text-slate-400">{agent.city || "N/A"}</td>
                        <td>
                          <span className="px-2 py-0.5 rounded bg-blue-500/10 text-blue-500 border border-blue-500/20 font-extrabold">
                            {referredCandidates.length} Members
                          </span>
                        </td>
                        <td className="text-right">
                          <div className="flex justify-end gap-2">
                            <button onClick={() => setManagingTeamAgent(managingTeamAgent?.id === agent.id ? null : agent)} className="px-2 py-1 bg-indigo-600/10 hover:bg-indigo-600 text-indigo-400 hover:text-white border border-indigo-500/20 text-[9px] font-bold uppercase rounded cursor-pointer transition">
                              Manage Team
                            </button>
                            <button onClick={() => handleEditClick(agent)} className="px-2 py-1 bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white border border-blue-500/20 text-[9px] font-bold uppercase rounded cursor-pointer transition">
                              Edit
                            </button>
                            <button onClick={() => handleDeleteAgent(agent.id, agent.name)} className="px-2 py-1 bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/20 text-[9px] font-bold uppercase rounded cursor-pointer transition">
                              Delete
                            </button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                  {agents.length === 0 && (
                    <tr>
                      <td colSpan="7" className="text-center py-6 text-slate-500">No agents registered. Click "Onboard New Agent" to begin.</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Manage Team Sub-panel */}
          {managingTeamAgent && (
            <div className="glass-card rounded-2xl p-6 border border-indigo-500/30">
              <div className="flex justify-between items-center mb-4">
                <div>
                  <h4 className="font-bold text-base text-white">Manage Referred Team for: <span className="text-indigo-400">{managingTeamAgent.name}</span></h4>
                  <p className="text-xs text-slate-400 mt-0.5">Assign or re-assign any candidate user to this agent's referred team.</p>
                </div>
                <button onClick={() => setManagingTeamAgent(null)} className="text-slate-400 hover:text-white">
                  <Icon name="x-circle" className="w-5 h-5" />
                </button>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* Current Team list */}
                <div className="border border-slate-800 rounded-xl p-4 bg-slate-950/20">
                  <span className="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-3">Current Team Members ({candidates.filter(c => c.referral_code === managingTeamAgent.name).length})</span>
                  <div className="max-h-60 overflow-y-auto divide-y divide-slate-800/60 pr-2">
                    {candidates.filter(c => c.referral_code === managingTeamAgent.name).map(member => (
                      <div key={member.id} className="py-2.5 flex items-center justify-between">
                        <div>
                          <span className="font-bold text-sm text-white block">{member.name}</span>
                          <span className="text-[10px] text-slate-500 block">{member.email} | {member.mobile}</span>
                        </div>
                        <button onClick={() => handleAssignCandidate(member.id, "")} className="text-[9px] font-bold text-rose-400 hover:text-rose-300 uppercase hover:underline">
                          Remove Team
                        </button>
                      </div>
                    ))}
                    {candidates.filter(c => c.referral_code === managingTeamAgent.name).length === 0 && (
                      <span className="block text-xs text-slate-500 text-center py-4">No candidates currently in this agent's team.</span>

                </div>

                  <div className="max-h-48 overflow-y-auto divide-y divide-slate-800/60 pr-2">
                    {candidates
                      .filter(c => {
                        const term = candidateSearch.toLowerCase().trim();

                        return c.name.toLowerCase().includes(term) || c.email.toLowerCase().includes(term) || c.mobile.includes(term);
                      })
                      .map(candidate => {

                </div>
              </div>

    // 8. Settings
    function AdminSettings({
      triggerToast, supabaseUrl, setSupabaseUrl, supabaseKey, setSupabaseKey,
      users, tasks, submissions, kycRecords, withdrawals, tickets, notifications,

    }) {

        localStorage.removeItem("krv-users");
        localStorage.removeItem("krv-users-checksum");
        localStorage.removeItem("krv-tasks");
        localStorage.removeItem("krv-submissions");
        localStorage.removeItem("krv-kyc");
        localStorage.removeItem("krv-withdrawals");
        localStorage.removeItem("krv-tickets");
        localStorage.removeItem("krv-notifications");

        setUsers(DEFAULT_USERS);
        setTasks(DEFAULT_TASKS);
        setSubmissions(DEFAULT_SUBMISSIONS);
        setKycRecords(DEFAULT_KYC);
        setWithdrawals(DEFAULT_WITHDRAWALS);
        setTickets(DEFAULT_TICKETS);
        setNotifications(DEFAULT_NOTIFICATIONS);

        const check = await signUsersList(DEFAULT_USERS);
        localStorage.setItem("krv-users-checksum", check);
        triggerToast("Mock database defaults restored successfully!");
      };

      const handleSaveSettings = (e) => {
        e.preventDefault();
        localStorage.setItem("krv-supabase-url", formUrl.trim());

        localStorage.setItem("krv-referral-bonus", referralBonus);
        localStorage.setItem("krv-min-withdraw", minWithdraw);
        
        setSupabaseUrl(formUrl.trim());
        setSupabaseKey(formKey.trim());

      const handleSyncCloud = async () => {
        if (!supabaseUrl || !supabaseKey) {
          triggerToast("Please configure your Supabase details first.", "error");
          return;
        }
        setIsSyncing(true);
        try {
          const client = window.supabase.createClient(supabaseUrl, supabaseKey);
          let failed = [];
          const syncTable = async (tableName, data) => {
            if (!data || data.length === 0) return;
            const { error } = await client.from(tableName).upsert(data);
            if (error) failed.push(tableName);
          };
          await syncTable("krv_users", users);
          await syncTable("krv_tasks", tasks);
          await syncTable("krv_submissions", submissions);
          await syncTable("krv_kyc", kycRecords);
          await syncTable("krv_withdrawals", withdrawals);
          await syncTable("krv_tickets", tickets);
          await syncTable("krv_notifications", notifications);

          if (failed.length === 0) triggerToast("Cloud fully synced!", "success");
          else triggerToast(`Partial sync failed: ${failed.join(", ")}`, "error");

CREATE TABLE IF NOT EXISTS krv_notifications (id VARCHAR(50) PRIMARY KEY, user_id VARCHAR(50) NOT NULL, title VARCHAR(255), message TEXT, date VARCHAR(50));

-- DISABLE RLS TO ALLOW DIRECT CLIENT READ/WRITE (RECOMMENDED FOR STANDALONE CHANNELS):

ALTER TABLE krv_tasks DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_submissions DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_kyc DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_withdrawals DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_tickets DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_notifications DISABLE ROW LEVEL SECURITY;`;

    // Main Container App
    function AdminPanelContainer() {
      const [theme, setTheme] = useState(() => localStorage.getItem("krv-theme") || "dark");
      const [currentPage, setCurrentPage] = useState("admin-dashboard");
      const [currentUser, setCurrentUser] = useState(null);
      const [isDbLoading, setIsDbLoading] = useState(true);

      const [users, setUsers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [kycRecords, setKycRecords] = useState([]);
      const [withdrawals, setWithdrawals] = useState([]);
      const [tickets, setTickets] = useState([]);
      const [notifications, setNotifications] = useState([]);
      const [toast, setToast] = useState(null);

      const [supabaseUrl, setSupabaseUrl] = useState(() => localStorage.getItem("krv-supabase-url") || SUPABASE_URL_DEFAULT);
      const [supabaseKey, setSupabaseKey] = useState(() => localStorage.getItem("krv-supabase-key") || SUPABASE_KEY_DEFAULT);

      const prevUsersRef = useRef([]);
      const prevTasksRef = useRef([]);
      const prevSubmissionsRef = useRef([]);
      const prevKycRecordsRef = useRef([]);
      const prevWithdrawalsRef = useRef([]);
      const prevTicketsRef = useRef([]);
      const prevNotificationsRef = useRef([]);

      useEffect(() => {
        const root = window.document.documentElement;
        if (theme === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }
        localStorage.setItem("krv-theme", theme);
      }, [theme]);

      const triggerToast = (message, type = "success") => {
        setToast({ message, type });
      };

      const updateWallet = (userId, amount) => {
        setUsers(prev => prev.map(u => {
          if (u.id === userId) {
            return {
              ...u,
              wallet_balance: u.wallet_balance + amount,
              earnings_pending: Math.max(0, u.earnings_pending - amount)
            };
          }
          return u;
        }));
      };

      // Bootstrap and verification logic
      useEffect(() => {
        let channel = null;

        const verifyIntegrityAndSession = async () => {
          const client = getSupabaseClient();
          if (client) {
            try {
              const storedSession = localStorage.getItem("krv-current-user-session");
              if (!storedSession) {
                window.location.href = "login.html";
                return;
              }
              const { user } = JSON.parse(storedSession);

              // 1. Fetch Users
              const { data: dbUsers, error: usersErr } = await client.from("krv_users").select("*");
              if (!usersErr && dbUsers) {
                setUsers(dbUsers);
                prevUsersRef.current = dbUsers;
                const matchedUser = dbUsers.find(u => u.id === user.id);
                if (matchedUser) {
                  setCurrentUser(matchedUser);
                }
              }

              // 2. Fetch Tasks
              const { data: dbTasks, error: tasksErr } = await client.from("krv_tasks").select("*");
              if (!tasksErr && dbTasks) {
                const activeTasks = dbTasks.filter(t => t.status !== "Deleted");
                setTasks(activeTasks);
                prevTasksRef.current = activeTasks;
              }

              // 3. Fetch Submissions
              const { data: dbSubs, error: subsErr } = await client.from("krv_submissions").select("*");
              if (!subsErr && dbSubs) {
                setSubmissions(dbSubs);
                prevSubmissionsRef.current = dbSubs;
              }

              // 4. Fetch KYC
              const { data: dbKyc, error: kycErr } = await client.from("krv_kyc").select("*");
              if (!kycErr && dbKyc) {
                setKycRecords(dbKyc);
                prevKycRecordsRef.current = dbKyc;
              }

              // 5. Fetch Withdrawals
              const { data: dbWithdrawals, error: wErr } = await client.from("krv_withdrawals").select("*");
              if (!wErr && dbWithdrawals) {
                setWithdrawals(dbWithdrawals);
                prevWithdrawalsRef.current = dbWithdrawals;
              }

              // 6. Fetch Tickets
              const { data: dbTickets, error: tErr } = await client.from("krv_tickets").select("*");
              if (!tErr && dbTickets) {
                setTickets(dbTickets);
                prevTicketsRef.current = dbTickets;
              }

              // 7. Fetch Notifications
              const { data: dbNotifs, error: nErr } = await client.from("krv_notifications").select("*");
              if (!nErr && dbNotifs) {
                setNotifications(dbNotifs);
                prevNotificationsRef.current = dbNotifs;
              }

              // Set up Real-time Socket Channels
              channel = client.channel('krv-realtime-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_users' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setUsers(prev => {
                      const next = prev.map(u => u.id === payload.new.id ? payload.new : u);
                      prevUsersRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_tasks' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setTasks(prev => {
                      const next = prev.some(t => t.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevTasksRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setTasks(prev => {
                      const next = payload.new.status === 'Deleted'
                        ? prev.filter(t => t.id !== payload.new.id)
                        : prev.map(t => t.id === payload.new.id ? payload.new : t);
                      prevTasksRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'DELETE') {
                    setTasks(prev => {
                      const next = prev.filter(t => t.id !== payload.old.id);
                      prevTasksRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_submissions' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setSubmissions(prev => {
                      const next = prev.some(s => s.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevSubmissionsRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setSubmissions(prev => {
                      const next = prev.map(s => s.id === payload.new.id ? payload.new : s);
                      prevSubmissionsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_kyc' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setKycRecords(prev => {
                      const next = prev.map(k => k.id === payload.new.id ? payload.new : k);
                      prevKycRecordsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_withdrawals' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setWithdrawals(prev => {
                      const next = prev.some(w => w.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevWithdrawalsRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setWithdrawals(prev => {
                      const next = prev.map(w => w.id === payload.new.id ? payload.new : w);
                      prevWithdrawalsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_tickets' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setTickets(prev => {
                      const next = prev.map(t => t.id === payload.new.id ? payload.new : t);
                      prevTicketsRef.current = next;
                      return next;
                    });
                  }
                })
                .subscribe();

            } catch (err) {
              console.error("verifyIntegrityAndSession error:", err);
            }
          }
          setIsDbLoading(false);
        };

        verifyIntegrityAndSession();

        return () => {
          if (channel) {
            const client = getSupabaseClient();
            if (client) client.removeChannel(channel);
          }
        };
      }, []);

      // Synchronize currentUser with users list
      useEffect(() => {
        if (currentUser) {
          const latestUser = users.find(u => u.id === currentUser.id);
          if (latestUser && JSON.stringify(latestUser) !== JSON.stringify(currentUser)) {
            setCurrentUser(latestUser);
            signSession(latestUser).then(sig => {
              localStorage.setItem("krv-current-user-session", JSON.stringify({ user: latestUser, signature: sig }));
            });
          }
        }
      }, [users, currentUser]);

      // Background cloud sync
      useEffect(() => {
        const saveSecureDb = async () => {
          const client = getSupabaseClient();
          if (client && !isDbLoading) {
            try {
              // Sync Users
              const prevUsers = prevUsersRef.current;
              if (JSON.stringify(prevUsers) !== JSON.stringify(users)) {
                const changedUsers = users.filter(u => {
                  const prevU = prevUsers.find(pu => pu.id === u.id);
                  return !prevU || JSON.stringify(prevU) !== JSON.stringify(u);
                });
                if (changedUsers.length > 0) {
                  const { error } = await client.from("krv_users").upsert(changedUsers);
                  if (error) {
                    console.error("Users sync failed:", error);
                    triggerToast("Sync Error (Users): " + error.message, "error");
                  }
                }
                
                // Handle deletions of users via physical hard-delete
                const deletedUsers = prevUsers.filter(pu => !users.some(u => u.id === pu.id));
                if (deletedUsers.length > 0) {
                  for (const du of deletedUsers) {
                    const { error } = await client.from("krv_users").delete().eq("id", du.id);
                    if (error) {
                      console.error("Users delete failed:", error);
                      triggerToast("Sync Error (Delete User): " + error.message, "error");
                    }
                  }
                }
                prevUsersRef.current = users;
              }

              // Sync Tasks
              const prevTasks = prevTasksRef.current;
              if (JSON.stringify(prevTasks) !== JSON.stringify(tasks)) {
                const changedTasks = tasks.filter(t => {
                  const prevT = prevTasks.find(pt => pt.id === t.id);
                  return !prevT || JSON.stringify(prevT) !== JSON.stringify(t);
                });
                if (changedTasks.length > 0) {
                  const { error } = await client.from("krv_tasks").upsert(changedTasks);
                  if (error) {
                    console.error("Tasks upsert failed:", error);
                    triggerToast("Sync Error (Tasks): " + error.message, "error");
                  }
                }

                // Handle deletions via hard-delete
                const deletedTasks = prevTasks.filter(pt => !tasks.some(t => t.id === pt.id));
                if (deletedTasks.length > 0) {
                  for (const dt of deletedTasks) {
                    const { error } = await client.from("krv_tasks").delete().eq("id", dt.id);
                    if (error) {
                      console.error("Tasks delete failed:", error);
                      triggerToast("Sync Error (Delete Task): " + error.message, "error");
                    }
                  }
                }
                prevTasksRef.current = tasks;
              }

              // Sync Submissions
              const prevSubs = prevSubmissionsRef.current;
              if (JSON.stringify(prevSubs) !== JSON.stringify(submissions)) {
                const changedSubs = submissions.filter(s => {
                  const prevS = prevSubs.find(ps => ps.id === s.id);
                  return !prevS || JSON.stringify(prevS) !== JSON.stringify(s);
                });
                if (changedSubs.length > 0) {
                  const { error } = await client.from("krv_submissions").upsert(changedSubs);
                  if (error) {
                    console.error("Submissions sync failed:", error);
                    triggerToast("Sync Error (Submissions): " + error.message, "error");
                  }
                }
                prevSubmissionsRef.current = submissions;
              }

              // Sync KYC Records
              const prevKyc = prevKycRecordsRef.current;
              if (JSON.stringify(prevKyc) !== JSON.stringify(kycRecords)) {
                const changedKyc = kycRecords.filter(k => {
                  const prevK = prevKyc.find(pk => pk.id === k.id);
                  return !prevK || JSON.stringify(prevK) !== JSON.stringify(k);
                });
                if (changedKyc.length > 0) {
                  const { error } = await client.from("krv_kyc").upsert(changedKyc);
                  if (error) {
                    console.error("KYC sync failed:", error);
                    triggerToast("Sync Error (KYC): " + error.message, "error");
                  }
                }
                prevKycRecordsRef.current = kycRecords;
              }

              // Sync Withdrawals
              const prevW = prevWithdrawalsRef.current;
              if (JSON.stringify(prevW) !== JSON.stringify(withdrawals)) {
                const changedW = withdrawals.filter(w => {
                  const prevWithdrawal = prevW.find(pw => pw.id === w.id);
                  return !prevWithdrawal || JSON.stringify(prevWithdrawal) !== JSON.stringify(w);
                });
                if (changedW.length > 0) {
                  const { error } = await client.from("krv_withdrawals").upsert(changedW);
                  if (error) {
                    console.error("Withdrawals sync failed:", error);
                    triggerToast("Sync Error (Withdrawals): " + error.message, "error");
                  }
                }
                prevWithdrawalsRef.current = withdrawals;
              }

              // Sync Tickets
              const prevTk = prevTicketsRef.current;
              if (JSON.stringify(prevTk) !== JSON.stringify(tickets)) {
                const changedTk = tickets.filter(t => {
                  const prevT = prevTk.find(pt => pt.id === t.id);
                  return !prevT || JSON.stringify(prevT) !== JSON.stringify(t);
                });
                if (changedTk.length > 0) {
                  const { error } = await client.from("krv_tickets").upsert(changedTk);
                  if (error) {
                    console.error("Tickets sync failed:", error);
                    triggerToast("Sync Error (Tickets): " + error.message, "error");
                  }
                }
                prevTicketsRef.current = tickets;
              }

              // Sync Notifications
              const prevNotifs = prevNotificationsRef.current;
              if (JSON.stringify(prevNotifs) !== JSON.stringify(notifications)) {
                const changedN = notifications.filter(n => {
                  const prevN = prevNotifs.find(pn => pn.id === n.id);
                  return !prevN || JSON.stringify(prevN) !== JSON.stringify(n);
                });
                if (changedN.length > 0) {
                  const { error } = await client.from("krv_notifications").upsert(changedN);
                  if (error) {
                    console.error("Notifications sync failed:", error);
                    triggerToast("Sync Error (Notifications): " + error.message, "error");
                  }
                }
                prevNotificationsRef.current = notifications;
              }

            } catch (err) {
              console.error("Supabase sync error:", err);
              triggerToast("Sync Exception: " + err.message, "error");
            }
          }
        };
        saveSecureDb();
      }, [users, tasks, submissions, kycRecords, withdrawals, tickets, notifications, isDbLoading]);

      const handleLogout = () => {
        localStorage.removeItem("krv-current-user-session");
        window.location.href = "login.html";
      };

      if (isDbLoading || !currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center space-y-4">
              <div className="w-12 h-12 rounded-full border-4 border-blue-500 border-t-transparent animate-spin mx-auto"></div>
              <span className="block text-xs font-bold uppercase tracking-widest text-slate-400 animate-pulse">Loading Admin Console...</span>
            </div>
          </div>
        );
      }

      return (
        <AdminPanel
          currentPage={currentPage}
          setCurrentPage={setCurrentPage}
          currentUser={currentUser}
          users={users}
          setUsers={setUsers}
          tasks={tasks}
          setTasks={setTasks}
          submissions={submissions}
          setSubmissions={setSubmissions}
          kycRecords={kycRecords}
          setKycRecords={setKycRecords}
          withdrawals={withdrawals}
          setWithdrawals={setWithdrawals}
          tickets={tickets}
          setTickets={setTickets}
          notifications={notifications}
          setNotifications={setNotifications}
          handleLogout={handleLogout}
          theme={theme}
          setTheme={setTheme}
          triggerToast={triggerToast}
          updateWallet={updateWallet}
          supabaseUrl={supabaseUrl}
          setSupabaseUrl={setSupabaseUrl}
          supabaseKey={supabaseKey}
          setSupabaseKey={setSupabaseKey}
        />
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<AdminPanelContainer />);
  </script>
</body>
</html>
