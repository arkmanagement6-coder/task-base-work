  <script>
    // Cryptographic Secure Hashing function for session validation
    const sha256Direct = async (text) => {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // Fast Session Verification & Redirection Guard
    (async () => {
      const storedSession = localStorage.getItem("krv-current-user-session");
      if (!storedSession) {
        window.location.href = "login.html";
        return;
      }
      try {
        const { user, signature } = JSON.parse(storedSession);
        if (!user || !signature || user.role !== "admin") {
          localStorage.removeItem("krv-current-user-session");
          window.location.href = "login.html";
          return;
        }
        const expectedSig = await sha256Direct(`${user.id}:${user.email}:${user.role}:KRV-SESSION-SECRET-2026!`);
        if (signature !== expectedSig) {
          localStorage.removeItem("krv-current-user-session");
          window.location.href = "login.html";
        }
      } catch (e) {
        localStorage.removeItem("krv-current-user-session");
        window.location.href = "login.html";
      }
    })();

                download={`${image.title.replace(/\s+/g, '_')}.png`} 
                className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-xs font-bold uppercase tracking-wider transition cursor-pointer flex items-center gap-1.5 shadow"
              >

              </a>

              <img src={image.url} alt={image.title} onError={(e) => { e.target.src = "assets/krv_logo.png"; }} className="max-h-[70vh] max-w-full rounded-xl object-contain shadow-inner" />
            </div>
            <span className="text-xs text-slate-500 font-bold uppercase tracking-wider">Click outside or click (X) to close</span>
          </div>
        </div>
      );
    };

    // Inactive Candidate Logic Helper
    const getUserActivityStatus = (candidate, submissions, kycRecords = []) => {
      if (candidate.kyc_status === "Blocked") return "Blocked";
      if (candidate.status === "Inactive") return "Inactive";
      if (candidate.status === "Activation Requested") return "Activation Requested";
      
      const getRegDateLocal = (user) => {
        if (user.created_at) return user.created_at;
        
        // Try KYC ID timestamp
        if (kycRecords && kycRecords.length > 0) {
          const kyc = kycRecords.find(k => k.user_id === user.id);
          if (kyc && kyc.id && kyc.id.startsWith("k")) {
            const tsStr = kyc.id.substring(1);
            const ts = parseInt(tsStr, 10);
            if (!isNaN(ts) && ts > 1000000000000) {
              try {
                return new Date(ts).toISOString().split('T')[0];
              } catch (e) {}
            }
          }
        }
        
        // Try User ID timestamp
        if (user.id && user.id.length > 5) {
          const tsStr = user.id.substring(1);
          const ts = parseInt(tsStr, 10);
          if (!isNaN(ts) && ts > 1000000000000) {
            try {
              const d = new Date(ts);
              return d.toISOString().split('T')[0];
            } catch (e) {}
          }
        }
        if (user.id === "c1") return "2026-05-20";
        if (user.id === "c2") return "2026-05-23";
        if (user.id === "c3") return "2026-05-26";
        return "2026-05-28";
      };

      const regDate = getRegDateLocal(candidate);
      const lastActiveStr = candidate.last_active || regDate;

      // Find latest submission date
      const candidateSubs = submissions.filter(s => s.user_id === candidate.id);
      let latestSubDateStr = null;
      candidateSubs.forEach(s => {
        if (s.date && (!latestSubDateStr || s.date > latestSubDateStr)) {
          latestSubDateStr = s.date;
        }
      });
      const lastSubStr = latestSubDateStr || regDate;

      const getDaysSince = (dStr) => {
        if (!dStr) return 999;
        const today = new Date().toISOString().split('T')[0];
        const diffTime = new Date(today) - new Date(dStr);
        return Math.floor(diffTime / (1000 * 60 * 60 * 24));
      };

      const daysSinceActive = getDaysSince(lastActiveStr);
      const daysSinceSub = getDaysSince(lastSubStr);

      if (daysSinceActive > 7 && daysSinceSub > 7) {
        return "Inactive";
      }
      return candidate.status || "Active";
    };

    // Include Admin Subcomponents
    // [AdminOverview, AdminCandidates, AdminTasks, AdminReviews, AdminEarnings, AdminKyc, AdminReports, AdminSettings]

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

              <div className="flex justify-between items-center py-2 border-b border-slate-800">

    }
    // 2. Candidate Management
    function AdminCandidates({ 
      users, 
      setUsers, 
      kycRecords, 
      submissions, 
      setSubmissions, 
      notifications, 
      setNotifications, 
      tasks, 
      triggerToast, 
      setPreviewImage, 
      updateWallet 
    }) {
      const candidates = React.useMemo(() => users.filter(u => u.role === "candidate"), [users]);
      const agents = React.useMemo(() => users.filter(u => u.role === "agent"), [users]);

      const [viewCandidate, setViewCandidate] = React.useState(null);
      const [editCandidate, setEditCandidate] = React.useState(null);
      const [searchQuery, setSearchQuery] = React.useState("");
      const [statusFilter, setStatusFilter] = React.useState("All");
      const [startDate, setStartDate] = React.useState("");
      const [endDate, setEndDate] = React.useState("");
      const [editForm, setEditForm] = React.useState({
        name: "", email: "", mobile: "", city: "", pincode: "",
        referral_code: "", wallet_balance: 0, earnings_pending: 0,
        earnings_paid: 0, kyc_status: "Pending", password: ""
      });

      const [expandedTaskId, setExpandedTaskId] = React.useState(null);
      const [loadedScreenshots, setLoadedScreenshots] = React.useState({});
      const [loadingScreenshots, setLoadingScreenshots] = React.useState({});
      const [auditReasons, setAuditReasons] = React.useState({});

      const handleToggleExpandTask = async (taskId, submission) => {
        if (expandedTaskId === taskId) {
          setExpandedTaskId(null);
          return;
        }
        setExpandedTaskId(taskId);
        if (submission && !submission.screenshot && !loadedScreenshots[submission.id]) {
          setLoadingScreenshots(prev => ({ ...prev, [submission.id]: true }));
          const client = getSupabaseClient();
          if (client) {
            try {
              const { data, error } = await client.from("krv_submissions").select("screenshot").eq("id", submission.id).single();
              if (!error && data && data.screenshot) {
                setLoadedScreenshots(prev => ({ ...prev, [submission.id]: data.screenshot }));
                setSubmissions && setSubmissions(prev => prev.map(s => s.id === submission.id ? { ...s, screenshot: data.screenshot } : s));
              }
            } catch (err) {
              console.error("Error loading screenshot:", err);
            }
          }
          setLoadingScreenshots(prev => ({ ...prev, [submission.id]: false }));
        }
      };

      const handleAuditAction = (sub, newStatus, reason = "") => {
        if ((newStatus === "Rejected" || newStatus === "Re-Submit") && !reason.trim()) {
          triggerToast("Please enter a rejection/re-submit reason.", "error");
          return;
        }
        
        // Update submissions state
        setSubmissions && setSubmissions(prev => prev.map(s => {
          if (s.id === sub.id) {
            return { 
              ...s, 
              review_status: newStatus, 
              rejection_reason: (newStatus === "Rejected" || newStatus === "Re-Submit") ? reason : s.rejection_reason 
            };
          }
          return s;
        }));

        // Handle financial changes
        updateWallet(sub.user_id, sub.review_status, newStatus, sub.amount);

        // Send notifications
        let notifTitle = "";
        let notifMsg = "";
        if (newStatus === "Approved") {
          notifTitle = "Task Submission Approved!";
          notifMsg = `Your task submission (SUB-${sub.id.toUpperCase()}) was verified successfully. ₹${sub.amount} added to wallet.`;
        } else if (newStatus === "Under Review") {
          notifTitle = "Task Submission Under Review";
          notifMsg = `Your task submission (SUB-${sub.id.toUpperCase()}) is now under review by our auditing team.`;
        } else if (newStatus === "Rejected") {
          notifTitle = "Task Submission Rejected";
          notifMsg = `Your task submission (SUB-${sub.id.toUpperCase()}) was rejected: "${reason}"`;
        } else if (newStatus === "Re-Submit") {
          notifTitle = "Re-Submit Requested for Task";
          notifMsg = `Your task submission (SUB-${sub.id.toUpperCase()}) requires re-submission: "${reason}"`;
        }

        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: sub.user_id,
          title: notifTitle,
          message: notifMsg,
          date: new Date().toISOString().split('T')[0]
        };
        setNotifications && setNotifications([...notifications, newNotif]);
        triggerToast(`Task submission status updated to: ${newStatus}`, "success");
      };

      const candidateTasks = React.useMemo(() => {
        if (!viewCandidate) return [];
        
        // 1. Get all submissions by this candidate
        const candSubs = submissions.filter(s => s.user_id === viewCandidate.id);
        
        // 2. Build a map of task_id to submission
        const subMap = {};
        candSubs.forEach(s => {
          subMap[s.task_id] = s;
        });
        
        // 3. Find tasks where either candidate has a submission or there's an assigned review
        const list = [];
        tasks.forEach(t => {
          const submission = subMap[t.id];
          const assignedReview = t.imported_reviews?.find(r => r.assigned_to === viewCandidate.id && r.status === "Assigned");
          
          if (submission || assignedReview) {
            list.push({
              task: t,
              submission: submission || null,
              assignedReview: assignedReview || null
            });
          }
        });
        
        // Sort: active/pending first
        return list.sort((a, b) => {
          const getPriority = (item) => {
            if (item.assignedReview) return 4;
            if (item.submission) {
              const st = item.submission.review_status;
              if (st === "Pending" || st === "Under Review" || st === "Re-Submit") return 3;
              if (st === "Approved") return 2;
              if (st === "Rejected") return 1;
            }
            return 0;
          };
          return getPriority(b) - getPriority(a);
        });
      }, [tasks, submissions, viewCandidate]);

      const getRegDate = React.useCallback((user) => {
        if (user.created_at) return user.created_at;
        
        // Try KYC ID timestamp
        if (kycRecords && kycRecords.length > 0) {
          const kyc = kycRecords.find(k => k.user_id === user.id);
          if (kyc && kyc.id && kyc.id.startsWith("k")) {
            const tsStr = kyc.id.substring(1);
            const ts = parseInt(tsStr, 10);
            if (!isNaN(ts) && ts > 1000000000000) {
              try {
                return new Date(ts).toISOString().split('T')[0];
              } catch (e) {}
            }
          }
        }
        
        // Try User ID timestamp
        if (user.id && user.id.length > 5) {
          const tsStr = user.id.substring(1);
          const ts = parseInt(tsStr, 10);
          if (!isNaN(ts) && ts > 1000000000000) {
            try {
              const d = new Date(ts);
              return d.toISOString().split('T')[0];
            } catch (e) {}
          }
        }
        if (user.id === "c1") return "2026-05-20";
        if (user.id === "c2") return "2026-05-23";
        if (user.id === "c3") return "2026-05-26";
        return "2026-05-28";
      }, [kycRecords]);

      const handleReactivate = (id) => {
        const today = new Date().toISOString().split('T')[0];
        setUsers(prev => prev.map(u => {
          if (u.id === id) {
            triggerToast("Candidate reactivated successfully!", "success");
            return { ...u, status: "Active", last_active: today };
          }
          return u;
        }));
      };

      const handleExportCandidates = (format) => {
        let content = "";
        let filename = `krv_candidates_directory_${new Date().toISOString().split('T')[0]}`;
        
        const cleanTsvVal = (str) => {
          if (str === undefined || str === null || str === "") return "N/A";
          return str.toString().replace(/\t/g, " ").replace(/\r?\n/g, " ");
        };
        
        const escapeCsvVal = (str) => {
          if (str === undefined || str === null) return '""';
          return `"${str.toString().replace(/"/g, '""')}"`;
        };

        if (format === "csv") {
          content = "sep=,\nCandidate ID,Name,Email,Mobile,Agent Referral,Registration Date,Today Tasks,Total Tasks,KYC Status,City,Pincode,Wallet Balance (INR),Earnings Pending (INR),Earnings Paid (INR),Activity Status\n" +
            filteredCandidates.map(c => {
              const candSubs = submissions.filter(s => s.user_id === c.id);
              const todayStr = new Date().toISOString().split('T')[0];
              const todayCount = candSubs.filter(s => s.date === todayStr).length;
              const totalCount = candSubs.length;
              const actStatus = getUserActivityStatus(c, submissions, kycRecords);
              
              return [
                escapeCsvVal(`USER-${String(c.id).toUpperCase()}`),
                escapeCsvVal(c.name),
                escapeCsvVal(c.email),
                escapeCsvVal(c.mobile),
                escapeCsvVal(c.referral_code || "Direct"),
                escapeCsvVal(getRegDate(c)),
                todayCount,
                totalCount,
                escapeCsvVal(c.kyc_status || "Not Submitted"),
                escapeCsvVal(c.city || "N/A"),
                escapeCsvVal(c.pincode || "N/A"),
                c.wallet_balance || 0,
                c.earnings_pending || 0,
                c.earnings_paid || 0,
                escapeCsvVal(actStatus)
              ].join(",");
            }).join("\n");
            
          filename += ".csv";
          const blob = new Blob(["\uFEFF" + content], { type: "text/csv;charset=utf-8;" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);
          triggerToast("Candidates directory CSV exported successfully!");
          
        } else if (format === "excel") {
          content = "Candidate ID\tName\tEmail\tMobile\tAgent Referral\tRegistration Date\tToday Tasks\tTotal Tasks\tKYC Status\tCity\tPincode\tWallet Balance (INR)\tEarnings Pending (INR)\tEarnings Paid (INR)\tActivity Status\n" +
            filteredCandidates.map(c => {
              const candSubs = submissions.filter(s => s.user_id === c.id);
              const todayStr = new Date().toISOString().split('T')[0];
              const todayCount = candSubs.filter(s => s.date === todayStr).length;
              const totalCount = candSubs.length;
              const actStatus = getUserActivityStatus(c, submissions, kycRecords);
              
              return [
                `USER-${String(c.id).toUpperCase()}`,
                cleanTsvVal(c.name),
                cleanTsvVal(c.email),
                cleanTsvVal(c.mobile),
                cleanTsvVal(c.referral_code || "Direct"),
                cleanTsvVal(getRegDate(c)),
                todayCount,
                totalCount,
                cleanTsvVal(c.kyc_status || "Not Submitted"),
                cleanTsvVal(c.city || "N/A"),
                cleanTsvVal(c.pincode || "N/A"),
                c.wallet_balance || 0,
                c.earnings_pending || 0,
                c.earnings_paid || 0,
                cleanTsvVal(actStatus)
              ].join("\t");
            }).join("\n");
            
          filename += ".xls";
          const blob = new Blob(["\uFEFF" + content], { type: "application/vnd.ms-excel;charset=utf-8;" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);
          triggerToast("Candidates directory Excel exported successfully!");
        }
      };

      const filteredCandidates = React.useMemo(() => {
        return candidates
          .filter(c => {
            const computedStatus = getUserActivityStatus(c, submissions, kycRecords);
            if (statusFilter === "Active") {
              if (computedStatus !== "Active") return false;
            } else if (statusFilter === "Inactive") {
              if (computedStatus !== "Inactive") return false;
            } else if (statusFilter === "Activation Requested") {
              if (computedStatus !== "Activation Requested") return false;
            } else if (statusFilter === "Blocked") {
              if (c.kyc_status !== "Blocked") return false;
            }

            const regDateFull = getRegDate(c);
            const regDate = regDateFull ? regDateFull.split('T')[0].split(' ')[0] : "";
            if (startDate && regDate < startDate) return false;
            if (endDate && regDate > endDate) return false;

            if (searchQuery.trim() !== "") {
              const term = searchQuery.toLowerCase().trim();
              const matchName = c.name && c.name.toLowerCase().includes(term);
              const matchEmail = c.email && c.email.toLowerCase().includes(term);
              const matchMobile = c.mobile && c.mobile.includes(term);
              const matchId = c.id && (String(c.id).toLowerCase().includes(term) || `user-${String(c.id).toLowerCase()}`.includes(term));
              const matchAgent = c.referral_code && String(c.referral_code).toLowerCase().includes(term);
              return matchName || matchEmail || matchMobile || matchId || matchAgent;
            }
            return true;
          })
          .sort((a, b) => {
            const dateA = getRegDate(a);
            const dateB = getRegDate(b);
            if (a.id.startsWith("c") && b.id.startsWith("c") && a.id.length > 5 && b.id.length > 5) {
              return b.id.localeCompare(a.id);
            }
            return dateB.localeCompare(dateA);
          });
      }, [candidates, searchQuery, statusFilter, submissions, getRegDate, startDate, endDate]);

      const handleBlockUser = (id) => {
        setUsers(prev => prev.map(u => {
          if (u.id === id) {
            const isBlocked = u.kyc_status === "Blocked";
            const updated = { ...u, kyc_status: isBlocked ? "Pending" : "Blocked" };
            triggerToast(isBlocked ? "Candidate unblocked!" : "Candidate blocked!", "info");
            return updated;
          }
          return u;
        }));
      };

      const handleDeleteCandidate = (id, name) => {
        if (confirm(`Are you sure you want to permanently delete candidate "${name}"? This action will completely remove them from the database and cannot be undone.`)) {
          setUsers(prev => prev.filter(u => u.id !== id));
          triggerToast("Candidate deleted successfully.", "info");
        }
      };

      const handleEditClick = (c) => {
        setEditCandidate(c);
        setEditForm({
          name: c.name,
          email: c.email,
          mobile: c.mobile,
          city: c.city || "",
          pincode: c.pincode || "",
          referral_code: c.referral_code || "",
          wallet_balance: c.wallet_balance || 0,
          earnings_pending: c.earnings_pending || 0,
          earnings_paid: c.earnings_paid || 0,
          kyc_status: c.kyc_status || "Pending",
          password: ""
        });
      };

      const handleEditSubmit = async (e) => {
        e.preventDefault();
        
        let hashedPassword = editCandidate.password;
        if (editForm.password.trim() !== "") {
          hashedPassword = await getSaltedHash(editForm.email.toLowerCase().trim(), editForm.password);
        }

        setUsers(prev => prev.map(u => {
          if (u.id === editCandidate.id) {
            return {
              ...u,
              name: editForm.name,
              email: editForm.email.toLowerCase().trim(),
              mobile: editForm.mobile,
              city: editForm.city,
              pincode: editForm.pincode,
              referral_code: editForm.referral_code,
              wallet_balance: parseFloat(editForm.wallet_balance) || 0,
              earnings_pending: parseFloat(editForm.earnings_pending) || 0,
              earnings_paid: parseFloat(editForm.earnings_paid) || 0,
              kyc_status: editForm.kyc_status,
              password: hashedPassword
            };
          }
          return u;
        }));

        triggerToast("Candidate details updated successfully!");
        setEditCandidate(null);
      };

      // Retrieve bank record if submitted
      const bankRecord = React.useMemo(() => {
        if (!viewCandidate) return null;
        return kycRecords.find(k => k.user_id === viewCandidate.id);
      }, [viewCandidate, kycRecords]);

      return (
        <div className="space-y-6">
          <div className="glass-card rounded-2xl p-6 text-left">

                                              <span className="text-[9px] text-slate-450 font-bold uppercase mt-2">Fetching from database...</span>
                                            </div>
                                          ) : screenshotUrl ? (
                                            <div className="relative group max-w-sm rounded-xl overflow-hidden border border-slate-800 bg-slate-950/20">
                                              <img src={screenshotUrl} alt="Submission Screenshot Proof" className="max-h-44 w-auto mx-auto object-contain block cursor-zoom-in" onClick={() => setPreviewImage({ title: `Submission SUB-${submission.id.toUpperCase()}`, url: screenshotUrl })} />
                                              <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all cursor-zoom-in pointer-events-none">
                                                <span className="px-3 py-1.5 bg-slate-900/90 text-white font-bold rounded-lg text-[9px] uppercase tracking-wider flex items-center gap-1"><Icon name="maximize" className="w-3.5 h-3.5" /> Zoom Screenshot</span>
                                              </div>
                                            </div>
                                          ) : (
                                            <div className="w-full h-32 border border-dashed border-slate-850 rounded-xl bg-slate-950/15 flex flex-col items-center justify-center text-slate-500">
                                              <svg className="w-8 h-8 text-slate-700 mb-1" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                              </svg>
                                              <span className="text-[9px] uppercase font-bold text-slate-450">No Screenshot Uploaded</span>
                                            </div>
                                          )}
                                        </div>

                                      </div>

                                      {/* Auditor Actions block */}
                                      <div className="border-t border-slate-850 pt-4 mt-2">
                                        {submission.review_status === "Approved" ? (
                                          <div className="flex items-center gap-2 text-emerald-500 font-bold p-3 rounded-lg border border-emerald-500/20 bg-emerald-500/5 text-xs">
                                            <Icon name="check-circle" className="w-5 h-5" />
                                            <span>This task submission is verified and approved. ₹{submission.amount} is added to the candidate's wallet.</span>
                                          </div>
                                        ) : (
                                          <div className="space-y-3">
                                            <div className="flex flex-col gap-1.5">
                                              <label className="text-[9px] uppercase font-bold text-slate-450">Auditor Audit Remarks (Required for Reject & Re-Submit)</label>
                                              <input 
                                                type="text" 
                                                value={auditReasons[task.id] || ""} 
                                                onChange={(e) => setAuditReasons(prev => ({ ...prev, [task.id]: e.target.value }))}
                                                className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-slate-900/60 text-white text-xs placeholder-slate-500 focus:outline-none focus:border-blue-500" 
                                                placeholder="Remarks, i.e., Wrong screenshot, selfie mismatch, incomplete task..." 
                                              />
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-2 pt-1.5">
                                              <button 
                                                onClick={() => handleAuditAction(submission, "Approved")} 
                                                className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-[10px] font-bold uppercase transition tracking-wider cursor-pointer"
                                              >
                                                Approve
                                              </button>
                                              <button 
                                                onClick={() => handleAuditAction(submission, "Under Review")} 
                                                className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-[10px] font-bold uppercase transition tracking-wider cursor-pointer"
                                              >
                                                Under Review
                                              </button>
                                              <button 
                                                onClick={() => handleAuditAction(submission, "Re-Submit", auditReasons[task.id] || "")} 
                                                className="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg text-[10px] font-bold uppercase transition tracking-wider cursor-pointer"
                                              >
                                                Request Re-Submit
                                              </button>
                                              <button 
                                                onClick={() => handleAuditAction(submission, "Rejected", auditReasons[task.id] || "")} 
                                                className="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-[10px] font-bold uppercase transition tracking-wider cursor-pointer"
                                              >
                                                Reject Submission
                                              </button>
                                            </div>
                                          </div>
                                        )}
                                      </div>

                                    </div>
                                  ) : (
                                    <div className="p-3 text-center text-slate-500 italic border-t border-slate-850 pt-3 text-[11px]">
                                      The candidate has not submitted any proof yet. Task is actively assigned.
                                    </div>
                                  )}

                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>

                </div>

                <div className="pt-4 border-t border-slate-800 mt-6 flex justify-end">
                  <button onClick={() => setViewCandidate(null)} className="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-bold uppercase transition cursor-pointer">
                    Close Details
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* Edit Candidate Modal */}
          {editCandidate && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-start justify-center p-6 overflow-y-auto">
              <div className="w-full max-w-2xl glass-card rounded-2xl p-6 relative my-8">
                <button onClick={() => setEditCandidate(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white cursor-pointer">
                  <Icon name="x-circle" className="w-5 h-5" />
                </button>
                <h3 className="text-lg font-bold mb-4 text-white">Edit Candidate Profile: {editCandidate.name}</h3>

                <form onSubmit={handleEditSubmit} className="space-y-4 text-xs max-h-[75vh] overflow-y-auto pr-1">
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Full Name</label>
                      <input required type="text" value={editForm.name} onChange={(e) => setEditForm({ ...editForm, name: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Mobile Number</label>
                      <input required type="text" value={editForm.mobile} onChange={(e) => setEditForm({ ...editForm, mobile: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Email Address</label>
                      <input required type="email" value={editForm.email} onChange={(e) => setEditForm({ ...editForm, email: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">City</label>
                      <input type="text" value={editForm.city} onChange={(e) => setEditForm({ ...editForm, city: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white" placeholder="e.g. Agra" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Pincode</label>
                      <input type="text" value={editForm.pincode} onChange={(e) => setEditForm({ ...editForm, pincode: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white" placeholder="e.g. 282005" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Referred By (Agent)</label>
                      <select value={editForm.referral_code} onChange={(e) => setEditForm({ ...editForm, referral_code: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white">
                        <option value="">Direct / None</option>
                        {agents.map(a => (
                          <option key={a.id} value={a.name}>{a.name}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 rounded-xl bg-slate-900/40 border border-slate-850">
                    <div>
                      <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Wallet Balance</label>
                      <input required type="number" step="0.01" value={editForm.wallet_balance} onChange={(e) => setEditForm({ ...editForm, wallet_balance: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white font-semibold text-blue-500" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Earnings Pending</label>
                      <input required type="number" step="0.01" value={editForm.earnings_pending} onChange={(e) => setEditForm({ ...editForm, earnings_pending: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white font-semibold text-amber-500" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Total Paid Out</label>
                      <input required type="number" step="0.01" value={editForm.earnings_paid} onChange={(e) => setEditForm({ ...editForm, earnings_paid: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white font-semibold text-emerald-500" />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">KYC Verification Status</label>
                      <select value={editForm.kyc_status} onChange={(e) => setEditForm({ ...editForm, kyc_status: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white">
                        <option value="Not Submitted">Not Submitted</option>
                        <option value="Pending">Pending Audit</option>
                        <option value="Approved">Approved / Verified</option>
                        <option value="Rejected">Rejected Details</option>
                        <option value="Blocked">Blocked / Suspended</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Change Password (Leave blank to keep same)</label>
                      <input type="password" value={editForm.password} onChange={(e) => setEditForm({ ...editForm, password: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-slate-850 bg-white/5 text-white" placeholder="Min 6 characters" />
                    </div>
                  </div>

                  <div className="flex gap-3 pt-4 border-t border-slate-800">
                    <button type="button" onClick={() => setEditCandidate(null)} className="w-1/2 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold uppercase transition cursor-pointer">Cancel</button>
                    <button type="submit" className="w-1/2 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold uppercase transition cursor-pointer">Save Profile Changes</button>
                  </div>

                </form>
              </div>
            </div>
          )}

        </div>
      );
    }
    // 3. Task Management (CRUD)
    function AdminTasks({ tasks, setTasks, submissions = [], users = [], triggerToast, setPreviewImage }) {
      const [showCreate, setShowCreate] = useState(false);
      const [editingTaskId, setEditingTaskId] = useState(null);
      const [selectedTask, setSelectedTask] = useState(null);
      const [form, setForm] = useState({ title: "", category: "Google Review", links: "", amount: "", remarks: "", deadline: "", status: "Active" });

      const handleViewSubScreenshot = async (sub) => {
        if (!sub) return;
        if (sub.screenshot) {
          setPreviewImage && setPreviewImage({ title: `Proof: Task SUB-${sub.id.toUpperCase()}`, url: sub.screenshot });
          return;
        }
        const client = getSupabaseClient();
        if (client) {
          const toastId = triggerToast("Fetching screenshot proof...", "info");
          try {
            const { data, error } = await client.from("krv_submissions").select("screenshot").eq("id", sub.id).single();
            if (!error && data && data.screenshot) {
              sub.screenshot = data.screenshot;
              setPreviewImage && setPreviewImage({ title: `Proof: Task SUB-${sub.id.toUpperCase()}`, url: data.screenshot });
            } else {
              triggerToast("Failed to load screenshot.", "error");
            }
          } catch (e) {
            console.error(e);
            triggerToast("Error loading screenshot.", "error");
          }
        } else {
          triggerToast("Supabase client not connected.", "error");
        }
      };

      const handleReassignReview = (taskId, reviewId, reviewSno) => {
        if (!confirm("Are you sure you want to reassign this review? It will be released back to the unused pool and can be claimed by any active candidate.")) {
          return;
        }

        setTasks(prevTasks => prevTasks.map(t => {
          if (t.id === taskId) {
            const updatedReviews = (t.imported_reviews || []).map(r => {
              const matchId = reviewId && r.id === reviewId;
              const matchSno = reviewSno && r.sno === reviewSno;
              if (matchId || matchSno) {
                return { ...r, status: "Unused", assigned_to: null };
              }
              return r;
            });
            
            const updatedTask = { ...t, imported_reviews: updatedReviews };
            
            if (selectedTask && selectedTask.id === taskId) {
              setSelectedTask(updatedTask);
            }
            
            return updatedTask;
          }
          return t;
        }));

        triggerToast("Review assignment released successfully! It is now available for other active candidates.", "success");
      };

      const [pasteReviews, setPasteReviews] = useState("");
      const [importedReviewsList, setImportedReviewsList] = useState([]);
      const [expandedTaskReviews, setExpandedTaskReviews] = useState({});

      const formatInstructions = (remarks) => {
        if (!remarks) return [];
        return remarks
          .split(/\r?\n/)
          .map(line => line.trim())
          .filter(line => line.length > 0);
      };

      const renderInstructionPreview = (remarks, onViewAll) => {
        const points = formatInstructions(remarks);
        if (points.length === 0) return <p className="text-xs text-slate-500 italic">No instructions provided.</p>;
        
        const limit = 2; // Show only first 2 lines
        const displayedPoints = points.slice(0, limit);
        const hasMore = points.length > limit;
        
        return (
          <div className="space-y-2 mb-4">
            <ul className="space-y-1 text-xs text-slate-400 leading-relaxed list-none pl-0">
              {displayedPoints.map((pt, idx) => {
                const isHeader = pt.startsWith('#');
                const cleanPt = pt.replace(/^#+\s*/, '').trim();
                return (
                  <li key={idx} className={isHeader ? "font-extrabold text-slate-200 mt-2 first:mt-0 text-[11px]" : "flex items-start gap-1.5"}>
                    {!isHeader && <span className="text-blue-500 font-extrabold shrink-0">•</span>}
                    <span className={isHeader ? "" : "break-words"}>{cleanPt}</span>
                  </li>
                );
              })}
            </ul>
            {hasMore && (
              <button
                type="button"
                onClick={(e) => {
                  e.stopPropagation();
                  onViewAll();
                }}
                className="text-[10px] font-extrabold text-blue-500 hover:text-blue-400 uppercase tracking-wider transition cursor-pointer flex items-center gap-1 mt-1 bg-transparent border-none p-0"
              >
                🔍 View All Instructions ({points.length} points)
              </button>
            )}
          </div>
        );
      };

      const toggleForm = () => {
        if (showCreate) {
          setForm({ title: "", category: "Google Review", links: "", amount: "", remarks: "", deadline: "", status: "Active" });
          setEditingTaskId(null);
          setPasteReviews("");
          setImportedReviewsList([]);
        }
        setShowCreate(!showCreate);
      };

      const toggleTaskReviews = (taskId) => {
        setExpandedTaskReviews(prev => ({ ...prev, [taskId]: !prev[taskId] }));
      };

      const parseReviewsText = (text) => {
        const rows = text.split(/\r?\n/);
        const parsed = [];
        rows.forEach((row) => {
          if (!row.trim()) return;
          let sno = parsed.length + 1;
          let textStr = row.trim();
          let cols = row.split("\t");
          if (cols.length < 2) {
            cols = row.split(",");
          }
          if (cols.length >= 2) {
            const snoStr = cols[0].replace(/['"\s]/g, "").trim();
            const maybeSno = parseInt(snoStr);
            if (!isNaN(maybeSno)) {
              sno = maybeSno;
              textStr = cols.slice(1).join(",").replace(/^['"]|['"]$/g, "").trim();
            }
          }
          if (textStr && textStr.toLowerCase() !== "review" && textStr.toLowerCase() !== "review text" && textStr.toLowerCase() !== "reviews") {
            parsed.push({
              id: "r" + (parsed.length + 1),
              sno: sno,
              text: textStr,
              assigned_to: null,
              status: "Unused"
            });
          }
        });
        return parsed;
      };

      const downloadDemoCsv = () => {
        const csvContent = "S.No,Review Text\n1,This is a wonderful application! Extremely fast and user-friendly.\n2,Outstanding support team and brilliant workflow interface.\n3,Highly recommended for remote candidate task tracking.\n4,Excellent performance, clean layout, and smooth animations.";
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "krv_reviews_demo_format.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("Demo CSV format downloaded successfully!");
      };

      const handleCsvUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const text = event.target.result;
            const parsed = parseReviewsText(text);
            if (parsed.length > 0) {
              setImportedReviewsList(parsed);
              triggerToast(`${parsed.length} reviews successfully imported from file!`);
            } else {
              triggerToast("Could not parse file. Check format: S.No, Review Text", "error");
            }
          };
          reader.readAsText(file);
        }
      };

      const handlePasteImport = (e) => {
        const val = e.target.value;
        setPasteReviews(val);
        const parsed = parseReviewsText(val);
        setImportedReviewsList(parsed);
      };

      const handleFormSubmit = (e) => {
        e.preventDefault();
        
        if (editingTaskId) {
          setTasks(prev => prev.map(t => {
            if (t.id === editingTaskId) {
              const updatedTask = {
                ...t,
                title: form.title,
                category: form.category,
                links: form.links,
                amount: parseFloat(form.amount) || 0,
                remarks: form.remarks,
                deadline: form.deadline,
                status: form.status || "Active"
              };
              if (form.category === "Application Review Provide by Brand") {
                updatedTask.imported_reviews = importedReviewsList;
              } else {
                delete updatedTask.imported_reviews;
              }
              return updatedTask;
            }
            return t;
          }));
          triggerToast("Workforce task updated successfully!");
          setEditingTaskId(null);
        } else {
          const newTask = {
            id: "t" + (Math.max(0, ...tasks.map(t => parseInt(t.id.replace("t", "")) || 0)) + 1),
            title: form.title,
            category: form.category,
            links: form.links,
            amount: parseFloat(form.amount) || 0,
            remarks: form.remarks,
            deadline: form.deadline,
            status: form.status || "Active"
          };
          if (form.category === "Application Review Provide by Brand") {
            newTask.imported_reviews = importedReviewsList;
          }
          setTasks([...tasks, newTask]);
          triggerToast("New digital task created successfully!");
        }

        setForm({ title: "", category: "Google Review", links: "", amount: "", remarks: "", deadline: "", status: "Active" });
        setPasteReviews("");
        setImportedReviewsList([]);
        setShowCreate(false);
      };

      const handleDeleteTask = async (id) => {
        const client = getSupabaseClient();
        if (client) {
          try {
            const { error } = await client.from("krv_tasks").delete().eq("id", id);
            if (error) {
              console.error("Direct Supabase task delete failed:", error);
              triggerToast("Delete Failed: " + error.message, "error");
            } else {
              setTasks(prev => prev.filter(t => t.id !== id));
              triggerToast("Task deleted successfully.", "info");
            }
          } catch (err) {
            console.error("Failed to delete task:", err);
            triggerToast("Delete Failed: " + err.message, "error");
          }
        } else {
          setTasks(prev => prev.filter(t => t.id !== id));
          triggerToast("Task deleted locally.", "info");
        }
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <h3 className="text-lg font-bold text-white">Total Assigned Tasks: {tasks.length} Active</h3>
            <button onClick={toggleForm} className="px-4 py-2 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md cursor-pointer">
              {showCreate ? "Cancel" : "Create New Task"}
            </button>
          </div>

          {showCreate && (
            <div className="glass-card rounded-2xl p-6">
              <h4 className="font-bold text-base mb-4 text-white">{editingTaskId ? "Edit Workforce Task" : "Create Workforce Task"}</h4>
              <form onSubmit={handleFormSubmit} className="space-y-4">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Task Title</label>
                    <input required type="text" value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Price Amount (INR)</label>
                    <input required type="number" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Task Category</label>
                    <select value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white">
                      <option value="Google Review">Google Maps Review</option>
                      <option value="Application Review">Application Review</option>
                      <option value="Application Review Provide by Brand">Application Review Provide by Brand</option>
                      <option value="Audio Recording">Audio Recording</option>
                      <option value="Video Recording">Video Recording</option>
                      <option value="Product Review">Product Review</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Task Links</label>
                    <input required type="url" value={form.links} onChange={(e) => setForm({ ...form, links: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="https://store.url" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Deadline</label>
                    <input required type="date" value={form.deadline} onChange={(e) => setForm({ ...form, deadline: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Task Status</label>

    // 4. Submissions Review System
    function AdminReviews({ submissions, setSubmissions, users, setUsers, setNotifications, notifications, triggerToast, updateWallet, setPreviewImage }) {
      const [reviewModal, setReviewModal] = useState(null);
      const [rejectionReason, setRejectionReason] = useState("");
      const [searchTerm, setSearchTerm] = useState("");
      const [startDate, setStartDate] = useState("");
      const [endDate, setEndDate] = useState("");
      const [statusTab, setStatusTab] = useState("Pending");

      const handleOpenReviewModal = async (sub) => {
        if (!sub) {
          setReviewModal(null);
          return;
        }
        setRejectionReason(sub.rejection_reason || "");
        setReviewModal({ ...sub, isScreenshotLoading: true });
        
        if (sub.screenshot) {
          setReviewModal({ ...sub, isScreenshotLoading: false });
          return;
        }
        
        const client = getSupabaseClient();
        if (client) {
          try {
            const { data, error } = await client.from("krv_submissions").select("screenshot").eq("id", sub.id).single();
            if (!error && data) {
              setReviewModal(prev => {
                if (prev && prev.id === sub.id) {
                  return { ...prev, screenshot: data.screenshot, isScreenshotLoading: false };
                }
                return prev;
              });
              setSubmissions(prevSubs => prevSubs.map(s => s.id === sub.id ? { ...s, screenshot: data.screenshot } : s));
            } else {
              setReviewModal(prev => prev && prev.id === sub.id ? { ...prev, isScreenshotLoading: false } : prev);
            }
          } catch (e) {
            console.error("Error fetching screenshot:", e);
            setReviewModal(prev => prev && prev.id === sub.id ? { ...prev, isScreenshotLoading: false } : prev);
          }
        } else {
          setReviewModal({ ...sub, isScreenshotLoading: false });
        }
      };

      const pendingSub = useMemo(() => {
        return submissions.filter(s => {
          if (!s.review_status) return false;
          const status = s.review_status.trim().toLowerCase();
          if (statusTab === "Pending") {
            return status === "pending" || status === "under review";
          } else if (statusTab === "All") {
            return true;
          } else {
            return status === statusTab.toLowerCase();
          }
        });
      }, [submissions, statusTab]);

      const filteredPendingSub = useMemo(() => {
        const list = pendingSub.filter(s => {
          // Date Range Filter
          if (startDate && s.date && s.date < startDate) return false;
          if (endDate && s.date && s.date > endDate) return false;

          const worker = users.find(u => u.id === s.user_id);
          const term = searchTerm.trim().toLowerCase();
          if (!term) return true;
          
          const workerId = `user-${s.user_id}`.toLowerCase();
          const shortWorkerId = String(s.user_id).toLowerCase();
          const workerName = worker ? worker.name.toLowerCase() : "";
          const workerMobile = worker && worker.mobile ? worker.mobile.toLowerCase() : "";
          const taskId = `task-${s.task_id}`.toLowerCase();
          const shortTaskId = String(s.task_id).toLowerCase();
          const reviewStatus = s.review_status ? s.review_status.toLowerCase() : "";
          const submissionDate = s.date ? s.date.toLowerCase() : "";
          
          return workerId.includes(term) || 
                 shortWorkerId.includes(term) ||
                 workerName.includes(term) || 
                 workerMobile.includes(term) ||
                 taskId.includes(term) ||
                 shortTaskId.includes(term) ||
                 reviewStatus.includes(term) ||
                 submissionDate.includes(term);
        });

        // Sort descending: newest submissions first
        return [...list].sort((a, b) => {
          const dateA = a.date || "";
          const dateB = b.date || "";
          if (dateA !== dateB) {
            return dateB.localeCompare(dateA);
          }
          
          const parseSubId = (id) => {
            if (typeof id === 'number') return id;
            if (typeof id !== 'string') return 0;
            const num = parseInt(id.replace(/\D/g, ""), 10);
            return isNaN(num) ? 0 : num;
          };
          
          const idA = parseSubId(a.id);
          const idB = parseSubId(b.id);
          if (idA !== idB) {
            return idB - idA;
          }
          
          return String(b.id).localeCompare(String(a.id));
        });
      }, [pendingSub, users, searchTerm, startDate, endDate]);

        };

            console.error("Error fetching row screenshot:", e);

        }
        setLoadingScreenshotIds(prev => prev.filter(id => id !== sub.id));

          setViewSubmission(null);
          return;

        setViewSubmission({ ...sub, isScreenshotLoading: true });
        
        if (sub.screenshot) {
          setViewSubmission({ ...sub, isScreenshotLoading: false });
          return;
        }
        
        const client = getSupabaseClient();
        if (client) {
          try {
            const { data, error } = await client.from("krv_submissions").select("screenshot").eq("id", sub.id).single();
            if (!error && data) {
              setViewSubmission(prev => {
                if (prev && prev.id === sub.id) {
                  return { ...prev, screenshot: data.screenshot, isScreenshotLoading: false };
                }
                return prev;

                setSubmissions(prevSubs => prevSubs.map(s => s.id === sub.id ? { ...s, screenshot: data.screenshot } : s));
              }

              setViewSubmission(prev => prev && prev.id === sub.id ? { ...prev, isScreenshotLoading: false } : prev);

      const filteredList = useMemo(() => {

              matchCandidate = nameMatch || mobileMatch || emailMatch || idMatch;
            } else {
              matchCandidate = false;
            }

          // Candidate Activity Filter
          let matchActivity = true;
          if (activityFilter !== "All" && user) {
            const computedStatus = getUserActivityStatus(user, submissions, kycRecords);
            if (activityFilter === "Active") {
              matchActivity = computedStatus === "Active";
            } else if (activityFilter === "Inactive") {
              matchActivity = computedStatus === "Inactive" || computedStatus === "Activation Requested";
            }
          }
          
          // Task details & Search (Title, ID)
          const task = tasks.find(t => String(t.id) === String(s.task_id));
          let matchTask = true;
          if (taskSearchTerm.trim() !== "") {
            const term = taskSearchTerm.toLowerCase().trim();
            const directId = s.task_id ? s.task_id.toLowerCase() : "";
            const directPrefixed = s.task_id ? `task-${s.task_id.toLowerCase()}` : "";
            const directMatch = directId.includes(term) || directPrefixed.includes(term);
            
            if (task) {
              const titleMatch = task.title ? task.title.toLowerCase().includes(term) : false;
              const idMatch = task.id ? `task-${task.id.toLowerCase()}`.includes(term) || task.id.toLowerCase().includes(term) : false;
              matchTask = titleMatch || idMatch || directMatch;
            } else {
              matchTask = directMatch;
            }
          }
          
          // Date ranges
          let matchDate = true;
          if (startDate) matchDate = matchDate && (s.date >= startDate);
          if (endDate) matchDate = matchDate && (s.date <= endDate);
          
          return matchStatus && matchCandidate && matchTask && matchDate && matchActivity;

              const escapeCsv = (str) => {
                if (str === undefined || str === null) return '""';
                return `"${str.toString().replace(/"/g, '""')}"`;
              };
              
              return [
                escapeCsv(`SUB-${String(s.id).toUpperCase()}`),
                escapeCsv(`USER-${String(s.user_id).toUpperCase()}`),
                escapeCsv(candidate ? candidate.name : 'N/A'),
                escapeCsv(candidate ? candidate.mobile : 'N/A'),
                escapeCsv(`TASK-${String(s.task_id).toUpperCase()}`),
                escapeCsv(task ? task.title : 'N/A'),

              ].join(",");

    // 9b. Proof Booklet Export Panel
    function AdminProofs({ users, submissions, setSubmissions, tasks, triggerToast, setPreviewImage }) {
      const [filterStatus, setFilterStatus] = useState("All");
      const [searchTerm, setSearchTerm] = useState("");
      const [taskSearchTerm, setTaskSearchTerm] = useState("");
      const [startDate, setStartDate] = useState("");
      const [endDate, setEndDate] = useState("");
      const [loadingScreenshotIds, setLoadingScreenshotIds] = useState([]);
      const [loadingProgress, setLoadingProgress] = useState({ active: false, loaded: 0, total: 0 });

      const handleLoadRowScreenshot = async (sub) => {
        if (sub.screenshot || loadingScreenshotIds.includes(sub.id)) return;
        setLoadingScreenshotIds(prev => [...prev, sub.id]);
        const client = getSupabaseClient();
        if (client) {
          try {
            const { data, error } = await client.from("krv_submissions").select("screenshot").eq("id", sub.id).single();
            if (!error && data && setSubmissions) {
              setSubmissions(prevSubs => prevSubs.map(s => s.id === sub.id ? { ...s, screenshot: data.screenshot } : s));
            }
          } catch (e) {
            console.error("Error fetching row screenshot in proofs booklet:", e);
          }
        }
        setLoadingScreenshotIds(prev => prev.filter(id => id !== sub.id));
      };

      const filteredList = useMemo(() => {
        return submissions.filter(s => {
          const matchStatus = filterStatus === "All" || s.review_status === filterStatus;
          
          const user = users.find(u => u.id === s.user_id);
          let matchCandidate = true;
          if (searchTerm.trim() !== "") {
            const term = searchTerm.toLowerCase().trim();
            if (user) {
              const nameMatch = user.name ? user.name.toLowerCase().includes(term) : false;
              const mobileMatch = user.mobile ? user.mobile.includes(term) : false;
              const emailMatch = user.email ? user.email.toLowerCase().includes(term) : false;
              const idMatch = user.id ? `user-${user.id.toLowerCase()}`.includes(term) || user.id.toLowerCase().includes(term) : false;
              matchCandidate = nameMatch || mobileMatch || emailMatch || idMatch;
            } else {
              matchCandidate = false;
            }
          }

          const task = tasks.find(t => String(t.id) === String(s.task_id));
          let matchTask = true;
          if (taskSearchTerm.trim() !== "") {
            const term = taskSearchTerm.toLowerCase().trim();
            if (task) {
              const titleMatch = task.title ? task.title.toLowerCase().includes(term) : false;
              const idMatch = task.id ? `task-${task.id.toLowerCase()}`.includes(term) || task.id.toLowerCase().includes(term) : false;
              matchTask = titleMatch || idMatch;
            } else {
              matchTask = false;
            }
          }

          if (startDate && s.date && s.date < startDate) return false;
          if (endDate && s.date && s.date > endDate) return false;

          return matchStatus && matchCandidate && matchTask;
        });
      }, [submissions, users, tasks, filterStatus, searchTerm, taskSearchTerm, startDate, endDate]);

      const handleGeneratePDFBooklet = async () => {
        const missingSubs = filteredList.filter(s => !s.screenshot);
        
        if (missingSubs.length > 0) {
          setLoadingProgress({ active: true, loaded: 0, total: missingSubs.length });
          const client = getSupabaseClient();
          if (!client) {
            triggerToast("Supabase client connection missing.", "error");
            setLoadingProgress({ active: false, loaded: 0, total: 0 });
            return;
          }
          
          const batchSize = 5;
          for (let i = 0; i < missingSubs.length; i += batchSize) {
            const batch = missingSubs.slice(i, i + batchSize);
            try {
              const results = await Promise.all(
                batch.map(async (s) => {
                  const { data, error } = await client.from("krv_submissions").select("screenshot").eq("id", s.id).single();
                  return { id: s.id, screenshot: (!error && data && data.screenshot) ? data.screenshot : "assets/dashboard_preview.png" };
                })
              );
              
              if (setSubmissions) {
                setSubmissions(prevSubs => prevSubs.map(sub => {
                  const found = results.find(r => r.id === sub.id);
                  return found ? { ...sub, screenshot: found.screenshot } : sub;
                }));
              }
              
              setLoadingProgress(prev => ({ ...prev, loaded: Math.min(prev.loaded + batch.length, prev.total) }));
            } catch (err) {
              console.error("Batch load error in booklet generator:", err);
            }
          }
          setLoadingProgress({ active: false, loaded: 0, total: 0 });
        }
        
        triggerPrintWindow();
      };

      const triggerPrintWindow = () => {
        const currentList = submissions.filter(s => {

          let matchCandidate = true;
          if (searchTerm.trim() !== "") {
            const term = searchTerm.toLowerCase().trim();
            if (user) {
              const nameMatch = user.name ? user.name.toLowerCase().includes(term) : false;
              const mobileMatch = user.mobile ? user.mobile.includes(term) : false;
              const emailMatch = user.email ? user.email.toLowerCase().includes(term) : false;
              const idMatch = user.id ? `user-${user.id.toLowerCase()}`.includes(term) || user.id.toLowerCase().includes(term) : false;
              matchCandidate = nameMatch || mobileMatch || emailMatch || idMatch;
            } else {
              matchCandidate = false;
            }
          }
          const task = tasks.find(t => String(t.id) === String(s.task_id));
          let matchTask = true;
          if (taskSearchTerm.trim() !== "") {
            const term = taskSearchTerm.toLowerCase().trim();
            if (task) {
              const titleMatch = task.title ? task.title.toLowerCase().includes(term) : false;
              const idMatch = task.id ? `task-${task.id.toLowerCase()}`.includes(term) || task.id.toLowerCase().includes(term) : false;
              matchTask = titleMatch || idMatch;
            } else {
              matchTask = false;
            }
          }
          if (startDate && s.date && s.date < startDate) return false;
          if (endDate && s.date && s.date > endDate) return false;
          return matchStatus && matchCandidate && matchTask;
        });

        if (currentList.length === 0) {
          triggerToast("No items found to compile.", "error");
          return;

        const printWindow = window.open("", "_blank");

            if (u.id === editingAgent.id) {
              return {
                ...u,
                name: form.name,
                mobile: form.mobile,
                email: emailLower,
                city: form.city,
                password: hashedPassword

            return u;

          setEditingAgent(null);
          setShowOnboard(false);
          setForm({ name: "", mobile: "", email: "", city: "", password: "" });

          // Onboard Agent logic
          if (users.some(u => u.email.toLowerCase().trim() === emailLower)) {
            triggerToast("Email already exists in system!", "error");
            return;

          const hashedPassword = await getSaltedHash(emailLower, form.password);
          const newAgent = {
            id: "a" + Date.now(),
            name: form.name,
            mobile: form.mobile,
            email: emailLower,
            city: form.city,
            password: hashedPassword,
            role: "agent",

            earnings_paid: 0,

          setShowOnboard(false);
          setForm({ name: "", mobile: "", email: "", city: "", password: "" });
