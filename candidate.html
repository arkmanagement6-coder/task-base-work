  <script>
    // Cryptographic Secure Hashing function for session validation
    const sha256Direct = async (text) => {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // Fast Session Verification & Redirection Guard
    (async () => {
      const storedSession = localStorage.getItem("krv-current-user-session");
      if (!storedSession) {
        window.location.href = "login.html";
        return;
      }
      try {
        const { user, signature } = JSON.parse(storedSession);
        if (!user || !signature || user.role !== "candidate") {
          localStorage.removeItem("krv-current-user-session");
          window.location.href = "login.html";
          return;
        }
        const expectedSig = await sha256Direct(`${user.id}:${user.email}:${user.role}:KRV-SESSION-SECRET-2026!`);
        if (signature !== expectedSig) {
          localStorage.removeItem("krv-current-user-session");
          window.location.href = "login.html";
        }
      } catch (e) {
        localStorage.removeItem("krv-current-user-session");
        window.location.href = "login.html";
      }
    })();
  </script>

    // 2. Tasks
    function CandidateTasks({ currentUser, tasks, setTasks, submissions, setSubmissions, triggerToast, setUsers, setCurrentPage, autoAssignTaskReview }) {

      const [submitDrawer, setSubmitDrawer] = useState(null);
      const [formProof, setFormProof] = useState({ link: "", remarks: "" });
      const [screenshotFile, setScreenshotFile] = useState(null);

      useEffect(() => {
        if (!autoAssignTaskReview) return;
        tasks.forEach(t => {
          if (t.category === "Application Review Provide by Brand" && t.imported_reviews && t.imported_reviews.length > 0) {
            const alreadyAssigned = t.imported_reviews.find(r => r.assigned_to === currentUser.id);
            if (!alreadyAssigned) {
              autoAssignTaskReview(t.id, currentUser.id);
            }
          }
        });

      const getTaskSubmission = (taskId) => submissions.find(s => s.task_id === taskId && s.user_id === currentUser.id);
      const filteredTasks = useMemo(() => {
        if (filterCategory === "All") return tasks;
        return tasks.filter(t => t.category === filterCategory);
      }, [tasks, filterCategory]);

      const handleCopyLink = (link) => {
        navigator.clipboard.writeText(link);
        triggerToast("Task link copied!");

      const handleSubmission = (e) => {
        e.preventDefault();
        
        if (currentUser.kyc_status !== "Approved") {

          return;
        }

        const newSub = {
          id: "s" + (submissions.length + 1),
          user_id: currentUser.id,
          task_id: submitDrawer.id,
          submitted_link: formProof.link,
          screenshot: screenshotFile || "assets/dashboard_preview.png",
          video: "",
          remarks: formProof.remarks,
          review_status: "Pending",
          amount: submitDrawer.amount,
          date: new Date().toISOString().split('T')[0]
        };

        setSubmissions([...submissions, newSub]);
        
        if (submitDrawer.category === "Application Review Provide by Brand" && setTasks) {
          const client = getSupabaseClient();
          if (client && submitDrawer.imported_reviews) {
            const nextReviews = submitDrawer.imported_reviews.map(r => 
              r.assigned_to === currentUser.id ? { ...r, status: "Used" } : r
            );
            client.from("krv_tasks").update({ imported_reviews: nextReviews }).eq("id", submitDrawer.id).then(({ error }) => {
              if (error) console.error("Failed to mark review as Used in Supabase:", error);
            });
            setTasks(prev => prev.map(t => t.id === submitDrawer.id ? { ...t, imported_reviews: nextReviews } : t));
          }
        }
        
        setUsers(prev => prev.map(u => u.id === currentUser.id ? { ...u, earnings_pending: u.earnings_pending + submitDrawer.amount } : u));
        triggerToast("Task proof submitted successfully!");
        setSubmitDrawer(null);
        setFormProof({ link: "", remarks: "" });
        setScreenshotFile(null);
      };

      if (currentUser.kyc_status !== "Approved") {
        return (
          <div className="max-w-xl mx-auto py-10 text-center space-y-6">
            <div className="w-20 h-20 rounded-full bg-amber-500/10 text-amber-500 flex items-center justify-center mx-auto border border-amber-500/20">
              <Icon name="lock" className="w-10 h-10" />
            </div>
            
            <div className="space-y-2">
              <h3 className="text-xl font-bold text-white tracking-tight">Earning Tasks Locked</h3>
              <p className="text-xs text-slate-400 leading-relaxed">
                {currentUser.kyc_status === "Pending" ? (
                  "Your KYC Verification is currently Under Review. Our administration team is auditing your bank account details and verification selfie. Tasks will unlock immediately once approved (usually reviewed within 24 hours)."
                ) : currentUser.kyc_status === "Rejected" ? (
                  "Your KYC Verification was Rejected by the administrator. Please navigate to the KYC Verification menu to inspect the rejection reason, update details, and re-submit to restore task access."
                ) : (
                  "To secure direct direct-to-bank payments and satisfy platform anti-spam rules, you are required to submit identity files under the KYC Verification panel before unlocking active earning tasks."
                )}
              </p>
            </div>

            <div className="p-5 rounded-2xl border border-slate-200/50 dark:border-slate-800/40 bg-white/40 dark:bg-slate-900/40 backdrop-blur text-xs text-slate-400 space-y-3 max-w-sm mx-auto">
              <div className="flex items-center justify-between font-bold border-b border-slate-250 dark:border-slate-800 pb-2 mb-1">
                <span className="uppercase text-[10px] tracking-wider text-slate-400">Verification Steps</span>
                <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                  currentUser.kyc_status === "Pending" ? "bg-amber-500/10 text-amber-500 border border-amber-500/20" :
                  currentUser.kyc_status === "Rejected" ? "bg-rose-500/10 text-rose-500 border border-rose-500/20" :
                  "bg-slate-500/10 text-slate-400 border border-slate-500/20"
                }`}>{currentUser.kyc_status || "Not Started"}</span>
              </div>
              
              <div className="flex items-center gap-2.5">
                <Icon name="check-circle" className="w-4 h-4 text-emerald-500" />
                <span className="text-left text-[11px]">Submit bank accounts & Selfie details</span>
              </div>

    function CandidateReports({ currentUser, mySubmissions, withdrawals }) {
      const [filterStatus, setFilterStatus] = useState("All");

      const filteredList = useMemo(() => {
        return mySubmissions.filter(s => {
          const matchStatus = filterStatus === "All" || s.review_status === filterStatus;
          const matchType = filterType === "All" || s.submitted_link.includes(filterType);
          return matchStatus && matchType;
        });
      }, [mySubmissions, filterStatus, filterType]);

      const handleExport = (format) => {
        let content = "";
        let filename = `krv_report_${currentUser.name.replace(" ", "_")}_${new Date().toISOString().split('T')[0]}`;
        
        if (format === "csv") {
          content = "Submission ID,Amount,Review Status,Link,Date\n" + 
            filteredList.map(s => `SUB-${s.id.toUpperCase()},${s.amount},${s.review_status},${s.submitted_link},${s.date}`).join("\n");
          filename += ".csv";
        } else if (format === "excel") {
          content = "Submission ID\tAmount\tReview Status\tLink\tDate\n" + 
            filteredList.map(s => `SUB-${s.id.toUpperCase()}\t${s.amount}\t${s.review_status}\t${s.submitted_link}\t${s.date}`).join("\n");
          filename += ".xls";
        } else {
          content = "KRV MANAGEMENT WORK REPORT\n=========================\n" + 
            `Candidate Name: ${currentUser.name}\n` +
            `Total Approved: ${filteredList.filter(s => s.review_status === "Approved").length} Tasks\n` + 
            `Total Wallet Bal: ${currentUser.wallet_balance} Rs\n\n` +
            "SUBMISSIONS LIST:\n-----------------\n" +
            filteredList.map(s => `[SUB-${s.id.toUpperCase()}] Price: Rs.${s.amount} | Status: ${s.review_status}\nLink: ${s.submitted_link}\nRemarks: ${s.remarks || "N/A"}\n---`).join("\n");
          filename += ".pdf";
        }

        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="space-y-6">

    // 6. Profile
    function CandidateProfile({ currentUser, users, setUsers, triggerToast, setCurrentUser }) {
      const [pwd, setPwd] = useState({ old: "", new: "", confirm: "" });
      const [showOld, setShowOld] = useState(false);
      const [showNew, setShowNew] = useState(false);
      const [showConfirm, setShowConfirm] = useState(false);

      const handleUpdatePassword = async (e) => {
        e.preventDefault();
        const hashedOld = await getSaltedHash(currentUser.email, pwd.old);
        if (hashedOld !== currentUser.password) {
          triggerToast("Incorrect current password.", "error");
          return;
        }

        if (pwd.new !== pwd.confirm) {
          triggerToast("Confirm password does not match.", "error");
          return;
        }

        const hashedNew = await getSaltedHash(currentUser.email, pwd.new);
        const client = getSupabaseClient();
        if (client) {
          const { error } = await client.from("krv_users").update({ password: hashedNew }).eq("id", currentUser.id);
          if (error) {
            triggerToast("Failed to update password in database.", "error");
            return;
          }
        }
        setUsers(prev => prev.map(u => {
          if (u.id === currentUser.id) {
            const updated = { ...u, password: hashedNew };
            if (setCurrentUser) {
              setCurrentUser(updated);
              signSession(updated).then(signature => {
                localStorage.setItem("krv-current-user-session", JSON.stringify({ user: updated, signature }));
              });
            }
            return updated;
          }
          return u;
        }));

        triggerToast("Password updated successfully!");
        setPwd({ old: "", new: "", confirm: "" });
      };

      return (
        <div className="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
          <div className="glass-card rounded-2xl p-6 space-y-4">
            <h3 className="text-lg font-bold text-white">Personal Profile Details</h3>

            <h3 className="text-lg font-bold mb-4 text-white">Change Account Password</h3>
            <form onSubmit={handleUpdatePassword} className="space-y-4">
              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Current Password</label>
                <div className="relative">
                  <input required type={showOld ? "text" : "password"} value={pwd.old} onChange={(e) => setPwd({ ...pwd, old: e.target.value })} className="w-full pl-3 pr-10 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" />
                  <button type="button" onClick={() => setShowOld(!showOld)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
                    <Icon name={showOld ? "eye" : "eye-off"} className="w-4 h-4" />

                </div>

              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">New Password</label>

    function CandidatePanel({

      submissions, setSubmissions, kycRecords, setKycRecords, withdrawals, setWithdrawals,
      tickets, setTickets, notifications, setNotifications, handleLogout, theme, setTheme, triggerToast, autoAssignTaskReview
    }) {
      const [sidebarOpen, setSidebarOpen] = useState(() => window.innerWidth >= 768);
      const [notificationDropdown, setNotificationDropdown] = useState(false);
      const [previewImage, setPreviewImage] = useState(null);

      // Local KYC fetch
      const myKyc = useMemo(() => kycRecords.find(k => k.user_id === currentUser.id) || null, [kycRecords, currentUser]);
      const myNotifications = useMemo(() => notifications.filter(n => n.user_id === currentUser.id), [notifications, currentUser]);
      const mySubmissions = useMemo(() => submissions.filter(s => s.user_id === currentUser.id), [submissions, currentUser]);

      const sidebarItems = [
        { id: "dashboard", icon: "home", label: "Home" },
        { id: "tasks", icon: "tasks", label: "Tasks" },
        { id: "earnings", icon: "earnings", label: "Earnings" },
        { id: "reports", icon: "reports", label: "Reports" },
        { id: "kyc", icon: "kyc", label: "KYC Verification", alert: (currentUser.kyc_status !== "Approved") },
        { id: "profile", icon: "profile", label: "Profile" },
        { id: "support", icon: "support", label: "Support Tickets" }
      ];

      return (
        <div className="min-h-screen flex">
          {/* Mobile Sidebar Backdrop Overlay */}
          {sidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/60 backdrop-blur-sm z-20 md:hidden cursor-pointer" 
              onClick={() => setSidebarOpen(false)}
            />
          )}

          {/* Sidebar */}
          <aside className={`bg-slate-900 border-r border-slate-800 text-slate-300 w-64 shrink-0 flex flex-col justify-between transition-all duration-300 ${
            sidebarOpen ? "translate-x-0" : "-translate-x-full md:w-0"
          } fixed md:relative h-full md:h-auto z-30`}>
            
            <div>
              {/* Sidebar Branding */}
              <div className="p-6 flex items-center justify-between border-b border-slate-800 bg-slate-950/20 whitespace-nowrap">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold shrink-0">K</div>
                  <div className="min-w-0">
                    <span className="text-sm font-bold tracking-tight text-white block truncate">KRV Portal</span>
                    <span className="block text-[8px] font-bold text-slate-400 uppercase tracking-widest truncate">Candidate</span>
                  </div>
                </div>
                <button onClick={() => setSidebarOpen(false)} className="md:hidden text-slate-400 hover:text-white"><Icon name="x-circle" className="w-4 h-4" /></button>
              </div>

              {/* Sidebar Menu */}
              <nav className="p-4 space-y-1">
                {sidebarItems.map(item => (
                  <button 
                    key={item.id}
                    onClick={() => setCurrentPage(item.id)}
                    className={`w-full flex items-center justify-between px-4 py-3 rounded-lg text-sm font-semibold transition cursor-pointer whitespace-nowrap ${
                      currentPage === item.id 
                        ? "bg-blue-600 text-white shadow-lg" 
                        : "hover:bg-slate-800 hover:text-white"
                    }`}
                  >
                    <div className="flex items-center gap-3">
                      <Icon name={item.icon} className="w-4 h-4 shrink-0" />
                      <span className="whitespace-nowrap">{item.label}</span>
                    </div>
                    {item.alert && (
                      <span className={`w-2 h-2 rounded-full shrink-0 ${currentUser.kyc_status === "Rejected" ? "bg-rose-500" : "bg-yellow-500"}`} />
                    )}
                  </button>
                ))}
              </nav>
            </div>

            {/* Logout button */}
            <div className="p-4 border-t border-slate-800 bg-slate-950/15">
              <button onClick={handleLogout} className="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold hover:bg-red-500/10 hover:text-red-400 transition cursor-pointer whitespace-nowrap">
                <Icon name="logout" className="w-4 h-4 shrink-0" />
                <span className="whitespace-nowrap">Logout</span>
              </button>
            </div>
          </aside>

          {/* Core Content Area */}
          <div className="flex-grow flex flex-col min-h-screen overflow-x-hidden">
            {/* Header */}
            <header className="px-6 py-4 flex items-center justify-between bg-white/70 dark:bg-slate-900/60 backdrop-blur-xl border-b border-slate-200/50 dark:border-slate-800/40">
              <div className="flex items-center gap-4">
                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-350 cursor-pointer">
                  <Icon name="menu" className="w-4 h-4" />
                </button>
                <h1 className="text-xl font-bold tracking-tight capitalize">{currentPage} Panel</h1>
              </div>

              <div className="flex items-center gap-4">
                {/* Wallet Balance widget */}
                <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-600 dark:text-blue-400 text-xs font-bold">
                  <Icon name="wallet" className="w-4 h-4" />
                  <span>Wallet: ₹{currentUser.wallet_balance}</span>
                </div>

                {/* Notifications Dropdown */}
                <div className="relative">
                  <button 
                    onClick={() => setNotificationDropdown(!notificationDropdown)}
                    className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 relative cursor-pointer"
                  >
                    <Icon name="bell" className="w-4 h-4" />
                    {myNotifications.length > 0 && <span className="absolute top-1 right-1 w-2 h-2 rounded-full bg-rose-500 ring-2 ring-white dark:ring-slate-900" />}
                  </button>

                  {notificationDropdown && (
                    <div className="absolute right-0 mt-3 bg-slate-900 border border-slate-700 text-white rounded-xl shadow-xl w-80 glass-card p-4 z-50">
                      <div className="flex items-center justify-between pb-3 border-b border-slate-800 mb-3">
                        <span className="font-bold text-xs">Recent Alerts</span>
                        <button onClick={() => setNotifications([])} className="text-[10px] text-blue-400 hover:underline">Clear all</button>
                      </div>
                      
                      <div className="space-y-3 max-h-60 overflow-y-auto">
                        {myNotifications.length === 0 ? (
                          <p className="text-xs text-center text-slate-500 py-4">No new notifications</p>
                        ) : (
                          myNotifications.map(n => (
                            <div key={n.id} className="text-xs border-b border-slate-800/50 pb-2">
                              <h4 className="font-bold text-blue-400 flex items-center justify-between">
                                <span>{n.title}</span>
                                <span className="text-[9px] text-slate-500 font-normal">{n.date}</span>
                              </h4>
                              <p className="text-[11px] text-slate-400 mt-1">{n.message}</p>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  )}
                </div>

                <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 cursor-pointer">
                  <Icon name={theme === "dark" ? "sun" : "moon"} className="w-4 h-4" />
                </button>

                <button 
                  onClick={handleLogout} 
                  title="Logout Account"
                  className="px-3.5 py-2.5 rounded-lg bg-rose-600/10 hover:bg-rose-600 text-rose-500 hover:text-white border border-rose-500/20 text-xs font-bold transition flex items-center gap-1.5 cursor-pointer"
                >
                  <Icon name="logout" className="w-4 h-4" />
                  <span className="hidden sm:inline">Logout</span>
                </button>
              </div>
            </header>

            {/* Candidate Views Router */}
            <div className="p-6 flex-grow overflow-y-auto">
              
              {/* KYC global banner alert if pending/rejected */}
              {currentUser.kyc_status !== "Approved" && currentPage !== "kyc" && (
                <div className={`p-4 rounded-xl mb-6 border flex items-center justify-between ${
                  currentUser.kyc_status === "Rejected" 
                    ? "bg-rose-500/10 border-rose-500/20 text-rose-600 dark:text-rose-400" 
                    : "bg-amber-500/10 border-amber-500/20 text-amber-600 dark:text-amber-400"
                }`}>
                  <div className="flex items-center gap-3">
                    <Icon name="alert-circle" className="w-5 h-5" />
                    <div className="text-xs">
                      <span className="font-bold block">
                        {currentUser.kyc_status === "Rejected" ? "KYC Verification Rejected!" : "KYC Verification Required"}
                      </span>
                      <span>
                        {currentUser.kyc_status === "Rejected" 
                          ? "Your KYC documents were rejected by admin. Please update details." 
                          : "Upload Bank and Selfie details to unlock task catalog submits."}
                      </span>
                    </div>
                  </div>
                  <button onClick={() => setCurrentPage("kyc")} className="px-3 py-1.5 text-xs font-bold rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition cursor-pointer">
                    Verify KYC
                  </button>
                </div>
              )}

              {currentPage === "dashboard" && (
                <CandidateOverview 
                  currentUser={currentUser} 
                  mySubmissions={mySubmissions} 
                  setCurrentPage={setCurrentPage} 
                />
              )}

              {currentPage === "tasks" && (
                <CandidateTasks 
                  currentUser={currentUser} 
                  tasks={tasks} 
                  setTasks={setTasks}
                  submissions={submissions} 
                  setSubmissions={setSubmissions} 
                  triggerToast={triggerToast}
                  setUsers={setUsers}
                  setCurrentPage={setCurrentPage}
                  autoAssignTaskReview={autoAssignTaskReview}
                />
              )}

              {currentPage === "earnings" && (
                <CandidateEarnings 
                  currentUser={currentUser} 
                  withdrawals={withdrawals} 
                  setWithdrawals={setWithdrawals} 
                  myKyc={myKyc}
                  triggerToast={triggerToast}
                  setUsers={setUsers}
                  kycRecords={kycRecords}
                  setKycRecords={setKycRecords}
                  submissions={submissions}
                  tasks={tasks}
                />
              )}

              {currentPage === "reports" && (
                <CandidateReports 
                  currentUser={currentUser} 
                  mySubmissions={mySubmissions} 
                  withdrawals={withdrawals}
                />
              )}

              {currentPage === "kyc" && (
                <CandidateKyc 
                  currentUser={currentUser} 
                  setCurrentUser={setCurrentUser}
                  users={users}
                  setUsers={setUsers}
                  kycRecords={kycRecords} 
                  setKycRecords={setKycRecords}
                  myKyc={myKyc}
                  triggerToast={triggerToast}
                  setPreviewImage={setPreviewImage}
                />
              )}

              {currentPage === "profile" && (
                <CandidateProfile 
                  currentUser={currentUser} 
                  users={users}
                  setUsers={setUsers}
                  triggerToast={triggerToast}
                  setCurrentUser={setCurrentUser}
                />
              )}

              {currentPage === "support" && (
                <CandidateSupport 
                  currentUser={currentUser} 
                  tickets={tickets} 
                  setTickets={setTickets}
                  triggerToast={triggerToast}
                />
              )}
            </div>
          </div>
          {previewImage && <ImagePreviewModal image={previewImage} onClose={() => setPreviewImage(null)} />}
        </div>
      );
    }

    // Main Container
    function CandidatePanelContainer() {
      const [theme, setTheme] = useState(() => localStorage.getItem("krv-theme") || "dark");
      const [currentPage, setCurrentPage] = useState("dashboard");
      const [currentUser, setCurrentUser] = useState(null);
      const [isDbLoading, setIsDbLoading] = useState(true);

      const [users, setUsers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [kycRecords, setKycRecords] = useState([]);
      const [withdrawals, setWithdrawals] = useState([]);
      const [tickets, setTickets] = useState([]);
      const [notifications, setNotifications] = useState([]);
      const [toast, setToast] = useState(null);

      const prevUsersRef = useRef([]);
      const prevTasksRef = useRef([]);
      const prevSubmissionsRef = useRef([]);
      const prevKycRecordsRef = useRef([]);
      const prevWithdrawalsRef = useRef([]);
      const prevTicketsRef = useRef([]);
      const prevNotificationsRef = useRef([]);

      useEffect(() => {
        const root = window.document.documentElement;
        if (theme === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }
        localStorage.setItem("krv-theme", theme);
      }, [theme]);

      const triggerToast = (message, type = "success") => {
        setToast({ message, type });
      };

      // Bootstrap and verification logic
      useEffect(() => {
        let channel = null;

        const verifyIntegrityAndSession = async () => {
          const client = getSupabaseClient();
          if (client) {
            try {
              const storedSession = localStorage.getItem("krv-current-user-session");
              if (!storedSession) {
                window.location.href = "login.html";
                return;
              }
              const { user } = JSON.parse(storedSession);

              // 1. Fetch Users
              const { data: dbUsers, error: usersErr } = await client.from("krv_users").select("*");
              if (!usersErr && dbUsers) {
                setUsers(dbUsers);
                prevUsersRef.current = dbUsers;
                const matchedUser = dbUsers.find(u => u.id === user.id);
                if (matchedUser) {
                  setCurrentUser(matchedUser);
                }
              }

              // 2. Fetch Tasks
              const { data: dbTasks, error: tasksErr } = await client.from("krv_tasks").select("*");
              if (!tasksErr && dbTasks) {
                const activeTasks = dbTasks.filter(t => t.status !== "Deleted");
                setTasks(activeTasks);
                prevTasksRef.current = activeTasks;
              }

              // 3. Fetch Submissions
              const { data: dbSubs, error: subsErr } = await client.from("krv_submissions").select("*");
              if (!subsErr && dbSubs) {
                setSubmissions(dbSubs);
                prevSubmissionsRef.current = dbSubs;
              }

              // 4. Fetch KYC
              const { data: dbKyc, error: kycErr } = await client.from("krv_kyc").select("*");
              if (!kycErr && dbKyc) {
                setKycRecords(dbKyc);
                prevKycRecordsRef.current = dbKyc;
              }

              // 5. Fetch Withdrawals
              const { data: dbWithdrawals, error: wErr } = await client.from("krv_withdrawals").select("*");
              if (!wErr && dbWithdrawals) {
                setWithdrawals(dbWithdrawals);
                prevWithdrawalsRef.current = dbWithdrawals;
              }

              // 6. Fetch Tickets
              const { data: dbTickets, error: tErr } = await client.from("krv_tickets").select("*");
              if (!tErr && dbTickets) {
                setTickets(dbTickets);
                prevTicketsRef.current = dbTickets;
              }

              // 7. Fetch Notifications
              const { data: dbNotifs, error: nErr } = await client.from("krv_notifications").select("*");
              if (!nErr && dbNotifs) {
                setNotifications(dbNotifs);
                prevNotificationsRef.current = dbNotifs;
              }

              // Set up Real-time Socket Channels
              channel = client.channel('krv-realtime-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_users' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setUsers(prev => {
                      const next = prev.map(u => u.id === payload.new.id ? payload.new : u);
                      prevUsersRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_tasks' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setTasks(prev => {
                      const next = prev.some(t => t.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevTasksRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setTasks(prev => {
                      const next = payload.new.status === 'Deleted'
                        ? prev.filter(t => t.id !== payload.new.id)
                        : prev.map(t => t.id === payload.new.id ? payload.new : t);
                      prevTasksRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'DELETE') {
                    setTasks(prev => {
                      const next = prev.filter(t => t.id !== payload.old.id);
                      prevTasksRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_submissions' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setSubmissions(prev => {
                      const next = prev.some(s => s.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevSubmissionsRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setSubmissions(prev => {
                      const next = prev.map(s => s.id === payload.new.id ? payload.new : s);
                      prevSubmissionsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_kyc' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setKycRecords(prev => {
                      const next = prev.map(k => k.id === payload.new.id ? payload.new : k);
                      prevKycRecordsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_withdrawals' }, (payload) => {
                  if (payload.eventType === 'INSERT') {
                    setWithdrawals(prev => {
                      const next = prev.some(w => w.id === payload.new.id) ? prev : [...prev, payload.new];
                      prevWithdrawalsRef.current = next;
                      return next;
                    });
                  } else if (payload.eventType === 'UPDATE') {
                    setWithdrawals(prev => {
                      const next = prev.map(w => w.id === payload.new.id ? payload.new : w);
                      prevWithdrawalsRef.current = next;
                      return next;
                    });
                  }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'krv_tickets' }, (payload) => {
                  if (payload.eventType === 'UPDATE') {
                    setTickets(prev => {
                      const next = prev.map(t => t.id === payload.new.id ? payload.new : t);
                      prevTicketsRef.current = next;
                      return next;
                    });
                  }
                })
                .subscribe();

            } catch (err) {
              console.error("verifyIntegrityAndSession error:", err);
            }
          }
          setIsDbLoading(false);
        };

        verifyIntegrityAndSession();

        return () => {
          if (channel) {
            const client = getSupabaseClient();
            if (client) client.removeChannel(channel);
          }
        };
      }, []);

      // Synchronize currentUser with users list
      useEffect(() => {
        if (currentUser) {
          const latestUser = users.find(u => u.id === currentUser.id);
          if (latestUser && JSON.stringify(latestUser) !== JSON.stringify(currentUser)) {
            setCurrentUser(latestUser);
            signSession(latestUser).then(sig => {
              localStorage.setItem("krv-current-user-session", JSON.stringify({ user: latestUser, signature: sig }));
            });
          }
        }
      }, [users, currentUser]);

      // Background cloud sync
      useEffect(() => {
        const saveSecureDb = async () => {
          const client = getSupabaseClient();
          if (client && !isDbLoading) {
            try {
              // Sync Users
              const prevUsers = prevUsersRef.current;
              if (JSON.stringify(prevUsers) !== JSON.stringify(users)) {
                const changedUsers = users.filter(u => {
                  const prevU = prevUsers.find(pu => pu.id === u.id);
                  return !prevU || JSON.stringify(prevU) !== JSON.stringify(u);
                });
                if (changedUsers.length > 0) {
                  const { error } = await client.from("krv_users").upsert(changedUsers);
                  if (error) {
                    console.error("Users sync failed:", error);
                    triggerToast("Sync Error (Users): " + error.message, "error");
                  }
                }
                prevUsersRef.current = users;
              }

              // Sync Submissions
              const prevSubs = prevSubmissionsRef.current;
              if (JSON.stringify(prevSubs) !== JSON.stringify(submissions)) {
                const changedSubs = submissions.filter(s => {
                  const prevS = prevSubs.find(ps => ps.id === s.id);
                  return !prevS || JSON.stringify(prevS) !== JSON.stringify(s);
                });
                if (changedSubs.length > 0) {
                  const { error } = await client.from("krv_submissions").upsert(changedSubs);
                  if (error) {
                    console.error("Submissions sync failed:", error);
                    triggerToast("Sync Error (Submissions): " + error.message, "error");
                  }
                }
                prevSubmissionsRef.current = submissions;
              }

              // Sync KYC Records
              const prevKyc = prevKycRecordsRef.current;
              if (JSON.stringify(prevKyc) !== JSON.stringify(kycRecords)) {
                const changedKyc = kycRecords.filter(k => {
                  const prevK = prevKyc.find(pk => pk.id === k.id);
                  return !prevK || JSON.stringify(prevK) !== JSON.stringify(k);
                });
                if (changedKyc.length > 0) {
                  const { error } = await client.from("krv_kyc").upsert(changedKyc);
                  if (error) {
                    console.error("KYC sync failed:", error);
                    triggerToast("Sync Error (KYC): " + error.message, "error");
                  }
                }
                prevKycRecordsRef.current = kycRecords;
              }

              // Sync Withdrawals
              const prevW = prevWithdrawalsRef.current;
              if (JSON.stringify(prevW) !== JSON.stringify(withdrawals)) {
                const changedW = withdrawals.filter(w => {
                  const prevWithdrawal = prevW.find(pw => pw.id === w.id);
                  return !prevWithdrawal || JSON.stringify(prevWithdrawal) !== JSON.stringify(w);
                });
                if (changedW.length > 0) {
                  const { error } = await client.from("krv_withdrawals").upsert(changedW);
                  if (error) {
                    console.error("Withdrawals sync failed:", error);
                    triggerToast("Sync Error (Withdrawals): " + error.message, "error");
                  }
                }
                prevWithdrawalsRef.current = withdrawals;
              }

              // Sync Tickets
              const prevTk = prevTicketsRef.current;
              if (JSON.stringify(prevTk) !== JSON.stringify(tickets)) {
                const changedTk = tickets.filter(t => {
                  const prevT = prevTk.find(pt => pt.id === t.id);
                  return !prevT || JSON.stringify(prevT) !== JSON.stringify(t);
                });
                if (changedTk.length > 0) {
                  const { error } = await client.from("krv_tickets").upsert(changedTk);
                  if (error) {
                    console.error("Tickets sync failed:", error);
                    triggerToast("Sync Error (Tickets): " + error.message, "error");
                  }
                }
                prevTicketsRef.current = tickets;
              }

            } catch (err) {
              console.error("Supabase sync error:", err);
              triggerToast("Sync Exception: " + err.message, "error");
            }
          }
        };
        saveSecureDb();
      }, [users, submissions, kycRecords, withdrawals, tickets, isDbLoading]);

      // Atomic Review Auto-assignment helper
      const autoAssignTaskReview = async (taskId, userId) => {
        const client = getSupabaseClient();
        if (!client) return;
        try {
          const { data: latestTask, error: fetchErr } = await client.from("krv_tasks").select("*").eq("id", taskId).single();
          if (fetchErr || !latestTask) return;
          const reviews = latestTask.imported_reviews || [];
          const alreadyAssigned = reviews.find(r => r.assigned_to === userId);
          if (alreadyAssigned) {
            setTasks(prev => prev.map(t => t.id === taskId ? latestTask : t));
            return;
          }
          const firstUnused = reviews.find(r => r.status === "Unused" && !r.assigned_to);
          if (firstUnused) {
            const nextReviews = reviews.map(r => r.id === firstUnused.id ? { ...r, assigned_to: userId, status: "Assigned" } : r);
            const { error: updateErr } = await client.from("krv_tasks").update({ imported_reviews: nextReviews }).eq("id", taskId);
            if (updateErr) return;
            setTasks(prev => prev.map(t => t.id === taskId ? { ...t, imported_reviews: nextReviews } : t));
          }
        } catch (err) {
          console.error("autoAssignTaskReview critical error:", err);
        }
      };

      const handleLogout = () => {
        localStorage.removeItem("krv-current-user-session");
        window.location.href = "login.html";
      };

      if (isDbLoading || !currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center space-y-4">
              <div className="w-12 h-12 rounded-full border-4 border-blue-500 border-t-transparent animate-spin mx-auto"></div>
              <span className="block text-xs font-bold uppercase tracking-widest text-slate-400 animate-pulse">Loading Candidate Portal...</span>
            </div>
          </div>
        );
      }

      return (
        <CandidatePanel
          currentPage={currentPage}
          setCurrentPage={setCurrentPage}
          currentUser={currentUser}
          setCurrentUser={setCurrentUser}
          users={users}
          setUsers={setUsers}
          tasks={tasks}
          setTasks={setTasks}
          submissions={submissions}
          setSubmissions={setSubmissions}
          kycRecords={kycRecords}
          setKycRecords={setKycRecords}
          withdrawals={withdrawals}
          setWithdrawals={setWithdrawals}
          tickets={tickets}
          setTickets={setTickets}
          notifications={notifications}
          setNotifications={setNotifications}
          handleLogout={handleLogout}
          theme={theme}
          setTheme={setTheme}
          triggerToast={triggerToast}
          autoAssignTaskReview={autoAssignTaskReview}
        />
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<CandidatePanelContainer />);
  </script>
</body>
</html>
