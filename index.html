        if (theme === "dark") {

        } else {

        }

          localStorage.setItem("krv-current-user", JSON.stringify(user));

          setCurrentPage(user.role === "admin" ? "admin-dashboard" : "dashboard");
          return true;
        } else {
          triggerToast("Invalid email or password.", "error");

    function AuthPage({ currentPage, setCurrentPage, handleLogin, users, setUsers, triggerToast, theme, setTheme }) {
      const [formData, setFormData] = useState({
        name: "", email: "", mobile: "", city: "", pincode: "", referral: "", password: "", confirmPassword: ""
      });
      const [forgotStep, setForgotStep] = useState(1);
      const [otpInput, setOtpInput] = useState("");
      const [simulatedOtp, setSimulatedOtp] = useState("");

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        
        if (currentPage === "login") {
          handleLogin(formData.email, formData.password);
        } else if (currentPage === "signup") {
          if (formData.password !== formData.confirmPassword) {
            triggerToast("Passwords do not match.", "error");
            return;
          }
          if (users.some(u => u.email.toLowerCase() === formData.email.toLowerCase())) {
            triggerToast("Email already exists.", "error");
            return;
          }

          const newUser = {
            id: "c" + (users.length + 1),
            name: formData.name,
            email: formData.email,
            password: formData.password,
            mobile: formData.mobile,
            city: formData.city,
            pincode: formData.pincode,
            referral_code: formData.referral,
            wallet_balance: 0,
            earnings_pending: 0,
            earnings_paid: 0,
            kyc_status: "Pending",
            role: "candidate"
          };

          setUsers([...users, newUser]);
          triggerToast("Account created successfully! Please Log In.");
          setCurrentPage("login");
        }
      };

      const handleForgotSubmit = (e) => {
        e.preventDefault();
        if (forgotStep === 1) {
          if (!users.some(u => u.email.toLowerCase() === formData.email.toLowerCase())) {
            triggerToast("Email not found.", "error");
            return;
          }
          const otp = Math.floor(100000 + Math.random() * 900000).toString();
          setSimulatedOtp(otp);
          setForgotStep(2);
          triggerToast(`Simulated OTP sent: ${otp}`, "info");
        } else if (forgotStep === 2) {
          if (otpInput === simulatedOtp) {
            setForgotStep(3);
            triggerToast("OTP verified! Set new password.");
          } else {
            triggerToast("Incorrect OTP.", "error");
          }
        } else {
          setUsers(prev => prev.map(u => {
            if (u.email.toLowerCase() === formData.email.toLowerCase()) {
              return { ...u, password: formData.password };
            }
            return u;
          }));
          triggerToast("Password reset successfully! Log in now.");
          setCurrentPage("login");
        }
      };

      return (
        <div className="flex flex-col min-h-screen">
          <header className="px-6 py-4 flex items-center justify-between border-b border-slate-200/50 dark:border-slate-800/40 bg-white/70 dark:bg-slate-900/60 backdrop-blur-xl">
            <button onClick={() => setCurrentPage("home")} className="flex items-center gap-2 text-xs font-bold uppercase text-slate-500 hover:text-blue-500 cursor-pointer">
              <Icon name="chevron-left" className="w-4 h-4" /> Back to Home
            </button>
            <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 shadow cursor-pointer">
              <Icon name={theme === "dark" ? "sun" : "moon"} className="w-4 h-4" />
            </button>
          </header>

          <div className="flex-grow flex items-center justify-center p-6">
            <div className="w-full max-w-md glass-card rounded-2xl p-8 space-y-6">
              
              <div className="text-center">
                <h2 className="text-2xl font-bold tracking-tight">
                  {currentPage === "login" && "Login to KRV Management"}
                  {currentPage === "signup" && "Create Candidate Account"}
                  {currentPage === "forgot-password" && "Reset Password"}
                </h2>
                <p className="text-xs text-slate-400 mt-2">
                  {currentPage === "login" && "Enter your email and password to access dashboard"}
                  {currentPage === "signup" && "Start your professional workforce profile today"}
                  {currentPage === "forgot-password" && "Follow OTP instructions to reset credential"}
                </p>
              </div>

              {currentPage === "forgot-password" ? (
                <form onSubmit={handleForgotSubmit} className="space-y-4">
                  {forgotStep === 1 && (
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Email Address</label>
                      <input required type="email" name="email" value={formData.email} onChange={handleChange} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Enter registered email" />
                    </div>
                  )}

                  {forgotStep === 2 && (
                    <div className="space-y-2">
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Enter OTP (Sent: {simulatedOtp})</label>
                      <input required type="text" value={otpInput} onChange={(e) => setOtpInput(e.target.value)} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 text-center tracking-widest text-lg font-bold text-white focus:outline-none focus:border-blue-500" placeholder="000000" maxLength={6} />
                    </div>
                  )}

                  {forgotStep === 3 && (
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">New Password</label>
                      <input required type="password" name="password" value={formData.password} onChange={handleChange} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Min 6 characters" minLength={6} />
                    </div>
                  )}

                  <button type="submit" className="w-full py-3.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow transition cursor-pointer">
                    {forgotStep === 1 && "Send OTP"}
                    {forgotStep === 2 && "Verify OTP"}
                    {forgotStep === 3 && "Update Password"}
                  </button>
                  
                  <div className="text-center mt-4">
                    <button type="button" onClick={() => { setCurrentPage("login"); setForgotStep(1); }} className="text-xs text-blue-500 hover:underline">Back to Login</button>
                  </div>
                </form>
              ) : (
                <form onSubmit={handleSubmit} className="space-y-4">
                  {currentPage === "signup" && (
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Full Name</label>
                        <input required type="text" name="name" value={formData.name} onChange={handleChange} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Rahul Sharma" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Mobile Number</label>
                        <input required type="tel" name="mobile" value={formData.mobile} onChange={handleChange} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="9988776655" />
                      </div>
                    </div>
                  )}

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Email Address</label>
                    <input required type="email" name="email" value={formData.email} onChange={handleChange} className="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="rahul@gmail.com" />
                  </div>

                  {currentPage === "signup" && (
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">City</label>
                        <input required type="text" name="city" value={formData.city} onChange={handleChange} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Mumbai" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Pincode</label>
                        <input required type="text" name="pincode" value={formData.pincode} onChange={handleChange} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="400001" maxLength={6} />
                      </div>
                    </div>
                  )}

                  {currentPage === "signup" && (
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Referred By (Optional)</label>
                      <input type="text" name="referral" value={formData.referral} onChange={handleChange} className="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="e.g. KRV500" />
                    </div>
                  )}

                  <div className={currentPage === "signup" ? "grid grid-cols-2 gap-4" : "space-y-4"}>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Password</label>
                      <input required type="password" name="password" value={formData.password} onChange={handleChange} className="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="••••••••" minLength={6} />
                    </div>
                    {currentPage === "signup" && (
                      <div>
                        <label className="block text-xs font-bold uppercase text-slate-400 mb-1.5">Confirm Password</label>
                        <input required type="password" name="confirmPassword" value={formData.confirmPassword} onChange={handleChange} className="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="••••••••" minLength={6} />
                      </div>
                    )}
                  </div>

                  {currentPage === "login" && (
                    <div className="flex items-center justify-between text-xs">
                      <label className="flex items-center gap-2 text-slate-400">
                        <input type="checkbox" className="rounded bg-slate-800 border-slate-700" /> Remember Me
                      </label>
                      <button type="button" onClick={() => setCurrentPage("forgot-password")} className="text-blue-500 hover:underline">Forgot Password?</button>
                    </div>
                  )}

                  <button type="submit" className="w-full py-3.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow transition cursor-pointer">
                    {currentPage === "login" ? "Sign In" : "Register Account"}
                  </button>
                  
                  <div className="text-center text-xs text-slate-400 mt-4">
                    {currentPage === "login" ? (
                      <p>Don't have an account? <button type="button" onClick={() => setCurrentPage("signup")} className="text-blue-500 hover:underline font-bold">Sign Up</button></p>
                    ) : (
                      <p>Already have an account? <button type="button" onClick={() => setCurrentPage("login")} className="text-blue-500 hover:underline font-bold">Log In</button></p>
                    )}
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      );
    }

          <div className="grid grid-cols-2 md:grid-cols-6 gap-4">
            {[
              { label: "Total Tasks", val: stats.total, color: "text-blue-500", bg: "bg-blue-500/10 border-blue-500/20" },
              { label: "Approved Tasks", val: stats.approved, color: "text-emerald-500", bg: "bg-emerald-500/10 border-emerald-500/20" },

    // 2. Tasks
    function CandidateTasks({ currentUser, tasks, submissions, setSubmissions, triggerToast, setUsers }) {

      const [submitDrawer, setSubmitDrawer] = useState(null);
      const [formProof, setFormProof] = useState({ link: "", remarks: "" });
      const [screenshotFile, setScreenshotFile] = useState(null);

      // Check if user already submitted this task
      const getTaskSubmission = (taskId) => submissions.find(s => s.task_id === taskId && s.user_id === currentUser.id);

      const filteredTasks = useMemo(() => {
        if (filterCategory === "All") return tasks;
        return tasks.filter(t => t.category === filterCategory);
      }, [tasks, filterCategory]);

      const handleCopyLink = (link) => {
        navigator.clipboard.writeText(link);
        triggerToast("Task link copied!");
      };

      const handleImageMockUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          setScreenshotFile(URL.createObjectURL(file));
        }
      };

      const handleSubmission = (e) => {
        e.preventDefault();
        
        if (currentUser.kyc_status !== "Approved") {
          triggerToast("You must complete and approve KYC verification to submit tasks.", "error");
          return;
        }

        const newSub = {
          id: "s" + (submissions.length + 1),
          user_id: currentUser.id,
          task_id: submitDrawer.id,
          submitted_link: formProof.link,
          screenshot: screenshotFile || "assets/dashboard_preview.png",
          video: "",
          remarks: formProof.remarks,
          review_status: "Pending",
          amount: submitDrawer.amount,
          date: new Date().toISOString().split('T')[0]
        };

        setSubmissions([...submissions, newSub]);
        
        // Update user pending wallet balance
        setUsers(prev => prev.map(u => {
          if (u.id === currentUser.id) {
            return { ...u, earnings_pending: u.earnings_pending + submitDrawer.amount };
          }
          return u;
        }));

        triggerToast("Task proof submitted successfully!");
        setSubmitDrawer(null);
        setFormProof({ link: "", remarks: "" });

      return (
        <div className="space-y-6">
          {/* Category Filter Bar */}

              <button 
                key={cat} 
                onClick={() => setFilterCategory(cat)}
                className={`px-4 py-2 rounded-full text-xs font-bold shrink-0 cursor-pointer ${

                }`}
              >
                {cat}
              </button>
            ))}

          {/* Tasks Grid */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">

                  <div>
                    <div className="flex items-center justify-between mb-4">
                      <span className="px-2 py-0.5 rounded bg-blue-500/10 text-blue-600 dark:text-blue-400 text-[9px] font-bold uppercase border border-blue-500/20">{t.category}</span>
                      <span className="text-lg font-extrabold text-emerald-500">₹{t.amount}</span>
                    </div>

                    <h3 className="text-base font-bold mb-2">{t.title}</h3>
                    <p className="text-xs text-slate-400 leading-relaxed mb-4">{t.remarks}</p>

                    <div className="flex items-center gap-2 p-2 rounded bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-[10px] text-slate-500 select-all mb-4">
                      <span className="truncate max-w-xs">{t.links}</span>
                      <button onClick={() => handleCopyLink(t.links)} className="ml-auto hover:text-blue-500"><Icon name="copy" className="w-3.5 h-3.5" /></button>
                    </div>
                  </div>

                  <div>
                    <div className="flex items-center justify-between text-[10px] text-slate-400 mb-4 font-semibold uppercase">
                      <span>Deadline: {t.deadline}</span>
                      <span>
                        {sub ? (
                          <span className={`font-bold ${
                            sub.review_status === "Approved" ? "text-emerald-500" :
                            sub.review_status === "Rejected" ? "text-rose-500" :
                            "text-amber-500"
                          }`}>{sub.review_status}</span>

                    </div>

                    {sub ? (
                      <button disabled className="w-full py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 text-xs font-semibold text-slate-400 text-center uppercase tracking-wider">
                        Submitted
                      </button>
                    ) : (
                      <button onClick={() => setSubmitDrawer(t)} className="w-full py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-xs font-semibold text-white shadow-md transition uppercase tracking-wider cursor-pointer">
                        Submit Task
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Submission Modal Drawer */}
          {submitDrawer && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 slide-in">
              <div className="w-full max-w-lg glass-card rounded-2xl p-6 relative">
                <button onClick={() => setSubmitDrawer(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white cursor-pointer"><Icon name="x-circle" className="w-5 h-5" /></button>
                
                <h3 className="text-lg font-bold mb-2">Submit Proof: {submitDrawer.title}</h3>
                <p className="text-xs text-slate-400 mb-6">Enter proof link and screenshots confirming task completion.</p>

                <form onSubmit={handleSubmission} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Paste Submitted Link</label>
                    <input required type="url" value={formProof.link} onChange={(e) => setFormProof({ ...formProof, link: e.target.value })} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="https://store.google.com/review/id" />
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Screenshot Upload</label>
                    <div className="border border-dashed border-slate-700 rounded-xl p-4 text-center cursor-pointer hover:border-blue-500 relative bg-white/5">
                      <input type="file" accept="image/*" onChange={handleImageMockUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                      {screenshotFile ? (
                        <img src={screenshotFile} className="mx-auto max-h-32 rounded object-cover" />

                        <div className="space-y-2">
                          <Icon name="upload" className="w-6 h-6 mx-auto text-slate-400" />
                          <span className="block text-xs text-slate-400 font-bold uppercase">Click to select screenshot file</span>
                          <span className="block text-[10px] text-slate-500">PNG, JPG up to 5MB</span>
                        </div>
                      )}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Remarks</label>
                    <textarea rows="3" value={formProof.remarks} onChange={(e) => setFormProof({ ...formProof, remarks: e.target.value })} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Name or email details used..."></textarea>
                  </div>

                  <button type="submit" className="w-full py-3.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-lg transition uppercase tracking-wider cursor-pointer">
                    Submit Proof
                  </button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 3. Earnings
    function CandidateEarnings({ currentUser, withdrawals, setWithdrawals, myKyc, triggerToast, setUsers }) {
      const [withdrawAmount, setWithdrawAmount] = useState("");
      
      const stats = useMemo(() => {
        const approvedW = withdrawals.filter(w => w.status === "Approved");
        return {
          pending: withdrawals.filter(w => w.status === "Pending").reduce((sum, w) => sum + w.amount, 0),
          paid: approvedW.reduce((sum, w) => sum + w.amount, 0)
        };
      }, [withdrawals]);

      const handleWithdrawRequest = (e) => {
        e.preventDefault();
        
        const amt = parseFloat(withdrawAmount);
        if (isNaN(amt) || amt <= 0) {
          triggerToast("Invalid withdrawal amount.", "error");
          return;
        }

        if (currentUser.kyc_status !== "Approved") {
          triggerToast("You must complete and approve KYC verification to request withdrawals.", "error");
          return;
        }

        if (amt > currentUser.wallet_balance) {
          triggerToast("Insufficient wallet balance.", "error");
          return;
        }

        const newRequest = {
          id: "w" + (withdrawals.length + 1),
          user_id: currentUser.id,
          amount: amt,
          status: "Pending",
          date: new Date().toISOString().split('T')[0],
          bank_details: `${myKyc.bank_name} - ${myKyc.account_number}`
        };

        setWithdrawals([...withdrawals, newRequest]);
        
        // Deduct from wallet balance instantly
        setUsers(prev => prev.map(u => {
          if (u.id === currentUser.id) {
            return { ...u, wallet_balance: u.wallet_balance - amt };
          }
          return u;
        }));

        triggerToast("Withdrawal request submitted successfully!");
        setWithdrawAmount("");
      };

      return (
        <div className="space-y-6">
          {/* Wallet Balance Cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="p-6 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-600 text-white shadow-lg">
              <span className="text-[10px] font-bold uppercase tracking-widest text-blue-100">Wallet Balance</span>
              <h3 className="text-4xl font-extrabold mt-2">₹{currentUser.wallet_balance}</h3>
              <p className="text-xs text-blue-200 mt-2">Verified earnings ready for bank transfer.</p>
            </div>
            
            <div className="p-6 rounded-2xl glass-card">
              <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Pending Withdrawals</span>
              <h3 className="text-4xl font-extrabold mt-2 text-amber-500">₹{stats.pending}</h3>
              <p className="text-xs text-slate-500 mt-2">Awaiting admin fund transfer release.</p>
            </div>

            <div className="p-6 rounded-2xl glass-card">
              <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Total Paid Amount</span>
              <h3 className="text-4xl font-extrabold mt-2 text-emerald-500">₹{stats.paid}</h3>
              <p className="text-xs text-slate-500 mt-2">Transferred to HDFC verified account.</p>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {/* Request Withdrawal Form */}
            <div className="glass-card rounded-2xl p-6">
              <h3 className="text-lg font-bold mb-2">Request Bank Withdrawal</h3>
              <p className="text-xs text-slate-400 mb-6">Funds are transferred directly into verified KYC bank details.</p>

              {currentUser.kyc_status !== "Approved" ? (
                <div className="p-6 text-center bg-rose-500/10 rounded-xl border border-rose-500/20 text-rose-400">
                  <Icon name="x-circle" className="w-10 h-10 mx-auto mb-3" />
                  <h4 className="font-bold text-sm">KYC Approved Status Required</h4>
                  <p className="text-xs mt-1">Please complete KYC uploads and wait for admin verification before withdraws.</p>
                </div>
              ) : (
                <form onSubmit={handleWithdrawRequest} className="space-y-4">
                  <div className="p-4 rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs space-y-2">
                    <p className="font-semibold uppercase text-slate-400 text-[10px]">Verified Bank Details</p>
                    <p className="text-sm font-bold">{myKyc.account_holder}</p>
                    <p className="text-slate-400">A/c: {myKyc.account_number} ({myKyc.bank_name})</p>
                    <p className="text-slate-400">IFSC Code: {myKyc.ifsc}</p>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Withdraw Amount</label>
                    <input required type="number" min="1" max={currentUser.wallet_balance} value={withdrawAmount} onChange={(e) => setWithdrawAmount(e.target.value)} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Enter amount to withdraw" />
                  </div>

                  <button type="submit" className="w-full py-3.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-lg transition cursor-pointer">
                    Submit Withdrawal Request
                  </button>
                </form>
              )}
            </div>

            {/* Withdrawal History */}
            <div className="glass-card rounded-2xl p-6">
              <h3 className="text-lg font-bold mb-4">Transaction History</h3>
              <div className="overflow-y-auto max-h-80">
                <table className="w-full text-xs text-left border-collapse">
                  <thead>
                    <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                      <th className="py-2.5">Date</th>
                      <th>Amount</th>
                      <th>Account</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">
                    {withdrawals.filter(w => w.user_id === currentUser.id).length === 0 ? (
                      <tr>
                        <td colSpan="4" className="py-6 text-center text-slate-500">No withdrawal requests found.</td>
                      </tr>
                    ) : (
                      withdrawals.filter(w => w.user_id === currentUser.id).reverse().map(w => (
                        <tr key={w.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                          <td className="py-3 text-slate-400">{w.date}</td>
                          <td className="font-bold text-emerald-500">₹{w.amount}</td>
                          <td className="text-slate-400 max-w-[120px] truncate">{w.bank_details}</td>
                          <td>
                            <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                              w.status === "Approved" ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20" :
                              w.status === "Rejected" ? "bg-rose-500/10 text-rose-500 border border-rose-500/20" :
                              "bg-amber-500/10 text-amber-500 border border-amber-500/20"
                            }`}>
                              {w.status}
                            </span>
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // 4. KYC
    function CandidateKyc({ currentUser, setCurrentUser, users, setUsers, kycRecords, setKycRecords, myKyc, triggerToast }) {
      const [form, setForm] = useState({
        holder: myKyc ? myKyc.account_holder : "",
        accNumber: myKyc ? myKyc.account_number : "",
        bank: myKyc ? myKyc.bank_name : "",
        ifsc: myKyc ? myKyc.ifsc : ""
      });

      const [previews, setPreviews] = useState({ aadhaarFront: null, aadhaarBack: null, selfie: null });

      useEffect(() => {
        if (myKyc) {
          setPreviews({
            aadhaarFront: myKyc.aadhaar_front,
            aadhaarBack: myKyc.aadhaar_back,
            selfie: myKyc.selfie
          });
        }
      }, [myKyc]);

      const handleFilePreview = (e, field) => {
        const file = e.target.files[0];
        if (file) {
          setPreviews({ ...previews, [field]: URL.createObjectURL(file) });
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();

        if (!previews.aadhaarFront || !previews.aadhaarBack || !previews.selfie) {
          triggerToast("Please upload all Aadhaar documents and Selfie.", "error");
          return;
        }

        const newKyc = {
          id: myKyc ? myKyc.id : "k" + (kycRecords.length + 1),
          user_id: currentUser.id,
          account_holder: form.holder,
          account_number: form.accNumber,
          bank_name: form.bank,
          ifsc: form.ifsc,
          aadhaar_front: previews.aadhaarFront,
          aadhaar_back: previews.aadhaarBack,
          selfie: previews.selfie,
          status: "Pending"
        };

        // If myKyc exists, update, else push
        if (myKyc) {
          setKycRecords(prev => prev.map(k => k.id === myKyc.id ? newKyc : k));
        } else {
          setKycRecords([...kycRecords, newKyc]);
        }

        // Update candidate general KYC status flag
        setUsers(prev => prev.map(u => {
          if (u.id === currentUser.id) {
            const updated = { ...u, kyc_status: "Pending" };
            setCurrentUser(updated);
            return updated;
          }
          return u;
        }));

        triggerToast("KYC details submitted for admin review.");
      };

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="glass-card rounded-2xl p-6">
            <div className="flex items-center justify-between mb-6">
              <div>
                <h3 className="text-lg font-bold">Identity KYC Verification</h3>
                <p className="text-xs text-slate-400">Complete verification details to verify anti-spam pipelines.</p>

    // 5. Reports
    function CandidateReports({ currentUser, mySubmissions, withdrawals }) {
      const [filterStatus, setFilterStatus] = useState("All");
      const [filterType, setFilterType] = useState("All");

      const filteredList = useMemo(() => {
        return mySubmissions.filter(s => {
          const matchStatus = filterStatus === "All" || s.review_status === filterStatus;
          const matchType = filterType === "All" || s.submitted_link.includes(filterType);
          return matchStatus && matchType;
        });
      }, [mySubmissions, filterStatus, filterType]);

      // Simulated Exporters
      const handleExport = (format) => {
        let content = "";
        let filename = `krv_report_${currentUser.name.replace(" ", "_")}_${new Date().toISOString().split('T')[0]}`;
        
        if (format === "csv") {
          content = "Submission ID,Amount,Review Status,Link,Date\n" + 
            filteredList.map(s => `SUB-${s.id.toUpperCase()},${s.amount},${s.review_status},${s.submitted_link},${s.date}`).join("\n");
          filename += ".csv";
        } else if (format === "excel") {
          content = "Submission ID\tAmount\tReview Status\tLink\tDate\n" + 
            filteredList.map(s => `SUB-${s.id.toUpperCase()}\t${s.amount}\t${s.review_status}\t${s.submitted_link}\t${s.date}`).join("\n");
          filename += ".xls";
        } else {
          content = "KRV MANAGEMENT WORK REPORT\n=========================\n" + 
            `Candidate Name: ${currentUser.name}\n` +
            `Total Approved: ${filteredList.filter(s => s.review_status === "Approved").length} Tasks\n` + 
            `Total Wallet Bal: ${currentUser.wallet_balance} Rs\n\n` +
            "SUBMISSIONS LIST:\n-----------------\n" +
            filteredList.map(s => `[SUB-${s.id.toUpperCase()}] Price: Rs.${s.amount} | Status: ${s.review_status}\nLink: ${s.submitted_link}\nRemarks: ${s.remarks || "N/A"}\n---`).join("\n");
          filename += ".pdf";
        }

        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="space-y-6">
          {/* Reports Filter Widgets */}
          <div className="grid grid-cols-1 md:grid-cols-4 gap-6 p-6 rounded-2xl glass-card">
            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Review Status</label>
              <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white">
                <option value="All">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Pending">Pending</option>
                <option value="Rejected">Rejected</option>

            </div>

            <div>

                <option value="google">Google Maps Review</option>
                <option value="play.google">Playstore Install</option>
                <option value="drive">Audio Recording</option>
                <option value="youtube">Video Tasks</option>
              </select>
            </div>

            <div className="md:col-span-2 flex items-end gap-3 justify-end mt-4 md:mt-0">
              <button onClick={() => handleExport("csv")} className="px-4 py-2.5 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-800 flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> CSV Export
              </button>
              <button onClick={() => handleExport("excel")} className="px-4 py-2.5 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-800 flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> Excel XLS
              </button>
              <button onClick={() => handleExport("pdf")} className="px-4 py-2.5 text-xs font-bold rounded-lg bg-blue-600 hover:bg-blue-700 text-white flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> PDF Report
              </button>
            </div>
          </div>

          {/* Export Table Preview */}
          <div className="glass-card rounded-2xl p-6">
            <h3 className="text-base font-bold mb-4">Report Preview: {filteredList.length} Entries</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs text-left border-collapse">

                  <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">

              </table>
            </div>
          </div>
        </div>
      );
    }

        e.preventDefault();
        
        if (pwd.old !== currentUser.password) {

          return;

        if (pwd.new !== pwd.confirm) {
          triggerToast("Confirm password does not match.", "error");
          return;

        setUsers(prev => prev.map(u => {
          if (u.id === currentUser.id) {
            return { ...u, password: pwd.new };

          return u;
        }));

        setPwd({ old: "", new: "", confirm: "" });

          <div className="grid grid-cols-2 md:grid-cols-6 gap-6">

              { label: "Total Candidates", val: stats.totalUsers, color: "text-blue-500" },
              { label: "Active Verified", val: stats.activeUsers, color: "text-emerald-500" },
              { label: "Pending KYC", val: stats.pendingKyc, color: "text-amber-500 animate-pulse" },
              { label: "Active Tasks", val: stats.totalTasks, color: "text-indigo-500" },
              { label: "Pending Reviews", val: stats.pendingSub, color: "text-rose-500 animate-pulse" },
              { label: "Total Paid", val: `₹${stats.totalPaid}`, color: "text-emerald-600 dark:text-emerald-400" }

              <div key={idx} className="p-4 rounded-xl border border-slate-200/50 dark:border-slate-800/40 glass-card text-center">
                <span className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">{s.label}</span>
                <span className={`text-2xl font-bold mt-1 block ${s.color}`}>{s.val}</span>

          {/* Charts grid */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="glass-card rounded-2xl p-6">
              <h3 className="text-base font-bold mb-4">Daily Task Completion rate</h3>

    // 2. Candidate Management
    function AdminCandidates({ users, setUsers, kycRecords, triggerToast }) {
      const candidates = useMemo(() => users.filter(u => u.role === "candidate"), [users]);

      const handleBlockUser = (id) => {
        setUsers(prev => prev.map(u => {
          if (u.id === id) {
            const isBlocked = u.kyc_status === "Blocked";
            const updated = { ...u, kyc_status: isBlocked ? "Pending" : "Blocked" };
            triggerToast(isBlocked ? "Candidate unblocked!" : "Candidate blocked!", "info");
            return updated;
          }
          return u;
        }));
      };

      return (
        <div className="glass-card rounded-2xl p-6">
          <h3 className="text-lg font-bold mb-4">Candidates Directory: {candidates.length} Profiles</h3>
          <div className="overflow-x-auto">

              <thead>
                <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                  <th className="py-3">Name</th>
                  <th>Email ID</th>
                  <th>Mobile</th>
                  <th>Location</th>
                  <th>KYC Status</th>
                  <th>Action</th>

                {candidates.map(c => (

                    <td className="py-3.5 font-bold">{c.name}</td>
                    <td className="text-slate-400">{c.email}</td>
                    <td className="text-slate-400">{c.mobile}</td>
                    <td className="text-slate-400">{c.city || "N/A"} - {c.pincode || "N/A"}</td>
                    <td>
                      <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                        c.kyc_status === "Approved" ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20" :
                        c.kyc_status === "Blocked" ? "bg-rose-500/25 text-rose-400 border border-rose-500/30" :

                        {c.kyc_status}
                      </span>
                    </td>
                    <td>
                      <button onClick={() => handleBlockUser(c.id)} className={`px-2.5 py-1 text-[10px] font-bold uppercase rounded cursor-pointer ${
                        c.kyc_status === "Blocked" ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 hover:bg-emerald-600" : "bg-rose-500/10 text-rose-500 border border-rose-500/20 hover:bg-rose-600"
                      }`}>
                        {c.kyc_status === "Blocked" ? "Unblock" : "Block Candidate"}

                    </td>

                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // 3. Task Management (CRUD)
    function AdminTasks({ tasks, setTasks, triggerToast }) {
      const [showCreate, setShowCreate] = useState(false);
      const [form, setForm] = useState({ title: "", category: "Google Review", links: "", amount: "", remarks: "", deadline: "" });

      const handleCreateTask = (e) => {
        e.preventDefault();
        
        const newTask = {
          id: "t" + (tasks.length + 1),
          title: form.title,
          category: form.category,
          links: form.links,
          amount: parseFloat(form.amount) || 0,
          remarks: form.remarks,
          deadline: form.deadline,
          status: "Active"
        };

        setTasks([...tasks, newTask]);
        triggerToast("New digital task created successfully!");
        setForm({ title: "", category: "Google Review", links: "", amount: "", remarks: "", deadline: "" });
        setShowCreate(false);
      };

      const handleDeleteTask = (id) => {
        setTasks(prev => prev.filter(t => t.id !== id));
        triggerToast("Task deleted.", "info");
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <h3 className="text-lg font-bold">Total Assigned Tasks: {tasks.length} Active</h3>
            <button onClick={() => setShowCreate(!showCreate)} className="px-4 py-2 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md cursor-pointer">

                    <input required type="text" value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Price Amount (INR)</label>
                    <input required type="number" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />

                      <option value="Application Review">Application Review</option>
                      <option value="Audio Recording">Audio Recording</option>
                      <option value="Video Recording">Video Recording</option>
                      <option value="Product Review">Product Review</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Task Links</label>
                    <input required type="url" value={form.links} onChange={(e) => setForm({ ...form, links: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="https://store.url" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Deadline</label>
                    <input required type="date" value={form.deadline} onChange={(e) => setForm({ ...form, deadline: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
                  </div>
                </div>
                <div>
                  <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Instruction Remarks</label>
                  <textarea required rows="3" value={form.remarks} onChange={(e) => setForm({ ...form, remarks: e.target.value })} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="Instructions for candidate..."></textarea>

                <button type="submit" className="w-full py-3.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow transition cursor-pointer">

          {/* Active Tasks Grid */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">

              <div key={t.id} className="rounded-2xl glass-card p-6 flex flex-col justify-between">

    // 4. Submissions Review System
    function AdminReviews({ submissions, setSubmissions, users, setNotifications, notifications, triggerToast, updateWallet }) {
      const [reviewModal, setReviewModal] = useState(null);
      const [rejectionReason, setRejectionReason] = useState("");

      const pendingSub = useMemo(() => submissions.filter(s => s.review_status === "Pending"), [submissions]);

      const handleApprove = (sub) => {
        // Update submission review status
        setSubmissions(prev => prev.map(s => s.id === sub.id ? { ...s, review_status: "Approved" } : s));
        
        // Update user wallet balance (transfers pending to approved)
        updateWallet(sub.user_id, sub.amount);

        // Add Notification
        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: sub.user_id,
          title: "Task Submission Approved!",
          message: `Your task submission (SUB-${sub.id.toUpperCase()}) was verified successfully. ₹${sub.amount} added to wallet.`,
          date: new Date().toISOString().split('T')[0]
        };
        setNotifications([...notifications, newNotif]);

        triggerToast("Task submission approved!");
        setReviewModal(null);
      };

      const handleReject = (sub) => {
        if (!rejectionReason) {
          triggerToast("Please provide a rejection reason.", "error");
          return;
        }

        // Update submission
        setSubmissions(prev => prev.map(s => s.id === sub.id ? { ...s, review_status: "Rejected", rejection_reason: rejectionReason } : s));
        
        // Deduct from candidate's pending wallet
        // (Wait! In submit task, we added it to u.earnings_pending, so we should deduct it now)
        // Set rejection reason
        // Add Notification
        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: sub.user_id,
          title: "Task Submission Rejected",
          message: `Your task submission (SUB-${sub.id.toUpperCase()}) was rejected: "${rejectionReason}"`,
          date: new Date().toISOString().split('T')[0]
        };
        setNotifications([...notifications, newNotif]);

        triggerToast("Submission rejected with remark details.");
        setReviewModal(null);
        setRejectionReason("");
      };

      return (
        <div className="glass-card rounded-2xl p-6">
          <h3 className="text-lg font-bold mb-4">Pending Proof Reviews: {pendingSub.length} Tasks</h3>
          
          <div className="overflow-x-auto">
            <table className="w-full text-xs text-left border-collapse">
              <thead>
                <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                  <th className="py-3">Worker ID</th>
                  <th>Task ID</th>
                  <th>Verification Proof</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">
                {pendingSub.length === 0 ? (
                  <tr>
                    <td colSpan="6" className="py-6 text-center text-slate-500">No pending task reviews awaiting auditing.</td>
                  </tr>
                ) : (
                  pendingSub.map(s => (
                    <tr key={s.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                      <td className="py-3.5 font-bold">USER-{s.user_id.toUpperCase()}</td>
                      <td className="text-slate-400">TASK-{s.task_id.toUpperCase()}</td>
                      <td className="text-blue-500 max-w-[200px] truncate select-all">{s.submitted_link}</td>
                      <td className="font-bold text-emerald-500">₹{s.amount}</td>
                      <td>
                        <span className="px-2 py-0.5 rounded text-[9px] font-bold uppercase bg-amber-500/10 text-amber-500 border border-amber-500/20">
                          {s.review_status}
                        </span>
                      </td>
                      <td>
                        <button onClick={() => setReviewModal(s)} className="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-[10px] font-bold uppercase cursor-pointer">
                          Audit Review
                        </button>
                      </td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          {/* Audit Review Modal */}
          {reviewModal && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 slide-in">
              <div className="w-full max-w-lg glass-card rounded-2xl p-6 relative">
                <button onClick={() => setReviewModal(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white cursor-pointer"><Icon name="x-circle" className="w-5 h-5" /></button>
                
                <h3 className="text-lg font-bold mb-4">Audit Task Proof: SUB-{reviewModal.id.toUpperCase()}</h3>

                <div className="space-y-4 text-xs">
                  <div>
                    <span className="block text-[10px] font-bold text-slate-400 uppercase">Submitted URL Link</span>
                    <a href={reviewModal.submitted_link} target="_blank" className="text-blue-500 hover:underline select-all truncate block mt-1">{reviewModal.submitted_link}</a>
                  </div>

                  <div>
                    <span className="block text-[10px] font-bold text-slate-400 uppercase mb-2">Proof Screenshot</span>
                    <div className="max-h-40 overflow-hidden border border-slate-700 rounded-lg p-1 bg-slate-950/20">
                      <img src={reviewModal.screenshot || "assets/dashboard_preview.png"} className="mx-auto max-h-36 rounded object-cover" />
                    </div>
                  </div>

                  <div>
                    <span className="block text-[10px] font-bold text-slate-400 uppercase">Candidate Remarks</span>
                    <p className="text-slate-300 mt-1 bg-slate-950/20 p-2.5 rounded-lg border border-slate-800">{reviewModal.remarks || "No comments"}</p>
                  </div>

                  {/* Rejection input box */}
                  <div className="pt-2">
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Rejection Reason (If rejecting)</label>
                    <input type="text" value={rejectionReason} onChange={(e) => setRejectionReason(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="Blur image, incorrect link details..." />
                  </div>

                  <div className="grid grid-cols-2 gap-4 pt-4 border-t border-slate-800">
                    <button onClick={() => handleReject(reviewModal)} className="py-3 font-bold bg-rose-600 hover:bg-rose-700 text-white rounded-xl uppercase tracking-wider cursor-pointer">
                      Reject Proof
                    </button>
                    <button onClick={() => handleApprove(reviewModal)} className="py-3 font-bold bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl uppercase tracking-wider cursor-pointer">
                      Approve Payout
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 5. Earnings Control & Payout approvals
    function AdminEarnings({ withdrawals, setWithdrawals, users, setUsers, triggerToast }) {
      const pendingW = useMemo(() => withdrawals.filter(w => w.status === "Pending"), [withdrawals]);

      const handleReleasePayment = (w) => {
        // Approve withdrawal
        setWithdrawals(prev => prev.map(item => item.id === w.id ? { ...item, status: "Approved" } : item));
        
        // Update user total earnings paid balance
        setUsers(prev => prev.map(u => {
          if (u.id === w.user_id) {
            return { ...u, earnings_paid: u.earnings_paid + w.amount };
          }
          return u;
        }));

        triggerToast("Withdrawal approved and funds released successfully!");
      };

      return (
        <div className="glass-card rounded-2xl p-6">
          <h3 className="text-lg font-bold mb-4">Pending Wallet Withdrawals: {pendingW.length} Requests</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-xs text-left border-collapse">
              <thead>
                <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                  <th className="py-3">Worker ID</th>
                  <th>Amount (INR)</th>
                  <th>Bank Account Details</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">
                {pendingW.length === 0 ? (
                  <tr>
                    <td colSpan="6" className="py-6 text-center text-slate-500">No pending wallet bank withdrawals found.</td>
                  </tr>
                ) : (
                  pendingW.map(w => (
                    <tr key={w.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                      <td className="py-3.5 font-bold">USER-{w.user_id.toUpperCase()}</td>
                      <td className="font-extrabold text-emerald-500">₹{w.amount}</td>
                      <td className="text-slate-400 font-medium">{w.bank_details}</td>
                      <td className="text-slate-400">{w.date}</td>
                      <td>
                        <span className="px-2 py-0.5 rounded text-[9px] font-bold uppercase bg-amber-500/10 text-amber-500 border border-amber-500/20 animate-pulse">
                          {w.status}
                        </span>
                      </td>
                      <td>
                        <button onClick={() => handleReleasePayment(w)} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-[10px] font-bold uppercase cursor-pointer">
                          Approve Transfer
                        </button>
                      </td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // 6. KYC Approvals Manager
    function AdminKyc({ kycRecords, setKycRecords, users, setUsers, setNotifications, notifications, triggerToast }) {
      const [rejectModal, setRejectModal] = useState(null);
      const [rejectReason, setRejectReason] = useState("");

      const pendingKyc = useMemo(() => kycRecords.filter(k => k.status === "Pending"), [kycRecords]);

      const handleApproveKyc = (kyc) => {
        setKycRecords(prev => prev.map(k => k.id === kyc.id ? { ...k, status: "Approved" } : k));
        
        // Update user status
        setUsers(prev => prev.map(u => u.id === kyc.user_id ? { ...u, kyc_status: "Approved" } : u));

        // Add Notification
        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: kyc.user_id,
          title: "KYC Verified Successfully!",
          message: "Congratulations! Your bank details and Aadhaar identity cards are approved. You can now browse tasks.",
          date: new Date().toISOString().split('T')[0]
        };
        setNotifications([...notifications, newNotif]);

        triggerToast("Candidate KYC approved successfully!");
      };

      const handleRejectKyc = (kyc) => {
        if (!rejectReason) {
          triggerToast("Please enter a rejection reason.", "error");
          return;
        }

        setKycRecords(prev => prev.map(k => k.id === kyc.id ? { ...k, status: "Rejected", rejection_reason: rejectReason } : k));
        
        // Update user
        setUsers(prev => prev.map(u => u.id === kyc.user_id ? { ...u, kyc_status: "Rejected" } : u));

        // Add Notification
        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: kyc.user_id,
          title: "KYC Rejected!",
          message: `Your identity KYC was rejected: "${rejectReason}"`,
          date: new Date().toISOString().split('T')[0]
        };
        setNotifications([...notifications, newNotif]);

        triggerToast("KYC Rejected successfully.");
        setRejectModal(null);
        setRejectReason("");
      };

      return (
        <div className="glass-card rounded-2xl p-6">
          <h3 className="text-lg font-bold mb-4">Pending Candidates KYC: {pendingKyc.length} Records</h3>
          
          <div className="overflow-x-auto">
            <table className="w-full text-xs text-left border-collapse">
              <thead>
                <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                  <th className="py-3">Holder Name</th>
                  <th>Bank Account</th>
                  <th>IFSC</th>
                  <th>Aadhaar / Selfie Inspect</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">
                {pendingKyc.length === 0 ? (
                  <tr>
                    <td colSpan="5" className="py-6 text-center text-slate-500">No pending candidate identity files to verify.</td>
                  </tr>
                ) : (
                  pendingKyc.map(k => (
                    <tr key={k.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                      <td className="py-3.5 font-bold">{k.account_holder}</td>
                      <td className="text-slate-400">{k.account_number} ({k.bank_name})</td>
                      <td className="text-slate-400">{k.ifsc}</td>
                      <td>
                        <div className="flex gap-2">
                          <a href={k.aadhaar_front} target="_blank" className="text-[10px] text-blue-500 underline font-bold uppercase">Front</a>
                          <a href={k.aadhaar_back} target="_blank" className="text-[10px] text-blue-500 underline font-bold uppercase">Back</a>
                          <a href={k.selfie} target="_blank" className="text-[10px] text-blue-500 underline font-bold uppercase">Selfie</a>
                        </div>
                      </td>
                      <td>
                        <div className="flex gap-2">
                          <button onClick={() => setRejectModal(k)} className="px-2.5 py-1 bg-rose-600 hover:bg-rose-700 text-white rounded text-[10px] font-bold uppercase cursor-pointer">
                            Reject
                          </button>
                          <button onClick={() => handleApproveKyc(k)} className="px-2.5 py-1 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-[10px] font-bold uppercase cursor-pointer">
                            Approve
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          {/* KYC Reject Reason input box */}
          {rejectModal && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 slide-in">
              <div className="w-full max-w-md glass-card rounded-2xl p-6 relative">
                <button onClick={() => setRejectModal(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white cursor-pointer"><Icon name="x-circle" className="w-5 h-5" /></button>
                
                <h3 className="text-lg font-bold mb-4">Reject KYC: {rejectModal.account_holder}</h3>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Rejection Reason</label>
                    <input required type="text" value={rejectReason} onChange={(e) => setRejectReason(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" placeholder="Blur Aadhaar card details, selfie mismatch..." />
                  </div>
                  
                  <button onClick={() => handleRejectKyc(rejectModal)} className="w-full py-3 font-bold bg-rose-600 hover:bg-rose-700 text-white rounded-xl uppercase tracking-wider cursor-pointer">
                    Reject KYC Verification
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 7. System Reports Generator
    function AdminReports({ users, submissions, withdrawals, kycRecords }) {
      const [filterStatus, setFilterStatus] = useState("All");
      const [filterRole, setFilterRole] = useState("All");

      const filteredList = useMemo(() => {
        return submissions.filter(s => {
          const matchStatus = filterStatus === "All" || s.review_status === filterStatus;
          const user = users.find(u => u.id === s.user_id);
          const matchRole = filterRole === "All" || (user && user.city.toLowerCase() === filterRole.toLowerCase());
          return matchStatus && matchRole;
        });
      }, [submissions, users, filterStatus, filterRole]);

      const handleExport = (format) => {
        let content = "";
        let filename = `krv_admin_workforce_report_${new Date().toISOString().split('T')[0]}`;
        
        if (format === "csv") {
          content = "Sub ID,Candidate ID,Price,Status,Date\n" + 
            filteredList.map(s => `SUB-${s.id.toUpperCase()},USER-${s.user_id.toUpperCase()},${s.amount},${s.review_status},${s.date}`).join("\n");
          filename += ".csv";
        } else if (format === "excel") {
          content = "Sub ID\tCandidate ID\tPrice\tStatus\tDate\n" + 
            filteredList.map(s => `SUB-${s.id.toUpperCase()}\tUSER-${s.user_id.toUpperCase()}\t${s.amount}\t${s.review_status}\t${s.date}`).join("\n");
          filename += ".xls";
        } else {
          content = "KRV ADMIN MASTER AUDIT REPORT\n=============================\n" +
            `Generated: ${new Date().toLocaleString()}\n` +
            `Total Filtered Entries: ${filteredList.length} submissions\n\n` +
            "SUBMISSIONS AUDIT DATA:\n------------------------\n" +
            filteredList.map(s => `[SUB-${s.id.toUpperCase()}] Candidate: USER-${s.user_id.toUpperCase()} | Price: Rs.${s.amount} | Status: ${s.review_status} | Date: ${s.date}`).join("\n");
          filename += ".pdf";
        }

        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-4 gap-6 p-6 rounded-2xl glass-card">
            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Audit Status</label>
              <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white">
                <option value="All">All Reviews</option>
                <option value="Approved">Approved</option>
                <option value="Pending">Pending</option>
                <option value="Rejected">Rejected</option>
              </select>
            </div>

            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-2">City Filter</label>
              <select value={filterRole} onChange={(e) => setFilterRole(e.target.value)} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white">
                <option value="All">All Locations</option>
                <option value="mumbai">Mumbai</option>
                <option value="ahmedabad">Ahmedabad</option>
                <option value="delhi">Delhi</option>
              </select>
            </div>

            <div className="md:col-span-2 flex items-end gap-3 justify-end mt-4 md:mt-0">
              <button onClick={() => handleExport("csv")} className="px-4 py-2.5 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-850 flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> CSV Export
              </button>
              <button onClick={() => handleExport("excel")} className="px-4 py-2.5 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-850 flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> Excel XLS
              </button>
              <button onClick={() => handleExport("pdf")} className="px-4 py-2.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> PDF Report
              </button>
            </div>
          </div>

          <div className="glass-card rounded-2xl p-6">
            <h3 className="text-base font-bold mb-4">Audit Submissions Listing: {filteredList.length} Entries</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs text-left border-collapse">
                <thead>
                  <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                    <th className="py-3">Sub ID</th>
                    <th>Worker Name</th>
                    <th>Task ID</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Submitted Link</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">
                  {filteredList.map(s => {
                    const user = users.find(u => u.id === s.user_id);
                    return (
                      <tr key={s.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                        <td className="py-3.5 font-bold">SUB-{s.id.toUpperCase()}</td>
                        <td className="text-slate-400 font-semibold">{user ? user.name : "N/A"}</td>
                        <td className="text-slate-400">TASK-{s.task_id.toUpperCase()}</td>
                        <td className="font-extrabold text-emerald-500">₹{s.amount}</td>
                        <td>
                          <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                            s.review_status === "Approved" ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20" :
                            s.review_status === "Rejected" ? "bg-rose-500/10 text-rose-500 border border-rose-500/20" :
                            "bg-amber-500/10 text-amber-500 border border-amber-500/20"
                          }`}>
                            {s.review_status}
                          </span>
                        </td>
                        <td className="text-blue-500 max-w-[150px] truncate select-all">{s.submitted_link}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // 8. Settings
    function AdminSettings({ triggerToast }) {
      const handleSaveSettings = (e) => {
        e.preventDefault();
        triggerToast("Website settings and payment configs updated successfully!");
      };

      return (
        <div className="max-w-3xl mx-auto glass-card rounded-2xl p-6">
          <h3 className="text-lg font-bold mb-4">Website Configuration settings</h3>
          
          <form onSubmit={handleSaveSettings} className="space-y-6 text-xs">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Referral Rate Bonus (INR)</label>
                <input type="number" defaultValue="50" className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
              </div>
              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Min Withdrawal Limit (INR)</label>
                <input type="number" defaultValue="500" className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
              </div>
              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Support Ticket Auto-Close Timer (Days)</label>
                <input type="number" defaultValue="7" className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
              </div>
              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Platform Maintenance Mode</label>
                <select className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white">
                  <option value="no">Active Operational</option>
                  <option value="yes">Under Maintenance</option>
                </select>
              </div>
            </div>
            
            <button type="submit" className="w-full py-3.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-lg cursor-pointer">
              Save configurations
            </button>
          </form>
        </div>
      );
    }

    // ==========================================
    // INJECT INTO DOM
    // ==========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
