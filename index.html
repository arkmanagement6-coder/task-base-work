            <div className="border border-slate-700/50 rounded-2xl overflow-hidden bg-slate-950 max-h-[75vh] max-w-full flex items-center justify-center p-2 shadow-2xl relative">
              <img 
                src={image.url} 
                alt={image.title} 
                onError={(e) => { e.target.src = "assets/krv_logo.png"; }}
                className="max-h-[70vh] max-w-full rounded-xl object-contain shadow-inner animate-pulse" 
              />
            </div>
            
            <span className="text-xs text-slate-500 font-bold uppercase tracking-wider">Click outside image or click (X) to close preview</span>
          </div>
        </div>
      );
    };

    // ==========================================
    // MASTER APPLICATION ENTRY POINT
    // ==========================================
    // Cryptographic Session Signature
    const signSession = async (user) => {
      if (!user) return "";
      const payload = `${user.id}:${user.email}:${user.role}`;
      return await sha256(payload + ":KRV-SESSION-SECRET-2026!");
    };

    // Cryptographic Users Database Signature
    const signUsersList = async (usersList) => {
      const payload = usersList.map(u => `${u.id}:${u.email}:${u.role}:${u.password}`).join("|");
      return await sha256(payload + ":KRV-DATABASE-SECRET-2026!");
    };

    // ==========================================
    // MASTER APPLICATION ENTRY POINT
    // ==========================================
    function App() {
      // Dark/Light theme state
      const [theme, setTheme] = useState(() => localStorage.getItem("krv-theme") || "dark");
      
      // Page routing state
      const [currentPage, setCurrentPage] = useState("home");
      
      // Central Mock Databases
      const [users, setUsers] = useState(() => JSON.parse(localStorage.getItem("krv-users")) || DEFAULT_USERS);
      const [tasks, setTasks] = useState(() => JSON.parse(localStorage.getItem("krv-tasks")) || DEFAULT_TASKS);
      const [submissions, setSubmissions] = useState(() => JSON.parse(localStorage.getItem("krv-submissions")) || DEFAULT_SUBMISSIONS);
      const [kycRecords, setKycRecords] = useState(() => JSON.parse(localStorage.getItem("krv-kyc")) || DEFAULT_KYC);
      const [withdrawals, setWithdrawals] = useState(() => JSON.parse(localStorage.getItem("krv-withdrawals")) || DEFAULT_WITHDRAWALS);
      const [tickets, setTickets] = useState(() => JSON.parse(localStorage.getItem("krv-tickets")) || DEFAULT_TICKETS);
      const [notifications, setNotifications] = useState(() => JSON.parse(localStorage.getItem("krv-notifications")) || DEFAULT_NOTIFICATIONS);
      
      // Session management
      const [currentUser, setCurrentUser] = useState(null);
      const [isSessionVerifying, setIsSessionVerifying] = useState(() => !!localStorage.getItem("krv-current-user-session"));
      
      // Toast system
      const [toast, setToast] = useState(null);

      // Supabase credentials configuration
      const [supabaseUrl, setSupabaseUrl] = useState(() => localStorage.getItem("krv-supabase-url") || SUPABASE_URL_DEFAULT);
      const [supabaseKey, setSupabaseKey] = useState(() => localStorage.getItem("krv-supabase-key") || SUPABASE_KEY_DEFAULT);

      const getSupabaseClient = () => {
        if (supabaseUrl && supabaseKey && window.supabase) {
          try {
            return window.supabase.createClient(supabaseUrl, supabaseKey);
          } catch (e) {
            console.error("Supabase Client Error: ", e);
          }
        }
        return null;
      };

      // Session and Database Integrity Verification on Mount
      useEffect(() => {
        let channel = null;

        const verifyIntegrityAndSession = async () => {
          // 1. Check if Supabase is connected, and fetch latest records
          const client = getSupabaseClient();
          let verifiedUsers = users;

          if (client) {
            try {
              // A. Fetch Users
              const { data: dbUsers, error: usersErr } = await client.from("krv_users").select("*");
              if (!usersErr && dbUsers && dbUsers.length > 0) {
                setUsers(dbUsers);
                verifiedUsers = dbUsers;

                // Safely load other tables from Supabase now that we know it has been initialized/seeded
                
                // B. Fetch Tasks
                const { data: dbTasks, error: tasksErr } = await client.from("krv_tasks").select("*");
                if (!tasksErr && dbTasks) {
                  setTasks(dbTasks);
                }
                
                // C. Fetch Submissions
                const { data: dbSubs, error: subsErr } = await client.from("krv_submissions").select("*");
                if (!subsErr && dbSubs) {
                  setSubmissions(dbSubs);
                }

                // D. Fetch KYC
                const { data: dbKyc, error: kycErr } = await client.from("krv_kyc").select("*");
                if (!kycErr && dbKyc) {
                  setKycRecords(dbKyc);
                }

                // E. Fetch Withdrawals
                const { data: dbWithdrawals, error: wErr } = await client.from("krv_withdrawals").select("*");
                if (!wErr && dbWithdrawals) {
                  setWithdrawals(dbWithdrawals);
                }

                // F. Fetch Tickets
                const { data: dbTickets, error: tErr } = await client.from("krv_tickets").select("*");
                if (!tErr && dbTickets) {
                  setTickets(dbTickets);
                }

                // G. Fetch Notifications
                const { data: dbNotifs, error: nErr } = await client.from("krv_notifications").select("*");
                if (!nErr && dbNotifs) {
                  setNotifications(dbNotifs);
                }
              } else {
                console.log("Supabase connected but krv_users is empty or unseeded. Retaining local/default records.");
              }

              // Setup Real-time Web Socket Channels for Live Sync
              channel = client.channel('krv-realtime-channel')
                .on(
                  'postgres_changes',
                  { event: '*', schema: 'public', table: 'krv_users' },
                  (payload) => {
                    if (payload.eventType === 'INSERT') {
                      setUsers(prev => prev.some(u => u.id === payload.new.id) ? prev : [...prev, payload.new]);
                    } else if (payload.eventType === 'UPDATE') {
                      setUsers(prev => prev.map(u => u.id === payload.new.id ? payload.new : u));
                    }
                  }
                )
                .on(
                  'postgres_changes',
                  { event: '*', schema: 'public', table: 'krv_tasks' },
                  (payload) => {
                    if (payload.eventType === 'INSERT') {
                      setTasks(prev => prev.some(t => t.id === payload.new.id) ? prev : [...prev, payload.new]);
                    } else if (payload.eventType === 'UPDATE') {
                      setTasks(prev => prev.map(t => t.id === payload.new.id ? payload.new : t));
                    }
                  }
                )
                .on(
                  'postgres_changes',
                  { event: '*', schema: 'public', table: 'krv_submissions' },
                  (payload) => {
                    if (payload.eventType === 'INSERT') {
                      setSubmissions(prev => prev.some(s => s.id === payload.new.id) ? prev : [...prev, payload.new]);
                    } else if (payload.eventType === 'UPDATE') {
                      setSubmissions(prev => prev.map(s => s.id === payload.new.id ? payload.new : s));
                    }
                  }
                )
                .on(
                  'postgres_changes',
                  { event: '*', schema: 'public', table: 'krv_kyc' },
                  (payload) => {
                    if (payload.eventType === 'INSERT') {
                      setKycRecords(prev => prev.some(k => k.id === payload.new.id) ? prev : [...prev, payload.new]);
                    } else if (payload.eventType === 'UPDATE') {
                      setKycRecords(prev => prev.map(k => k.id === payload.new.id ? payload.new : k));
                    }
                  }
                )
                .on(
                  'postgres_changes',
                  { event: '*', schema: 'public', table: 'krv_withdrawals' },
                  (payload) => {
                    if (payload.eventType === 'INSERT') {
                      setWithdrawals(prev => prev.some(w => w.id === payload.new.id) ? prev : [...prev, payload.new]);
                    } else if (payload.eventType === 'UPDATE') {
                      setWithdrawals(prev => prev.map(w => w.id === payload.new.id ? payload.new : w));
                    }
                  }
                )
                .on(
                  'postgres_changes',
                  { event: '*', schema: 'public', table: 'krv_tickets' },
                  (payload) => {
                    if (payload.eventType === 'INSERT') {
                      setTickets(prev => prev.some(tk => tk.id === payload.new.id) ? prev : [...prev, payload.new]);
                    } else if (payload.eventType === 'UPDATE') {
                      setTickets(prev => prev.map(tk => tk.id === payload.new.id ? payload.new : tk));
                    }
                  }
                )
                .on(
                  'postgres_changes',
                  { event: '*', schema: 'public', table: 'krv_notifications' },
                  (payload) => {
                    if (payload.eventType === 'INSERT') {
                      setNotifications(prev => prev.some(n => n.id === payload.new.id) ? prev : [...prev, payload.new]);
                    }
                  }
                )
                .subscribe();

            } catch (err) {
              console.error("Supabase live load failed, falling back to LocalStorage:", err);
            }
          }

          // 2. Local Integrity Fallback Check
          const storedUsers = localStorage.getItem("krv-users");
          const storedChecksum = localStorage.getItem("krv-users-checksum");

          if (!client) {
            if (storedUsers && storedChecksum) {
              try {
                const parsedUsers = JSON.parse(storedUsers);
                const expectedChecksum = await signUsersList(parsedUsers);
                if (storedChecksum === expectedChecksum) {
                  verifiedUsers = parsedUsers;
                } else {
                  setUsers(DEFAULT_USERS);
                  verifiedUsers = DEFAULT_USERS;
                  const cleanChecksum = await signUsersList(DEFAULT_USERS);
                  localStorage.setItem("krv-users", JSON.stringify(DEFAULT_USERS));
                  localStorage.setItem("krv-users-checksum", cleanChecksum);
                  triggerToast("Security Warning: Local database manipulation detected. Reverting records.", "error");
                }
              } catch (e) {
                setUsers(DEFAULT_USERS);
                verifiedUsers = DEFAULT_USERS;
                const cleanChecksum = await signUsersList(DEFAULT_USERS);
                localStorage.setItem("krv-users", JSON.stringify(DEFAULT_USERS));
                localStorage.setItem("krv-users-checksum", cleanChecksum);
              }
            } else {
              setUsers(DEFAULT_USERS);
              verifiedUsers = DEFAULT_USERS;
              const cleanChecksum = await signUsersList(DEFAULT_USERS);
              localStorage.setItem("krv-users", JSON.stringify(DEFAULT_USERS));
              localStorage.setItem("krv-users-checksum", cleanChecksum);
            }
          }

          // 3. Verify Active Session Integrity
          const storedSession = localStorage.getItem("krv-current-user-session");
          if (storedSession) {
            try {
              const { user, signature } = JSON.parse(storedSession);
              if (user && signature) {
                const expectedSignature = await signSession(user);
                if (signature === expectedSignature) {
                  const matchedUser = verifiedUsers.find(
                    u => u.id === user.id && u.role === user.role && u.email.toLowerCase() === user.email.toLowerCase()
                  );
                  if (matchedUser) {
                    setCurrentUser(matchedUser);
                    setIsSessionVerifying(false);
                    return;
                  }
                }
              }
            } catch (e) {
              console.error("Session verification failed", e);
            }
            setCurrentUser(null);
            localStorage.removeItem("krv-current-user-session");
            triggerToast("Security Violation: Invalid or tampered session. Logged out.", "error");
          }
          setIsSessionVerifying(false);
        };

        verifyIntegrityAndSession();

        return () => {
          if (channel) {
            const client = getSupabaseClient();
            if (client) {
              client.removeChannel(channel);
            }
          }
        };
      }, [supabaseUrl, supabaseKey]);

      // Save databases to LocalStorage upon changes with checksum protection and Supabase Cloud sync
      useEffect(() => {
        const saveSecureDb = async () => {
          localStorage.setItem("krv-users", JSON.stringify(users));
          const newChecksum = await signUsersList(users);
          localStorage.setItem("krv-users-checksum", newChecksum);

          // Supabase background cloud sync
          const client = getSupabaseClient();
          if (client) {
            try {
              if (users && users.length > 0) await client.from("krv_users").upsert(users);
              if (tasks && tasks.length > 0) await client.from("krv_tasks").upsert(tasks);
              if (submissions && submissions.length > 0) await client.from("krv_submissions").upsert(submissions);
              if (kycRecords && kycRecords.length > 0) await client.from("krv_kyc").upsert(kycRecords);
              if (withdrawals && withdrawals.length > 0) await client.from("krv_withdrawals").upsert(withdrawals);
              if (tickets && tickets.length > 0) await client.from("krv_tickets").upsert(tickets);
              if (notifications && notifications.length > 0) await client.from("krv_notifications").upsert(notifications);
            } catch (err) {
              console.error("Supabase upsert sync failed: ", err);
            }
          }
        };
        saveSecureDb();

        localStorage.setItem("krv-tasks", JSON.stringify(tasks));
        localStorage.setItem("krv-submissions", JSON.stringify(submissions));
        localStorage.setItem("krv-kyc", JSON.stringify(kycRecords));
        localStorage.setItem("krv-withdrawals", JSON.stringify(withdrawals));
        localStorage.setItem("krv-tickets", JSON.stringify(tickets));
        localStorage.setItem("krv-notifications", JSON.stringify(notifications));
      }, [users, tasks, submissions, kycRecords, withdrawals, tickets, notifications]);

      // Apply theme to document
      useEffect(() => {
        const root = window.document.documentElement;
        if (theme === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }
        localStorage.setItem("krv-theme", theme);
      }, [theme]);

      // URL Hash Router for Direct Linking
      useEffect(() => {
        const handleHashRoute = () => {
          const hash = window.location.hash;
          if (hash === "#login") {
            setCurrentPage("login");
          } else if (hash === "#signup") {
            setCurrentPage("signup");
          } else if (hash === "#home" || hash === "") {
            setCurrentPage("home");
          }
        };
        handleHashRoute();
        window.addEventListener("hashchange", handleHashRoute);
        return () => window.removeEventListener("hashchange", handleHashRoute);
      }, []);

      const triggerToast = (message, type = "success") => {
        setToast({ message, type });
      };

      const handleLogin = async (email, password) => {
        const hashedPassword = await getSaltedHash(email, password);
        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === hashedPassword);
        if (user) {
          setCurrentUser(user);
          const signature = await signSession(user);
          localStorage.setItem("krv-current-user-session", JSON.stringify({ user, signature }));
          triggerToast(`Welcome back, ${user.name}!`);
          setCurrentPage(user.role === "admin" ? "admin-dashboard" : "dashboard");
          return true;
        } else {
          triggerToast("Invalid email or password.", "error");
          return false;
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        localStorage.removeItem("krv-current-user-session");
        triggerToast("Logged out successfully.", "info");
        setCurrentPage("home");
      };

      // Real-time Wallet sync helper
      const updateCandidateWallet = (userId, approvedAmount) => {
        setUsers(prev => prev.map(u => {
          if (u.id === userId) {
            return {
              ...u,
              wallet_balance: u.wallet_balance + approvedAmount,
              earnings_pending: Math.max(0, u.earnings_pending - approvedAmount)
            };
          }
          return u;
        }));
      };

      if (isSessionVerifying) {
        return (
          <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-white">
            <div className="glass-card rounded-2xl p-8 max-w-sm w-full text-center space-y-4">
              <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
              <h3 className="text-lg font-bold">Verifying Session...</h3>
              <p className="text-xs text-slate-400">Establishing cryptographically secured workforce connection.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col font-sans transition-colors duration-300">
          
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          {/* MAIN PAGE RENDERER */}
          <main className="flex-grow flex flex-col">
            {currentPage === "home" && (
              <LandingPage 
                setCurrentPage={setCurrentPage} 
                theme={theme} 
                setTheme={setTheme}
                currentUser={currentUser}
                handleLogout={handleLogout}
              />
            )}
            
            {(currentPage === "login" || currentPage === "signup" || currentPage === "forgot-password") && (
              <AuthPage 
                currentPage={currentPage}
                setCurrentPage={setCurrentPage}
                handleLogin={handleLogin}
                users={users}
                setUsers={setUsers}
                triggerToast={triggerToast}
                theme={theme}
                setTheme={setTheme}
              />
            )}

            {/* CANDIDATE SIDE PANEL ROUTING */}
            {currentUser && currentUser.role === "candidate" && [
              "dashboard", "tasks", "earnings", "reports", "kyc", "profile", "support"
            ].includes(currentPage) && (
              <CandidatePanel 
                currentPage={currentPage}
                setCurrentPage={setCurrentPage}
                currentUser={currentUser}
                setCurrentUser={setCurrentUser}
                users={users}
                setUsers={setUsers}
                tasks={tasks}
                setTasks={setTasks}
                submissions={submissions}
                setSubmissions={setSubmissions}
                kycRecords={kycRecords}
                setKycRecords={setKycRecords}
                withdrawals={withdrawals}
                setWithdrawals={setWithdrawals}
                tickets={tickets}
                setTickets={setTickets}
                notifications={notifications}
                setNotifications={setNotifications}
                handleLogout={handleLogout}
                theme={theme}
                setTheme={setTheme}
                triggerToast={triggerToast}
              />
            )}

            {/* ADMIN SIDE PANEL ROUTING */}
            {currentUser && currentUser.role === "admin" && [
              "admin-dashboard", "admin-candidates", "admin-tasks", "admin-reviews", "admin-earnings", "admin-kyc", "admin-reports", "admin-settings"
            ].includes(currentPage) && (
              <AdminPanel 
                currentPage={currentPage}
                setCurrentPage={setCurrentPage}
                currentUser={currentUser}
                users={users}
                setUsers={setUsers}
                tasks={tasks}
                setTasks={setTasks}
                submissions={submissions}
                setSubmissions={setSubmissions}
                kycRecords={kycRecords}
                setKycRecords={setKycRecords}
                withdrawals={withdrawals}
                setWithdrawals={setWithdrawals}
                tickets={tickets}
                setTickets={setTickets}
                notifications={notifications}
                setNotifications={setNotifications}
                handleLogout={handleLogout}
                theme={theme}
                setTheme={setTheme}
                triggerToast={triggerToast}
                updateWallet={updateCandidateWallet}
                supabaseUrl={supabaseUrl}
                setSupabaseUrl={setSupabaseUrl}
                supabaseKey={supabaseKey}
                setSupabaseKey={setSupabaseKey}
              />
            )}
          </main>

          {/* SANDBOX SWITCHER REMOVED FOR SECURE DEPLOYMENT */}
        </div>
      );
    }

    // ==========================================
    // MODULE 2 & 3: AUTHENTICATION
    // ==========================================
    function AuthPage({ currentPage, setCurrentPage, handleLogin, users, setUsers, triggerToast, theme, setTheme }) {
      const [formData, setFormData] = useState({
        name: "", email: "", mobile: "", city: "", pincode: "", referral: "", password: "", confirmPassword: ""
      });
      const [forgotStep, setForgotStep] = useState(1);
      const [showPassword, setShowPassword] = useState(false);
      const [showConfirmPassword, setShowConfirmPassword] = useState(false);
      const [otpInput, setOtpInput] = useState("");
      const [simulatedOtp, setSimulatedOtp] = useState("");

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (currentPage === "login") {
          await handleLogin(formData.email, formData.password);
        } else if (currentPage === "signup") {
          if (formData.password !== formData.confirmPassword) {
            triggerToast("Passwords do not match.", "error");
            return;
          }
          if (users.some(u => u.email.toLowerCase() === formData.email.toLowerCase())) {
            triggerToast("Email already exists.", "error");
            return;
          }

          const hashedPassword = await getSaltedHash(formData.email, formData.password);

          const newUser = {
            id: "c" + (users.length + 1),
            name: formData.name,
            email: formData.email,
            password: hashedPassword,
            mobile: formData.mobile,
            city: formData.city,
            pincode: formData.pincode,
            referral_code: formData.referral,
            wallet_balance: 0,
            earnings_pending: 0,
            earnings_paid: 0,
            kyc_status: "Not Submitted",
            role: "candidate"
          };

          setUsers([...users, newUser]);
          triggerToast("Account created successfully! Please Log In.");
          setCurrentPage("login");
        }
      };

      const handleForgotSubmit = async (e) => {
        e.preventDefault();
        if (forgotStep === 1) {
          if (!users.some(u => u.email.toLowerCase() === formData.email.toLowerCase())) {
            triggerToast("Email not found.", "error");
            return;
          }
          const otp = Math.floor(100000 + Math.random() * 900000).toString();
          setSimulatedOtp(otp);
          setForgotStep(2);
          triggerToast(`Simulated OTP sent: ${otp}`, "info");
        } else if (forgotStep === 2) {
          if (otpInput === simulatedOtp) {
            setForgotStep(3);
            triggerToast("OTP verified! Set new password.");
          } else {
            triggerToast("Incorrect OTP.", "error");
          }
        } else {
          const hashedPassword = await getSaltedHash(formData.email, formData.password);
          setUsers(prev => prev.map(u => {
            if (u.email.toLowerCase() === formData.email.toLowerCase()) {
              return { ...u, password: hashedPassword };
            }
            return u;
          }));
          triggerToast("Password reset successfully! Log in now.");
          setCurrentPage("login");
        }
      };

      return (
        <div className="flex flex-col min-h-screen">
          <header className="px-6 py-4 flex items-center justify-between border-b border-slate-200/50 dark:border-slate-800/40 bg-white/70 dark:bg-slate-900/60 backdrop-blur-xl">
            <button onClick={() => setCurrentPage("home")} className="flex items-center gap-2 text-xs font-bold uppercase text-slate-500 hover:text-blue-500 cursor-pointer">
              <Icon name="chevron-left" className="w-4 h-4" /> Back to Home
            </button>
            <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 shadow cursor-pointer">
              <Icon name={theme === "dark" ? "sun" : "moon"} className="w-4 h-4" />
            </button>
          </header>

          <div className="flex-grow flex items-center justify-center p-6">
            <div className="w-full max-w-md glass-card rounded-2xl p-8 space-y-6">
              
              <div className="text-center">
                <h2 className="text-2xl font-bold tracking-tight">
                  {currentPage === "login" && "Login to KRV Management"}
                  {currentPage === "signup" && "Create Candidate Account"}
                  {currentPage === "forgot-password" && "Reset Password"}
                </h2>
                <p className="text-xs text-slate-400 mt-2">
                  {currentPage === "login" && "Enter your email and password to access dashboard"}
                  {currentPage === "signup" && "Start your professional workforce profile today"}
                  {currentPage === "forgot-password" && "Follow OTP instructions to reset credential"}
                </p>
              </div>

              {currentPage === "forgot-password" ? (
                <form onSubmit={handleForgotSubmit} className="space-y-4">
                  {forgotStep === 1 && (
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Email Address</label>
                      <input required type="email" name="email" value={formData.email} onChange={handleChange} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Enter registered email" />
                    </div>
                  )}

                  {forgotStep === 2 && (
                    <div className="space-y-2">
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Enter OTP (Sent: {simulatedOtp})</label>
                      <input required type="text" value={otpInput} onChange={(e) => setOtpInput(e.target.value)} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 text-center tracking-widest text-lg font-bold text-white focus:outline-none focus:border-blue-500" placeholder="000000" maxLength={6} />
                    </div>
                  )}

                  {forgotStep === 3 && (
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-400 mb-2">New Password</label>
                      <div className="relative">
                        <input required type={showPassword ? "text" : "password"} name="password" value={formData.password} onChange={handleChange} className="w-full pl-4 pr-10 py-3 text-sm rounded-xl border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" placeholder="Min 6 characters" minLength={6} />
                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
                          <Icon name={showPassword ? "eye" : "eye-off"} className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  )}

                  <button type="submit" className="w-full py-3.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow transition cursor-pointer">
                    {forgotStep === 1 && "Send OTP"}
                    {forgotStep === 2 && "Verify OTP"}
                    {forgotStep === 3 && "Update Password"}
                  </button>
                  
                  <div className="text-center mt-4">
                    <button type="button" onClick={() => { setCurrentPage("login"); setForgotStep(1); }} className="text-xs text-blue-500 hover:underline">Back to Login</button>
                  </div>

    // 2. Tasks
    function CandidateTasks({ currentUser, tasks, setTasks, submissions, setSubmissions, triggerToast, setUsers, setCurrentPage }) {
      const [filterCategory, setFilterCategory] = useState("All");
      const [submitDrawer, setSubmitDrawer] = useState(null);
      const [formProof, setFormProof] = useState({ link: "", remarks: "" });
      const [screenshotFile, setScreenshotFile] = useState(null);

      // Auto-Assign logic for "Application Review Provide by Brand" on component render
      useEffect(() => {
        let updatedTasks = false;
        const nextTasks = tasks.map(t => {
          if (t.category === "Application Review Provide by Brand" && t.imported_reviews && t.imported_reviews.length > 0) {
            const alreadyAssigned = t.imported_reviews.find(r => r.assigned_to === currentUser.id);
            if (!alreadyAssigned) {
              const firstUnused = t.imported_reviews.find(r => r.status === "Unused" && !r.assigned_to);
              if (firstUnused) {
                const nextReviews = t.imported_reviews.map(r => 
                  r.id === firstUnused.id ? { ...r, assigned_to: currentUser.id, status: "Assigned" } : r
                );
                updatedTasks = true;
                return { ...t, imported_reviews: nextReviews };
              }
            }
          }
          return t;
        });

        if (updatedTasks && setTasks) {
          setTasks(nextTasks);
        }
      }, [tasks, currentUser.id, setTasks]);

      // Check if user already submitted this task
      const getTaskSubmission = (taskId) => submissions.find(s => s.task_id === taskId && s.user_id === currentUser.id);

      const filteredTasks = useMemo(() => {
        if (filterCategory === "All") return tasks;
        return tasks.filter(t => t.category === filterCategory);
      }, [tasks, filterCategory]);

      const handleCopyLink = (link) => {
        navigator.clipboard.writeText(link);
        triggerToast("Task link copied!");
      };

      const handleImageMockUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          setScreenshotFile(URL.createObjectURL(file));
        }
      };

      const handleSubmission = (e) => {
        e.preventDefault();
        
        if (currentUser.kyc_status !== "Approved") {
          triggerToast("You must complete and approve KYC verification to submit tasks.", "error");
          return;
        }

        const newSub = {
          id: "s" + (submissions.length + 1),
          user_id: currentUser.id,
          task_id: submitDrawer.id,
          submitted_link: formProof.link,
          screenshot: screenshotFile || "assets/dashboard_preview.png",
          video: "",
          remarks: formProof.remarks,
          review_status: "Pending",
          amount: submitDrawer.amount,

    // 5. Reports
    function CandidateReports({ currentUser, mySubmissions, withdrawals }) {
      const [filterStatus, setFilterStatus] = useState("All");
      const [filterType, setFilterType] = useState("All");

      const filteredList = useMemo(() => {
        return mySubmissions.filter(s => {
          const matchStatus = filterStatus === "All" || s.review_status === filterStatus;
          const matchType = filterType === "All" || s.submitted_link.includes(filterType);
          return matchStatus && matchType;
        });
      }, [mySubmissions, filterStatus, filterType]);

      // Simulated Exporters
      const handleExport = (format) => {
        let content = "";
        let filename = `krv_report_${currentUser.name.replace(" ", "_")}_${new Date().toISOString().split('T')[0]}`;
        
        if (format === "csv") {
          content = "Submission ID,Amount,Review Status,Link,Date\n" + 
            filteredList.map(s => `SUB-${s.id.toUpperCase()},${s.amount},${s.review_status},${s.submitted_link},${s.date}`).join("\n");
          filename += ".csv";
        } else if (format === "excel") {
          content = "Submission ID\tAmount\tReview Status\tLink\tDate\n" + 
            filteredList.map(s => `SUB-${s.id.toUpperCase()}\t${s.amount}\t${s.review_status}\t${s.submitted_link}\t${s.date}`).join("\n");
          filename += ".xls";
        } else {
          content = "KRV MANAGEMENT WORK REPORT\n=========================\n" + 
            `Candidate Name: ${currentUser.name}\n` +
            `Total Approved: ${filteredList.filter(s => s.review_status === "Approved").length} Tasks\n` + 
            `Total Wallet Bal: ${currentUser.wallet_balance} Rs\n\n` +
            "SUBMISSIONS LIST:\n-----------------\n" +
            filteredList.map(s => `[SUB-${s.id.toUpperCase()}] Price: Rs.${s.amount} | Status: ${s.review_status}\nLink: ${s.submitted_link}\nRemarks: ${s.remarks || "N/A"}\n---`).join("\n");
          filename += ".pdf";
        }

        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="space-y-6">
          {/* Reports Filter Widgets */}
          <div className="grid grid-cols-1 md:grid-cols-4 gap-6 p-6 rounded-2xl glass-card">
            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Review Status</label>
              <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white">
                <option value="All">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Pending">Pending</option>
                <option value="Rejected">Rejected</option>
              </select>
            </div>

            <div>
              <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Task Category</label>

                <option value="All">All Categories</option>
                <option value="google">Google Maps Review</option>
                <option value="play.google">Playstore Install</option>
                <option value="drive">Audio Recording</option>
                <option value="youtube">Video Tasks</option>
              </select>
            </div>

            <div className="md:col-span-2 flex items-end gap-3 justify-end mt-4 md:mt-0">
              <button onClick={() => handleExport("csv")} className="px-4 py-2.5 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-800 flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> CSV Export
              </button>
              <button onClick={() => handleExport("excel")} className="px-4 py-2.5 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-800 flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> Excel XLS
              </button>
              <button onClick={() => handleExport("pdf")} className="px-4 py-2.5 text-xs font-bold rounded-lg bg-blue-600 hover:bg-blue-700 text-white flex items-center gap-2 cursor-pointer">
                <Icon name="download" className="w-4 h-4" /> PDF Report
              </button>
            </div>
          </div>

          {/* Export Table Preview */}
          <div className="glass-card rounded-2xl p-6">
            <h3 className="text-base font-bold mb-4">Report Preview: {filteredList.length} Entries</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs text-left border-collapse">
                <thead>
                  <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                    <th className="py-3">Task Title</th>
                    <th>Sub ID</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Date</th>

                <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">

                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // 6. Profile
    function CandidateProfile({ currentUser, users, setUsers, triggerToast, setCurrentUser }) {
      const [pwd, setPwd] = useState({ old: "", new: "", confirm: "" });
      const [showOld, setShowOld] = useState(false);
      const [showNew, setShowNew] = useState(false);
      const [showConfirm, setShowConfirm] = useState(false);

      const handleUpdatePassword = async (e) => {
        e.preventDefault();
        
        const hashedOld = await getSaltedHash(currentUser.email, pwd.old);
        if (hashedOld !== currentUser.password) {
          triggerToast("Incorrect current password.", "error");
          return;
        }

        if (pwd.new !== pwd.confirm) {
          triggerToast("Confirm password does not match.", "error");
          return;
        }

        const hashedNew = await getSaltedHash(currentUser.email, pwd.new);
        setUsers(prev => prev.map(u => {
          if (u.id === currentUser.id) {
            const updated = { ...u, password: hashedNew };
            if (setCurrentUser) {
              setCurrentUser(updated);
              // Update secure session storage asynchronously
              signSession(updated).then(signature => {
                localStorage.setItem("krv-current-user-session", JSON.stringify({ user: updated, signature }));
              });
            }
            return updated;
          }
          return u;
        }));

        triggerToast("Password updated successfully!");
        setPwd({ old: "", new: "", confirm: "" });
      };

      return (
        <div className="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
          <div className="glass-card rounded-2xl p-6 space-y-4">
            <h3 className="text-lg font-bold">Personal Profile Details</h3>
            <div className="space-y-3 text-xs">
              <div>
                <span className="block text-[10px] font-bold text-slate-400 uppercase">Worker Name</span>
                <span className="text-sm font-semibold text-white block mt-1">{currentUser.name}</span>
              </div>
              <div>
                <span className="block text-[10px] font-bold text-slate-400 uppercase">Email Address</span>
                <span className="text-sm font-semibold text-white block mt-1">{currentUser.email}</span>
              </div>
              <div>
                <span className="block text-[10px] font-bold text-slate-400 uppercase">Mobile Number</span>
                <span className="text-sm font-semibold text-white block mt-1">{currentUser.mobile}</span>
              </div>
              <div>
                <span className="block text-[10px] font-bold text-slate-400 uppercase">Registered City / Pincode</span>
                <span className="text-sm font-semibold text-white block mt-1">{currentUser.city || "Mumbai"} / {currentUser.pincode || "400001"}</span>
              </div>
              <div>
                <span className="block text-[10px] font-bold text-slate-400 uppercase">Referral Code Invites</span>
                <span className="text-sm font-extrabold text-blue-400 block mt-1">{currentUser.referral_code || "KRV-NONE"}</span>
              </div>
            </div>
          </div>

          <div className="glass-card rounded-2xl p-6">
            <h3 className="text-lg font-bold mb-4">Change Account Password</h3>
            <form onSubmit={handleUpdatePassword} className="space-y-4">
              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Current Password</label>
                <div className="relative">
                  <input required type={showOld ? "text" : "password"} value={pwd.old} onChange={(e) => setPwd({ ...pwd, old: e.target.value })} className="w-full pl-3 pr-10 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" />
                  <button type="button" onClick={() => setShowOld(!showOld)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
                    <Icon name={showOld ? "eye" : "eye-off"} className="w-4 h-4" />
                  </button>
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">New Password</label>
                <div className="relative">
                  <input required type={showNew ? "text" : "password"} value={pwd.new} onChange={(e) => setPwd({ ...pwd, new: e.target.value })} className="w-full pl-3 pr-10 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" />
                  <button type="button" onClick={() => setShowNew(!showNew)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
                    <Icon name={showNew ? "eye" : "eye-off"} className="w-4 h-4" />
                  </button>
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Confirm New Password</label>
                <div className="relative">
                  <input required type={showConfirm ? "text" : "password"} value={pwd.confirm} onChange={(e) => setPwd({ ...pwd, confirm: e.target.value })} className="w-full pl-3 pr-10 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 focus:outline-none focus:border-blue-500 text-white" />
                  <button type="button" onClick={() => setShowConfirm(!showConfirm)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
                    <Icon name={showConfirm ? "eye" : "eye-off"} className="w-4 h-4" />
                  </button>
                </div>
              </div>

              <button type="submit" className="w-full py-3 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition cursor-pointer">
                Change Password
              </button>
            </form>
          </div>
        </div>
      );

    // 3. Task Management (CRUD)
    function AdminTasks({ tasks, setTasks, submissions = [], users = [], triggerToast, setPreviewImage }) {
      const [showCreate, setShowCreate] = useState(false);
      const [editingTaskId, setEditingTaskId] = useState(null);
      const [selectedTask, setSelectedTask] = useState(null);
      const [form, setForm] = useState({ title: "", category: "Google Review", links: "", amount: "", remarks: "", deadline: "" });

      // Review Texts Excel/CSV import states
      const [pasteReviews, setPasteReviews] = useState("");
      const [importedReviewsList, setImportedReviewsList] = useState([]);
      const [expandedTaskReviews, setExpandedTaskReviews] = useState({});

      const toggleForm = () => {
        if (showCreate) {
          setForm({ title: "", category: "Google Review", links: "", amount: "", remarks: "", deadline: "" });
          setEditingTaskId(null);
          setPasteReviews("");
          setImportedReviewsList([]);
        }
        setShowCreate(!showCreate);
      };

      const toggleTaskReviews = (taskId) => {
        setExpandedTaskReviews(prev => ({ ...prev, [taskId]: !prev[taskId] }));
      };

      // Cryptographic secure resilient Excel/CSV parser
      const parseReviewsText = (text) => {
        const rows = text.split(/\r?\n/);
        const parsed = [];
        rows.forEach((row) => {
          if (!row.trim()) return;
          
          let sno = parsed.length + 1;
          let textStr = row.trim();
          
          // Split by tab first (spreadsheet format), then fallback to comma (CSV format)
          let cols = row.split("\t");
          if (cols.length < 2) {
            cols = row.split(",");
          }
          
          if (cols.length >= 2) {
            const snoStr = cols[0].replace(/['"\s]/g, "").trim();
            // Check if the first column is numeric to confirm S.No structure
            const maybeSno = parseInt(snoStr);
            if (!isNaN(maybeSno)) {
              sno = maybeSno;
              textStr = cols.slice(1).join(",").replace(/^['"]|['"]$/g, "").trim();
            }
          }
          
          // Skip headers or empty entries
          if (textStr && 
              textStr.toLowerCase() !== "review" && 
              textStr.toLowerCase() !== "review text" && 
              textStr.toLowerCase() !== "reviews") {
            parsed.push({
              id: "r" + (parsed.length + 1),
              sno: sno,
              text: textStr,
              assigned_to: null,
              status: "Unused"
            });
          }
        });
        return parsed;
      };

      const downloadDemoCsv = () => {
        const csvContent = "S.No,Review Text\n1,This is a wonderful application! Extremely fast and user-friendly.\n2,Outstanding support team and brilliant workflow interface.\n3,Highly recommended for remote candidate task tracking.\n4,Excellent performance, clean layout, and smooth animations.";
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "krv_reviews_demo_format.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("Demo CSV format downloaded successfully!");
      };

      const handleCsvUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const text = event.target.result;
            const parsed = parseReviewsText(text);
            if (parsed.length > 0) {
              setImportedReviewsList(parsed);
              triggerToast(`${parsed.length} reviews successfully imported from file!`);
            } else {
              triggerToast("Could not parse file. Check format: S.No, Review Text", "error");
            }
          };
          reader.readAsText(file);
        }
      };

      const handlePasteImport = (e) => {

    // 4. Submissions Review System
    function AdminReviews({ submissions, setSubmissions, users, setNotifications, notifications, triggerToast, updateWallet, setPreviewImage }) {
      const [reviewModal, setReviewModal] = useState(null);
      const [rejectionReason, setRejectionReason] = useState("");

      const pendingSub = useMemo(() => submissions.filter(s => s.review_status === "Pending"), [submissions]);

      const handleApprove = (sub) => {
        // Update submission review status
        setSubmissions(prev => prev.map(s => s.id === sub.id ? { ...s, review_status: "Approved" } : s));
        
        // Update user wallet balance (transfers pending to approved)
        updateWallet(sub.user_id, sub.amount);

        // Add Notification
        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: sub.user_id,
          title: "Task Submission Approved!",
          message: `Your task submission (SUB-${sub.id.toUpperCase()}) was verified successfully. ₹${sub.amount} added to wallet.`,
          date: new Date().toISOString().split('T')[0]
        };
        setNotifications([...notifications, newNotif]);

        triggerToast("Task submission approved!");
        setReviewModal(null);
      };

      const handleReject = (sub) => {
        if (!rejectionReason) {
          triggerToast("Please provide a rejection reason.", "error");
          return;
        }

        // Update submission
        setSubmissions(prev => prev.map(s => s.id === sub.id ? { ...s, review_status: "Rejected", rejection_reason: rejectionReason } : s));
        
        // Deduct from candidate's pending wallet
        // (Wait! In submit task, we added it to u.earnings_pending, so we should deduct it now)
        // Set rejection reason
        // Add Notification
        const newNotif = {
          id: "n" + (notifications.length + 1),
          user_id: sub.user_id,
          title: "Task Submission Rejected",
          message: `Your task submission (SUB-${sub.id.toUpperCase()}) was rejected: "${rejectionReason}"`,
          date: new Date().toISOString().split('T')[0]
        };

        triggerToast("Submission rejected with remark details.");
        setReviewModal(null);
        setRejectionReason("");

          <div className="overflow-x-auto">

    // 6. KYC Approvals Manager

      const handleApproveKyc = (kyc) => {
        setKycRecords(prev => prev.map(k => k.id === kyc.id ? { ...k, status: "Approved" } : k));
        
        // Update user status
        setUsers(prev => prev.map(u => u.id === kyc.user_id ? { ...u, kyc_status: "Approved" } : u));

        // Add Notification
        const newNotif = {
          id: "n" + (notifications.length + 1),
