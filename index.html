<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRV Management — Task Based Workforce Portal</title>
  <!-- Tailwind CSS v4 Browser Compiler -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- React & ReactDOM 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style type="text/css">
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
    }
    :root {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #eff6ff 50%, #dbeafe 100%);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(15, 23, 42, 0.06);
      --glass-shadow: 0 10px 30px -10px rgba(37, 99, 235, 0.08);
      --text-main: #0f172a;
      --text-muted: #475569;
    }
    .dark {
      --bg-gradient: linear-gradient(135deg, #090d16 0%, #0f172a 50%, #1e1b4b 100%);
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 10px 35px -10px rgba(0, 0, 0, 0.5);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }
    .app-bg {
      background: var(--bg-gradient);
    }
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      box-shadow: var(--glass-shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -15px rgba(37, 99, 235, 0.15);
    }
  </style>
  <script>
    // Cryptographic Secure Hashing function for auto-redirection
    const sha256Direct = async (text) => {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // Fast Auto-Redirect Blocking Script
    (async () => {
      const storedSession = localStorage.getItem("krv-current-user-session");
      if (storedSession) {
        try {
          const { user, signature } = JSON.parse(storedSession);
          if (user && signature) {
            const expectedSig = await sha256Direct(`${user.id}:${user.email}:${user.role}:KRV-SESSION-SECRET-2026!`);
            if (signature === expectedSig) {
              if (user.role === "admin") {
                window.location.href = "admin.html";
              } else {
                window.location.href = "candidate.html";
              }
            }
          }
        } catch (e) {
          console.error("Auto-redirect check failed:", e);
        }
      }
    })();
  </script>
</head>
<body class="app-bg min-h-screen text-[var(--text-main)] transition-colors duration-300">
  
  <div id="root"></div>

  <!-- React code with Babel -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Custom SVG Icon Component
    const Icon = ({ name, className = "w-5 h-5", ...props }) => {
      const icons = {
        sun: <g><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></g>,
        moon: <g><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></g>,
        shield: <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></g>,
        tasks: <g><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></g>,
        wallet: <g><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4M4 6v12a2 2 0 0 0 2 2h14v-4M20 12a2 2 0 0 0 0 4h-4a2 2 0 0 0 0-4h4z" /></g>,
        check: <g><polyline points="20 6 9 17 4 12" /></g>,
        arrowRight: <g><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></g>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
          {icons[name] || null}
        </svg>
      );
    };

    function LandingPage() {
      const [theme, setTheme] = useState(() => localStorage.getItem("krv-theme") || "dark");

      useEffect(() => {
        const root = window.document.documentElement;
        if (theme === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }
        localStorage.setItem("krv-theme", theme);
      }, [theme]);

      return (
        <div className="flex flex-col min-h-screen">
          {/* Header */}
          <header className="px-6 py-4 flex items-center justify-between border-b border-slate-200/50 dark:border-slate-800/40 bg-white/70 dark:bg-slate-900/60 backdrop-blur-xl shrink-0">
            <div className="flex items-center gap-2.5">
              <div className="w-8 h-8 rounded-lg bg-blue-650 flex items-center justify-center shadow-lg shadow-blue-500/25">
                <Icon name="shield" className="w-5 h-5 text-white" />
              </div>
              <span className="font-extrabold text-base tracking-wider uppercase text-white">KRV PORTAL</span>
            </div>
            
            <div className="flex items-center gap-4">
              <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 shadow cursor-pointer transition">
                <Icon name={theme === "dark" ? "sun" : "moon"} className="w-4 h-4" />
              </button>
              <a href="login.html" className="px-4 py-2 text-xs font-bold uppercase tracking-wider text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md cursor-pointer transition">
                Sign In
              </a>
            </div>
          </header>

          {/* Hero Section */}
          <main className="flex-grow flex flex-col justify-center items-center px-6 py-12 md:py-24 text-center max-w-5xl mx-auto space-y-12">
            <div className="space-y-6">
              <span className="px-3 py-1 rounded-full bg-blue-500/10 text-blue-500 dark:text-blue-400 text-xs font-extrabold uppercase tracking-widest border border-blue-500/20">
                🚀 Next Generation Workforce Portal
              </span>
              <h1 className="text-4xl md:text-6xl font-black tracking-tight text-white leading-tight">
                Complete Micro-Tasks.<br />
                <span className="text-blue-500">Earn Real Money Instantly.</span>
              </h1>
              <p className="text-slate-400 max-w-2xl mx-auto text-sm md:text-base leading-relaxed">
                Connect directly with premium brand campaigns. Take up easy application reviews, recording tasks, or feedback surveys, and withdraw your earnings directly into your verified bank account.
              </p>
            </div>

            {/* CTA Buttons */}
            <div className="flex flex-col sm:flex-row gap-4 justify-center items-center w-full max-w-md">
              <a href="register.html" className="w-full sm:w-auto px-8 py-3.5 text-sm font-bold uppercase tracking-wider text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-lg shadow-blue-500/25 transition cursor-pointer flex items-center justify-center gap-2 group">
                <span>Join as Candidate</span>
                <Icon name="arrowRight" className="w-4 h-4 transition-transform group-hover:translate-x-1" />
              </a>
              <a href="login.html" className="w-full sm:w-auto px-8 py-3.5 text-sm font-bold uppercase tracking-wider text-slate-350 bg-white/5 hover:bg-white/10 rounded-xl border border-slate-700 transition cursor-pointer flex items-center justify-center">
                Access Dashboard
              </a>
            </div>

            {/* Stats section */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 w-full pt-8">
              {[
                { label: "Completed Reviews", val: "145k+", color: "text-blue-500" },
                { label: "Active Candidates", val: "12,400+", color: "text-emerald-500" },
                { label: "Paid Out Earnings", val: "₹18.4L+", color: "text-indigo-500" },
                { label: "KYC Success Rate", val: "99.2%", color: "text-amber-500" }
              ].map((s, idx) => (
                <div key={idx} className="p-5 rounded-2xl border border-slate-800/40 glass-card">
                  <span className="block text-[10px] font-bold text-slate-450 uppercase tracking-widest">{s.label}</span>
                  <span className={`text-2xl md:text-3xl font-extrabold mt-1.5 block ${s.color}`}>{s.val}</span>
                </div>
              ))}
            </div>

            {/* Features section */}
            <div className="space-y-6 pt-12 w-full">
              <h2 className="text-2xl md:text-3xl font-extrabold text-white">How KRV Workforce Works</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
                <div className="glass-card rounded-2xl p-6 border border-slate-800/40 space-y-4">
                  <div className="w-10 h-10 rounded-lg bg-blue-500/10 flex items-center justify-center text-blue-500 border border-blue-500/20">
                    <Icon name="tasks" className="w-5 h-5" />
                  </div>
                  <h3 className="text-base font-bold text-white">1. Claim Micro-Tasks</h3>
                  <p className="text-xs text-slate-450 leading-relaxed">
                    Browse active campaigns uploaded directly by brands. View detailed instructions, links, and rewards parameters before claiming.
                  </p>
                </div>

                <div className="glass-card rounded-2xl p-6 border border-slate-800/40 space-y-4">
                  <div className="w-10 h-10 rounded-lg bg-indigo-500/10 flex items-center justify-center text-indigo-500 border border-indigo-500/20">
                    <Icon name="shield" className="w-5 h-5" />
                  </div>
                  <h3 className="text-base font-bold text-white">2. Upload Proof</h3>
                  <p className="text-xs text-slate-450 leading-relaxed">
                    Submit required proof files such as screenshots, link recordings, or product critiques directly into the portal for automated auditing.
                  </p>
                </div>

                <div className="glass-card rounded-2xl p-6 border border-slate-800/40 space-y-4">
                  <div className="w-10 h-10 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-500 border border-emerald-500/20">
                    <Icon name="wallet" className="w-5 h-5" />
                  </div>
                  <h3 className="text-base font-bold text-white">3. Direct Withdrawal</h3>
                  <p className="text-xs text-slate-450 leading-relaxed">
                    As soon as the Admin approves your work proof, rewards are synchronized directly with your wallet balance for immediate bank payout.
                  </p>
                </div>
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="px-6 py-6 border-t border-slate-200/50 dark:border-slate-800/40 bg-white/30 dark:bg-slate-950/20 backdrop-blur-xl shrink-0 text-center text-xs text-slate-550 space-y-2">
            <p className="font-semibold text-slate-400">© 2026 KRV Management Portal. All rights reserved.</p>
            <p className="text-[10px] text-slate-500">Secure, Instant Campaign Auditing and Micro-Task Payout Framework.</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<LandingPage />);
  </script>
</body>
</html>
