    // 7. System Reports Generator
    function AdminReports({ users, submissions, withdrawals, kycRecords, tasks }) {
      const [filterStatus, setFilterStatus] = useState("All");
      const [filterCategory, setFilterCategory] = useState("All");
      const [filterCandidate, setFilterCandidate] = useState("All");
      const [startDate, setStartDate] = useState("");
      const [endDate, setEndDate] = useState("");

      const candidates = useMemo(() => users.filter(u => u.role === "candidate"), [users]);

      const filteredList = useMemo(() => {
        return submissions.filter(s => {
          const matchStatus = filterStatus === "All" || s.review_status === filterStatus;
          
          // Match category of the task
          const task = tasks.find(t => t.id === s.task_id);
          const matchCategory = filterCategory === "All" || (task && task.category === filterCategory);
          
          // Match specific candidate
          const matchCandidate = filterCandidate === "All" || s.user_id === filterCandidate;
          
          // Match Date Range
          let matchDate = true;
          if (startDate) {
            matchDate = matchDate && (s.date >= startDate);
          }
          if (endDate) {
            matchDate = matchDate && (s.date <= endDate);
          }
          
          return matchStatus && matchCategory && matchCandidate && matchDate;
        });
      }, [submissions, tasks, filterStatus, filterCategory, filterCandidate, startDate, endDate]);

      const handleExport = (format) => {
        let content = "";
        let filename = `krv_admin_workforce_report_${new Date().toISOString().split('T')[0]}`;
        
        if (format === "csv") {
          content = "Sub ID,Candidate Name,Task Title,Price,Status,Date\n" + 
            filteredList.map(s => {
              const candidate = users.find(u => u.id === s.user_id);
              const task = tasks.find(t => t.id === s.task_id);
              return `SUB-${s.id.toUpperCase()},"${candidate ? candidate.name : 'N/A'}","${task ? task.title : 'N/A'}",${s.amount},${s.review_status},${s.date}`;
            }).join("\n");
          filename += ".csv";
        } else if (format === "excel") {
          content = "Sub ID\tCandidate Name\tTask Title\tPrice\tStatus\tDate\n" + 
            filteredList.map(s => {
              const candidate = users.find(u => u.id === s.user_id);
              const task = tasks.find(t => t.id === s.task_id);
              return `SUB-${s.id.toUpperCase()}\t${candidate ? candidate.name : 'N/A'}\t${task ? task.title : 'N/A'}\t${s.amount}\t${s.review_status}\t${s.date}`;
            }).join("\n");
          filename += ".xls";
        } else {
          content = "KRV ADMIN MASTER AUDIT REPORT\n=============================\n" +
            `Generated: ${new Date().toLocaleString()}\n` +
            `Filters: Status=${filterStatus} | Category=${filterCategory} | Candidate=${filterCandidate}\n` +
            `Total Filtered Entries: ${filteredList.length} submissions\n\n` +
            "SUBMISSIONS AUDIT DATA:\n------------------------\n" +
            filteredList.map(s => {
              const candidate = users.find(u => u.id === s.user_id);
              const task = tasks.find(t => t.id === s.task_id);
              return `[SUB-${s.id.toUpperCase()}] Candidate: ${candidate ? candidate.name : 'N/A'} | Task: ${task ? task.title : 'N/A'} | Price: Rs.${s.amount} | Status: ${s.review_status} | Date: ${s.date}`;
            }).join("\n");
          filename += ".pdf";
        }

        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-5 gap-4 p-5 rounded-2xl glass-card text-xs">
            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">Audit Status</label>
              <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white focus:outline-none focus:border-blue-500">
                <option value="All">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Pending">Pending</option>
                <option value="Rejected">Rejected</option>
              </select>
            </div>

            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">Task Category</label>
              <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white focus:outline-none focus:border-blue-500">
                <option value="All">All Categories</option>
                <option value="Application Review">Application Review</option>
                <option value="Google Review">Google Review</option>
                <option value="Audio Recording">Audio Recording</option>
                <option value="Video Recording">Video Recording</option>
                <option value="Product Review">Product Review</option>
              </select>
            </div>

            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">Candidate</label>
              <select value={filterCandidate} onChange={(e) => setFilterCandidate(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white focus:outline-none focus:border-blue-500">
                <option value="All">All Candidates</option>
                {candidates.map(c => (
                  <option key={c.id} value={c.id}>{c.name} (USER-{c.id.toUpperCase()})</option>
                ))}
              </select>
            </div>

            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">Start Date</label>
              <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white focus:outline-none focus:border-blue-500" />
            </div>

            <div>
              <label className="block text-[10px] font-bold uppercase text-slate-400 mb-1.5">End Date</label>
              <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white focus:outline-none focus:border-blue-500" />
            </div>
          </div>

          {/* Export Buttons bar */}
          <div className="flex flex-wrap items-center justify-between gap-4 p-4 rounded-xl bg-slate-50/50 dark:bg-slate-900/40 border border-slate-250 dark:border-slate-800 text-xs">
            <span className="font-semibold text-slate-400">Export options for {filteredList.length} filtered rows:</span>
            <div className="flex gap-2">
              <button onClick={() => handleExport("csv")} className="px-4 py-2 text-[11px] font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-800 flex items-center gap-2 cursor-pointer transition">
                <Icon name="download" className="w-4 h-4" /> CSV Export
              </button>
              <button onClick={() => handleExport("excel")} className="px-4 py-2 text-[11px] font-bold rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-slate-800 flex items-center gap-2 cursor-pointer transition">
                <Icon name="download" className="w-4 h-4" /> Excel XLS
              </button>
              <button onClick={() => handleExport("pdf")} className="px-4 py-2 text-[11px] font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center gap-2 cursor-pointer transition">
                <Icon name="download" className="w-4 h-4" /> PDF Report
              </button>
            </div>
          </div>

          <div className="glass-card rounded-2xl p-6">
            <h3 className="text-base font-bold mb-4">Audit Submissions Listing: {filteredList.length} Entries</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs text-left border-collapse">
                <thead>
                  <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400 uppercase font-bold text-[10px] tracking-wider">
                    <th className="py-3">Sub ID</th>
                    <th>Worker Name</th>
                    <th>Task ID</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Submitted Link</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-200/50 dark:divide-slate-800/40">
                  {filteredList.map(s => {
                    const user = users.find(u => u.id === s.user_id);
                    return (
                      <tr key={s.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/15">
                        <td className="py-3.5 font-bold">SUB-{s.id.toUpperCase()}</td>
                        <td className="text-slate-400 font-semibold">{user ? user.name : "N/A"}</td>
                        <td className="text-slate-400">TASK-{s.task_id.toUpperCase()}</td>
                        <td className="font-extrabold text-emerald-500">₹{s.amount}</td>
                        <td>
                          <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                            s.review_status === "Approved" ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20" :
                            s.review_status === "Rejected" ? "bg-rose-500/10 text-rose-500 border border-rose-500/20" :
                            "bg-amber-500/10 text-amber-500 border border-amber-500/20"
                          }`}>
                            {s.review_status}
                          </span>
                        </td>
                        <td className="text-blue-500 max-w-[150px] truncate select-all">{s.submitted_link}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // 8. Settings
    function AdminSettings({
      triggerToast, supabaseUrl, setSupabaseUrl, supabaseKey, setSupabaseKey,
      users, tasks, submissions, kycRecords, withdrawals, tickets, notifications,
      setUsers, setTasks, setSubmissions, setKycRecords, setWithdrawals, setTickets, setNotifications
    }) {
      const [formUrl, setFormUrl] = useState(supabaseUrl);
      const [formKey, setFormKey] = useState(supabaseKey);
      const [isSyncing, setIsSyncing] = useState(false);

      const handleRestoreDefaults = async () => {
        if (!window.confirm("Are you sure you want to reset your local database and restore all high-fidelity mock data? This will overwrite your current local records.")) {
          return;
        }

        localStorage.removeItem("krv-users");
        localStorage.removeItem("krv-users-checksum");
        localStorage.removeItem("krv-tasks");
        localStorage.removeItem("krv-submissions");
        localStorage.removeItem("krv-kyc");
        localStorage.removeItem("krv-withdrawals");
        localStorage.removeItem("krv-tickets");
        localStorage.removeItem("krv-notifications");

        setUsers(DEFAULT_USERS);
        setTasks(DEFAULT_TASKS);
        setSubmissions(DEFAULT_SUBMISSIONS);
        setKycRecords(DEFAULT_KYC);
        setWithdrawals(DEFAULT_WITHDRAWALS);
        setTickets(DEFAULT_TICKETS);
        setNotifications(DEFAULT_NOTIFICATIONS);

        const check = await signUsersList(DEFAULT_USERS);
        localStorage.setItem("krv-users-checksum", check);

        triggerToast("Mock database defaults restored successfully! You can now sync them to Supabase.");
      };
      const [referralBonus, setReferralBonus] = useState(() => localStorage.getItem("krv-referral-bonus") || "50");
      const [minWithdraw, setMinWithdraw] = useState(() => localStorage.getItem("krv-min-withdraw") || "500");

      const handleSaveSettings = (e) => {
        e.preventDefault();
        
        localStorage.setItem("krv-supabase-url", formUrl.trim());
        localStorage.setItem("krv-supabase-key", formKey.trim());
        localStorage.setItem("krv-referral-bonus", referralBonus);
        localStorage.setItem("krv-min-withdraw", minWithdraw);
        
        setSupabaseUrl(formUrl.trim());
        setSupabaseKey(formKey.trim());
        
        triggerToast("Website settings and database API configurator updated successfully!");
      };

      const handleSyncCloud = async () => {
        if (!supabaseUrl || !supabaseKey) {
          triggerToast("Please configure and save your Supabase URL & Anon Key first.", "error");
          return;
        }

        setIsSyncing(true);
        triggerToast("Establishing connection and seeding cloud tables...", "info");

        try {
          if (!window.supabase) {
            throw new Error("Supabase JS SDK is not loaded. Check internet connection.");
          }
          const client = window.supabase.createClient(supabaseUrl, supabaseKey);

          // Sync tables sequentially
          let failed = [];

          const syncTable = async (tableName, data) => {
            if (!data || data.length === 0) return;
            const { error } = await client.from(tableName).upsert(data);
            if (error) {
              console.error(`Sync failed for ${tableName}:`, error);
              failed.push(tableName);
            }
          };

          await syncTable("krv_users", users);
          await syncTable("krv_tasks", tasks);
          await syncTable("krv_submissions", submissions);
          await syncTable("krv_kyc", kycRecords);
          await syncTable("krv_withdrawals", withdrawals);
          await syncTable("krv_tickets", tickets);
          await syncTable("krv_notifications", notifications);

          if (failed.length === 0) {
            triggerToast("🎉 Cloud Database fully synced successfully! All devices are now connected.", "success");
          } else {
            triggerToast(`Partial sync complete. Tables failed: ${failed.join(", ")}. Ensure SQL setup script was run.`, "error");
          }
        } catch (err) {
          console.error("Cloud seeding error:", err);
          triggerToast(`Database Sync failed: ${err.message || err}`, "error");
        } finally {
          setIsSyncing(false);
        }
      };

      const sqlCode = `-- COPY AND RUN THIS SCRIPT IN YOUR SUPABASE SQL EDITOR:

CREATE TABLE IF NOT EXISTS krv_users (
    id VARCHAR(50) PRIMARY KEY,
    name VARCHAR(100) NOT NULL,
    email VARCHAR(100) UNIQUE NOT NULL,
    password VARCHAR(255) NOT NULL,
    mobile VARCHAR(50),
    city VARCHAR(50),
    pincode VARCHAR(50),
    referral_code VARCHAR(50),
    wallet_balance DOUBLE PRECISION DEFAULT 0.0,
    earnings_pending DOUBLE PRECISION DEFAULT 0.0,
    earnings_paid DOUBLE PRECISION DEFAULT 0.0,
    kyc_status VARCHAR(50) DEFAULT 'Not Submitted',
    role VARCHAR(50) DEFAULT 'candidate'
);

CREATE TABLE IF NOT EXISTS krv_tasks (
    id VARCHAR(50) PRIMARY KEY,
    title VARCHAR(255) NOT NULL,
    category VARCHAR(100) NOT NULL,
    links TEXT,
    amount DOUBLE PRECISION DEFAULT 0.0,
    remarks TEXT,
    deadline VARCHAR(50),
    status VARCHAR(50) DEFAULT 'Active',
    imported_reviews JSONB DEFAULT '[]'::jsonb
);

CREATE TABLE IF NOT EXISTS krv_submissions (
    id VARCHAR(50) PRIMARY KEY,
    user_id VARCHAR(50) NOT NULL,
    task_id VARCHAR(50) NOT NULL,
    submitted_link TEXT,
    screenshot TEXT,
    video TEXT,
    remarks TEXT,
    review_status VARCHAR(50) DEFAULT 'Pending',
    amount DOUBLE PRECISION DEFAULT 0.0,
    date VARCHAR(50)
);

CREATE TABLE IF NOT EXISTS krv_kyc (
    id VARCHAR(50) PRIMARY KEY,
    user_id VARCHAR(50) UNIQUE NOT NULL,
    account_holder VARCHAR(100),
    account_number VARCHAR(100),
    bank_name VARCHAR(100),
    ifsc VARCHAR(50),
    aadhaar_front TEXT,
    aadhaar_back TEXT,
    selfie TEXT,
    status VARCHAR(50) DEFAULT 'Pending',
    rejection_reason TEXT
);

CREATE TABLE IF NOT EXISTS krv_withdrawals (
    id VARCHAR(50) PRIMARY KEY,
    user_id VARCHAR(50) NOT NULL,
    amount DOUBLE PRECISION NOT NULL,
    status VARCHAR(50) DEFAULT 'Pending',
    date VARCHAR(50),
    bank_details TEXT
);

CREATE TABLE IF NOT EXISTS krv_tickets (
    id VARCHAR(50) PRIMARY KEY,
    user_id VARCHAR(50) NOT NULL,
    subject VARCHAR(255),
    category VARCHAR(100),
    description TEXT,
    status VARCHAR(50) DEFAULT 'Open',
    replies JSONB DEFAULT '[]'::jsonb
);

CREATE TABLE IF NOT EXISTS krv_notifications (
    id VARCHAR(50) PRIMARY KEY,
    user_id VARCHAR(50) NOT NULL,
    title VARCHAR(255),
    message TEXT,
    date VARCHAR(50)
);

-- Disable Row Level Security for instant anonymous sync
ALTER TABLE krv_users DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_tasks DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_submissions DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_kyc DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_withdrawals DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_tickets DISABLE ROW LEVEL SECURITY;
ALTER TABLE krv_notifications DISABLE ROW LEVEL SECURITY;`;

      return (
        <div className="max-w-4xl mx-auto space-y-6 text-xs">
          {/* Supabase SQL Setup Guide */}
          <div className="glass-card rounded-2xl p-6 border-blue-500/20 bg-blue-600/5">
            <h3 className="text-sm font-extrabold text-blue-400 mb-2 flex items-center gap-2">
              <Icon name="check-circle" className="w-5 h-5 shrink-0 animate-pulse" />
              <span>Database Sync Tutorial: Connect Supabase Cloud</span>
            </h3>
            <p className="text-slate-400 mb-4 leading-relaxed">
              To activate real-time synchronization, you must set up the database schemas inside your Supabase Project first. Follow these simple steps:
            </p>
            
            <div className="space-y-3 pl-2">
              <div className="flex gap-3">
                <span className="w-5 h-5 rounded-full bg-slate-800 flex items-center justify-center shrink-0 font-extrabold text-[10px] text-white">1</span>
                <span className="text-slate-300">Open your **[Supabase Dashboard](https://supabase.com)** and enter your project panel.</span>
              </div>
              <div className="flex gap-3">
                <span className="w-5 h-5 rounded-full bg-slate-800 flex items-center justify-center shrink-0 font-extrabold text-[10px] text-white">2</span>
                <span className="text-slate-300">Click on the **SQL Editor** tab from the left sidebar of Supabase, then click **New Query**.</span>
              </div>
              <div className="flex gap-3">
                <span className="w-5 h-5 rounded-full bg-slate-800 flex items-center justify-center shrink-0 font-extrabold text-[10px] text-white">3</span>
                <span className="text-slate-300">Copy the database table script provided in the terminal box below, paste it inside the query field, and click **Run**.</span>
              </div>
              <div className="flex gap-3">
                <span className="w-5 h-5 rounded-full bg-slate-800 flex items-center justify-center shrink-0 font-extrabold text-[10px] text-white">4</span>
                <span className="text-slate-300">Copy your project **URL** and **Anon Key** (found in Project Settings -> API), paste them below, click **Save**, and execute **Sync Existing Data**!</span>
              </div>
            </div>

            {/* SQL Code Box */}
            <div className="mt-4 space-y-2">
              <div className="flex justify-between items-center text-[10px] font-bold uppercase text-slate-500 tracking-wider">
                <span>SQL Setup Script</span>
                <button 
                  onClick={() => {
                    navigator.clipboard.writeText(sqlCode);
                    triggerToast("SQL Schema Script copied to clipboard!");
                  }} 
                  className="px-2.5 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded font-bold transition flex items-center gap-1 cursor-pointer"
                >
                  <Icon name="copy" className="w-3 h-3" />
                  <span>Copy SQL Code</span>
                </button>
              </div>
              
              <textarea 
                readOnly
                rows="6" 
                value={sqlCode} 
                className="w-full font-mono text-[10px] px-3.5 py-2.5 bg-slate-955 text-slate-400 rounded-lg border border-slate-800 focus:outline-none custom-scroll leading-relaxed"
              ></textarea>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {/* General settings */}
            <div className="glass-card rounded-2xl p-6">
              <h3 className="text-sm font-extrabold text-white mb-4">Portal Configuration Settings</h3>
              <form onSubmit={handleSaveSettings} className="space-y-4">
                <div>
                  <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Referral Rate Bonus (INR)</label>
                  <input type="number" value={referralBonus} onChange={(e) => setReferralBonus(e.target.value)} className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
                </div>
                <div>
                  <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Min Withdrawal Limit (INR)</label>
                  <input type="number" value={minWithdraw} onChange={(e) => setMinWithdraw(e.target.value)} className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
                </div>
                <div>
                  <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Support Ticket Auto-Close Timer (Days)</label>
                  <input type="number" defaultValue="7" className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" />
                </div>
                <div>
                  <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Platform Maintenance Mode</label>
                  <select className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white">
                    <option value="no">Active Operational</option>
                    <option value="yes">Under Maintenance</option>
                  </select>
                </div>
                
                <button type="submit" className="w-full py-3.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-lg cursor-pointer transition">
                  Save General Configs
                </button>
              </form>
            </div>

            {/* Supabase settings */}
            <div className="glass-card rounded-2xl p-6 flex flex-col justify-between">
              <div>
                <h3 className="text-sm font-extrabold text-white mb-4 flex items-center gap-2">
                  <span>☁️ Supabase Cloud Configurator</span>
                  <span className={`px-2 py-0.5 rounded text-[8px] font-bold uppercase ${
                    supabaseUrl && supabaseKey ? "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20" : "bg-amber-500/10 text-amber-500 border border-amber-500/20"
                  }`}>
                    {supabaseUrl && supabaseKey ? "Connected" : "Offline"}
                  </span>
                </h3>
                
                <form onSubmit={handleSaveSettings} className="space-y-4">
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Supabase Project URL</label>
                    <input 
                      type="url" 
                      placeholder="https://yourproject.supabase.co" 
                      value={formUrl} 
                      onChange={(e) => setFormUrl(e.target.value)} 
                      className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" 
                    />
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-slate-400 mb-2">Supabase Anon Public API Key</label>
                    <input 
                      type="password" 
                      placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." 
                      value={formKey} 
                      onChange={(e) => setFormKey(e.target.value)} 
                      className="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 text-white" 
                    />
                  </div>

                  <button type="submit" className="w-full py-3.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-lg cursor-pointer transition">
                    Save Cloud Credentials
                  </button>
                </form>
              </div>

              <div className="mt-6 pt-6 border-t border-slate-800/80 space-y-3">
                <div>
                  <span className="block text-[10px] uppercase font-bold text-slate-400 mb-1.5">Synchronize Local Storage to Cloud</span>
                  <span className="block text-[10px] text-slate-500">
                    If you already have candidate profiles, task submissions, or reviews saved locally in your current browser, click below to migrate them to your Supabase Postgres Database tables instantly.
                  </span>
                </div>
                
                <button 
                  type="button" 
                  onClick={handleSyncCloud}
                  disabled={isSyncing}
                  className={`w-full py-3 text-xs font-bold text-white rounded-xl shadow transition flex items-center justify-center gap-1.5 cursor-pointer ${
                    isSyncing ? "bg-slate-800 text-slate-500 cursor-not-allowed" : "bg-emerald-600 hover:bg-emerald-700"
                  }`}
                >
                  {isSyncing ? (
                    <>
                      <div className="w-3.5 h-3.5 border-2 border-slate-500 border-t-transparent rounded-full animate-spin"></div>
                      <span>Syncing Databases...</span>
                    </>
                  ) : (
                    <>
                      <Icon name="upload" className="w-4 h-4" />
                      <span>Sync Existing Data to Cloud</span>
                    </>
                  )}
                </button>

                <div className="mt-4 pt-4 border-t border-slate-800/50">
                  <span className="block text-[10px] uppercase font-bold text-slate-400 mb-1.5">Emergency Mock Data Restore</span>
                  <span className="block text-[10px] text-slate-500 mb-2">
                    If your local storage became blank due to a fresh unseeded Supabase database connection, click below to restore all default premium tasks and mock candidate profiles instantly.
                  </span>
                  <button 
                    type="button" 
                    onClick={handleRestoreDefaults}
                    className="w-full py-2.5 text-xs font-bold text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 rounded-xl shadow transition flex items-center justify-center gap-1.5 cursor-pointer border border-slate-700/60"
                  >
                    <Icon name="clock" className="w-4 h-4 text-amber-500" />
                    <span>Restore Default Mock Data</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // INJECT INTO DOM
    // ==========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
